<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — THEY GOOD TV</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #04040f; color: #e0e0ff; font-family: 'Orbitron', sans-serif; min-height: 100vh; }

/* LOGIN */
#login { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
.login-box { background: #08081a; border: 1px solid #00f0ff88; border-radius: 16px; padding: 40px; width: 100%; max-width: 380px; text-align: center; }
.login-box h1 { color: #00f0ff; font-size: 1.4rem; margin-bottom: 20px; }
.login-box input { width: 100%; background: #0d0d22; border: 1px solid #00f0ff44; border-radius: 8px; color: #fff; font-family: 'Orbitron', sans-serif; font-size: 0.75rem; padding: 12px; margin-bottom: 12px; letter-spacing: 2px; }
.btn { background: linear-gradient(90deg, #00f0ff, #7b2fff); border: none; border-radius: 8px; color: #000; font-family: 'Orbitron', sans-serif; font-size: 0.75rem; font-weight: 700; padding: 12px 20px; cursor: pointer; width: 100%; margin-bottom: 8px; }
.btn-red { background: #ff3d5a; color: #fff; }
.btn-green { background: #00ff99; color: #000; }
.err { color: #ff3d5a; font-size: 0.65rem; margin-top: 8px; }

/* PANEL */
#panel { display: none; padding: 16px; max-width: 800px; margin: 0 auto; }
.header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 8px; }
.header h1 { color: #00f0ff; font-size: 1rem; }
.tabs { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.tab { background: #08081a; border: 1px solid #00f0ff33; border-radius: 6px; color: #6060a0; font-family: 'Orbitron', sans-serif; font-size: 0.7rem; padding: 8px 14px; cursor: pointer; }
.tab.active { border-color: #00f0ff; color: #00f0ff; }
.section { display: none; }
.section.active { display: block; }
.card { background: #08081a; border: 1px solid #00f0ff22; border-radius: 8px; padding: 16px; margin-bottom: 12px; }
label { display: block; color: #00f0ff; font-size: 0.65rem; margin-bottom: 4px; margin-top: 10px; }
input, textarea { width: 100%; background: #0d0d22; border: 1px solid #00f0ff44; border-radius: 6px; color: #fff; font-family: 'Orbitron', sans-serif; font-size: 0.7rem; padding: 10px; }
textarea { height: 80px; resize: vertical; }
.row { display: flex; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
.row input { flex: 1; min-width: 150px; }
.msg { padding: 10px; border-radius: 6px; font-size: 0.7rem; margin-bottom: 12px; display: none; }
.msg.ok { background: #00ff9922; border: 1px solid #00ff99; color: #00ff99; }
.msg.err { background: #ff3d5a22; border: 1px solid #ff3d5a; color: #ff3d5a; }
.item-row { display: flex; gap: 8px; align-items: flex-start; margin-bottom: 8px; }
.item-row input { flex: 1; }
.del-btn { background: #ff3d5a; border: none; border-radius: 6px; color: #fff; cursor: pointer; padding: 8px 12px; font-size: 0.7rem; flex-shrink: 0; }
.add-btn { background: #00f0ff22; border: 1px solid #00f0ff; border-radius: 6px; color: #00f0ff; cursor: pointer; padding: 8px 14px; font-size: 0.65rem; font-family: 'Orbitron', sans-serif; margin-top: 6px; }
.serie-block { background: #0a0a1e; border: 1px solid #00f0ff33; border-radius: 8px; padding: 12px; margin-bottom: 10px; }
.serie-block h4 { color: #00f0ff; font-size: 0.75rem; margin-bottom: 8px; }
.ep-row { display: flex; gap: 6px; margin-bottom: 6px; }
.ep-row input { flex: 1; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-box">
    <h1>🎮 THEY GOOD TV</h1>
    <p style="color:#6060a0;font-size:0.6rem;margin-bottom:20px;">PANEL ADMIN</p>
    <input type="password" id="passInput" placeholder="CONTRASEÑA" />
    <button class="btn" onclick="doLogin()">ENTRAR</button>
    <div class="err" id="loginErr" style="display:none">Contraseña incorrecta</div>
  </div>
</div>

<!-- PANEL -->
<div id="panel">
  <div class="header">
    <h1>🎮 THEY GOOD TV — ADMIN</h1>
    <div style="display:flex;gap:8px;flex-wrap:wrap;">
      <button class="btn btn-green" onclick="guardar()" style="width:auto;padding:8px 16px;">💾 GUARDAR EN GITHUB</button>
      <button class="btn btn-red" onclick="salir()" style="width:auto;padding:8px 16px;">⬅ SALIR</button>
    </div>
  </div>

  <div id="msg" class="msg"></div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('canales')">📡 CANALES</button>
    <button class="tab" onclick="switchTab('peliculas')">🎬 PELÍCULAS</button>
    <button class="tab" onclick="switchTab('series')">📺 SERIES</button>
    <button class="tab" onclick="switchTab('config')">⚙ CONFIG</button>
  </div>

  <!-- CANALES -->
  <div id="tab-canales" class="section active">
    <div class="card">
      <h3 style="color:#00f0ff;font-size:0.8rem;margin-bottom:12px;">⚽ FÚTBOL</h3>
      <div id="futbol-list"></div>
      <button class="add-btn" onclick="addEvento('futbol')">+ AGREGAR PARTIDO</button>
    </div>
    <div class="card">
      <h3 style="color:#00f0ff;font-size:0.8rem;margin-bottom:12px;">🚴 CICLISMO</h3>
      <div id="ciclismo-list"></div>
      <button class="add-btn" onclick="addEvento('ciclismo')">+ AGREGAR EVENTO</button>
    </div>
    <div class="card">
      <h3 style="color:#00f0ff;font-size:0.8rem;margin-bottom:12px;">🔥 UFC / MMA</h3>
      <div id="ufc-list"></div>
      <button class="add-btn" onclick="addEvento('ufc')">+ AGREGAR EVENTO</button>
    </div>
    <div class="card">
      <h3 style="color:#00f0ff;font-size:0.8rem;margin-bottom:12px;">📡 CANALES ECUADOR</h3>
      <div id="ecuador-list"></div>
      <button class="add-btn" onclick="addEvento('ecuador')">+ AGREGAR CANAL</button>
    </div>
  </div>

  <!-- PELÍCULAS -->
  <div id="tab-peliculas" class="section">
    <div class="card">
      <div id="peliculas-list"></div>
      <button class="add-btn" onclick="addPelicula()">+ AGREGAR PELÍCULA</button>
    </div>
  </div>

  <!-- SERIES -->
  <div id="tab-series" class="section">
    <div class="card">
      <div id="series-list"></div>
      <button class="add-btn" onclick="addSerie()">+ AGREGAR SERIE</button>
    </div>
  </div>

  <!-- CONFIG -->
  <div id="tab-config" class="section">
    <div class="card">
      <h3 style="color:#00f0ff;font-size:0.8rem;margin-bottom:12px;">🔑 CREDENCIALES GITHUB</h3>
      <label>USUARIO DE GITHUB</label>
      <input type="text" id="cfgUser" value="Thegood2006"/>
      <label>REPOSITORIO</label>
      <input type="text" id="cfgRepo" value="MI-sitio-eventos"/>
      <label>TOKEN (github.com → Settings → Developer settings → Tokens classic → repo)</label>
      <input type="text" id="cfgToken" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" autocomplete="off"/>
      <p style="color:#6060a0;font-size:0.6rem;margin-top:6px;">El token se guarda solo en este navegador</p>
      <button class="btn" style="margin-top:12px;" onclick="guardarConfig()">GUARDAR CONFIG</button>
    </div>
    <div class="card">
      <h3 style="color:#00f0ff;font-size:0.8rem;margin-bottom:12px;">🔒 CAMBIAR CONTRASEÑA</h3>
      <label>NUEVA CONTRASEÑA</label>
      <input type="password" id="newPass" placeholder="••••••••"/>
      <label>CONFIRMAR</label>
      <input type="password" id="newPass2" placeholder="••••••••"/>
      <button class="btn" style="margin-top:12px;" onclick="cambiarPass()">CAMBIAR CONTRASEÑA</button>
    </div>
  </div>

</div>

<script>
// ── CONFIG ──
const PASS_KEY = "tgtv_pass";
const TOKEN_KEY = "tgtv_token";
const DEFAULT_PASS = "admin1234";

let ghUser = "Thegood2006";
let ghRepo = "MI-sitio-eventos";
let ghToken = "";

let canales = { futbol:[], ciclismo:[], ufc:[], ecuador:[] };
let contenido = { peliculas:[], series:[] };

// ── LOGIN ──
function doLogin() {
  const pass = document.getElementById("passInput").value;
  const saved = localStorage.getItem(PASS_KEY) || DEFAULT_PASS;
  if(pass === saved) {
    document.getElementById("login").style.display = "none";
    document.getElementById("panel").style.display = "block";
    cargarConfig();
    cargarDatos();
  } else {
    document.getElementById("loginErr").style.display = "block";
  }
}

document.getElementById("passInput").addEventListener("keydown", e => {
  if(e.key === "Enter") doLogin();
});

function salir() {
  document.getElementById("login").style.display = "flex";
  document.getElementById("panel").style.display = "none";
  document.getElementById("passInput").value = "";
}

function cambiarPass() {
  const p1 = document.getElementById("newPass").value.trim();
  const p2 = document.getElementById("newPass2").value.trim();
  if(!p1) { showMsg("La contraseña no puede estar vacía", true); return; }
  if(p1 !== p2) { showMsg("Las contraseñas no coinciden", true); return; }
  localStorage.setItem(PASS_KEY, p1);
  showMsg("✓ Contraseña cambiada");
}

// ── CONFIG ──
function cargarConfig() {
  ghToken = localStorage.getItem(TOKEN_KEY) || "";
  document.getElementById("cfgUser").value = ghUser;
  document.getElementById("cfgRepo").value = ghRepo;
  document.getElementById("cfgToken").value = ghToken;
}

function guardarConfig() {
  ghUser = document.getElementById("cfgUser").value.trim();
  ghRepo = document.getElementById("cfgRepo").value.trim();
  ghToken = document.getElementById("cfgToken").value.trim();
  localStorage.setItem(TOKEN_KEY, ghToken);
  showMsg("✓ Config guardada");
}

// ── TABS ──
function switchTab(tab) {
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
  event.target.classList.add("active");
  document.getElementById("tab-" + tab).classList.add("active");
}

// ── CARGAR DATOS ──
async function cargarDatos() {
  const base = `https://raw.githubusercontent.com/${ghUser}/${ghRepo}/main`;
  try {
    const [rc, rco] = await Promise.all([
      fetch(base + "/canales.json?nocache=" + Date.now()),
      fetch(base + "/contenido.json?nocache=" + Date.now())
    ]);
    canales = await rc.json();
    contenido = await rco.json();
    renderTodo();
  } catch(e) {
    showMsg("Error cargando datos: " + e.message, true);
  }
}

// ── RENDER ──
function renderTodo() {
  renderCanales("futbol");
  renderCanales("ciclismo");
  renderCanales("ufc");
  renderCanales("ecuador");
  renderPeliculas();
  renderSeries();
}

function renderCanales(cat) {
  const list = document.getElementById(cat + "-list");
  list.innerHTML = "";
  (canales[cat] || []).forEach((ev, i) => {
    const div = document.createElement("div");
    div.className = "card";
    div.style.marginBottom = "8px";
    div.innerHTML = `
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
        <span style="color:#00f0ff;font-size:0.7rem;">Evento ${i+1}</span>
        <button class="del-btn" onclick="delEvento('${cat}',${i})">🗑 Borrar</button>
      </div>
      <label>NOMBRE</label>
      <input type="text" value="${ev.nombre}" onchange="canales['${cat}'][${i}].nombre=this.value"/>
      <label>LIGA / DESCRIPCIÓN</label>
      <input type="text" value="${ev.liga}" onchange="canales['${cat}'][${i}].liga=this.value"/>
      <label>LINKS (uno por línea)</label>
      <textarea onchange="canales['${cat}'][${i}].reproductores=this.value.split('\\n').filter(l=>l.trim())">${(ev.reproductores||[]).join('\n')}</textarea>
    `;
    list.appendChild(div);
  });
}

function addEvento(cat) {
  if(!canales[cat]) canales[cat] = [];
  canales[cat].push({ nombre: "Nuevo evento", liga: "", reproductores: [""] });
  renderCanales(cat);
}

function delEvento(cat, i) {
  canales[cat].splice(i, 1);
  renderCanales(cat);
}

function renderPeliculas() {
  const list = document.getElementById("peliculas-list");
  list.innerHTML = "";
  (contenido.peliculas || []).forEach((p, i) => {
    const div = document.createElement("div");
    div.className = "card";
    div.style.marginBottom = "8px";
    div.innerHTML = `
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
        <span style="color:#00f0ff;font-size:0.7rem;">${p.nombre || 'Película ' + (i+1)}</span>
        <button class="del-btn" onclick="delPelicula(${i})">🗑 Borrar</button>
      </div>
      <label>NOMBRE</label>
      <input type="text" value="${p.nombre}" onchange="contenido.peliculas[${i}].nombre=this.value"/>
      <label>GÉNERO • AÑO</label>
      <input type="text" value="${p.genero}" onchange="contenido.peliculas[${i}].genero=this.value"/>
      <label>URL PORTADA</label>
      <input type="text" value="${p.portada||''}" onchange="contenido.peliculas[${i}].portada=this.value"/>
      <label>LINK DEL VIDEO</label>
      <input type="text" value="${p.link||''}" onchange="contenido.peliculas[${i}].link=this.value"/>
    `;
    list.appendChild(div);
  });
}

function addPelicula() {
  if(!contenido.peliculas) contenido.peliculas = [];
  contenido.peliculas.push({ nombre: "Nueva película", genero: "", portada: "", link: "" });
  renderPeliculas();
}

function delPelicula(i) {
  contenido.peliculas.splice(i, 1);
  renderPeliculas();
}

function renderSeries() {
  const list = document.getElementById("series-list");
  list.innerHTML = "";
  (contenido.series || []).forEach((s, i) => {
    const div = document.createElement("div");
    div.className = "serie-block";
    let tempHTML = "";
    (s.temporadas || []).forEach((t, ti) => {
      let epHTML = "";
      (t.episodios || []).forEach((ep, ei) => {
        epHTML += `
          <div class="ep-row">
            <input type="text" value="${ep.nombre}" placeholder="Nombre episodio" onchange="contenido.series[${i}].temporadas[${ti}].episodios[${ei}].nombre=this.value"/>
            <input type="text" value="${ep.link}" placeholder="Link" onchange="contenido.series[${i}].temporadas[${ti}].episodios[${ei}].link=this.value"/>
            <button class="del-btn" onclick="delEpisodio(${i},${ti},${ei})">🗑</button>
          </div>`;
      });
      tempHTML += `
        <div style="background:#08081a;border:1px solid #00f0ff22;border-radius:6px;padding:10px;margin-bottom:8px;">
          <label>TEMPORADA</label>
          <input type="text" value="${t.nombre}" onchange="contenido.series[${i}].temporadas[${ti}].nombre=this.value"/>
          <label style="margin-top:8px;">EPISODIOS</label>
          ${epHTML}
          <button class="add-btn" onclick="addEpisodio(${i},${ti})">+ Episodio</button>
        </div>`;
    });
    div.innerHTML = `
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
        <h4>${s.nombre || 'Serie ' + (i+1)}</h4>
        <button class="del-btn" onclick="delSerie(${i})">🗑 Borrar</button>
      </div>
      <label>NOMBRE</label>
      <input type="text" value="${s.nombre}" onchange="contenido.series[${i}].nombre=this.value"/>
      <label>GÉNERO</label>
      <input type="text" value="${s.genero||''}" onchange="contenido.series[${i}].genero=this.value"/>
      <label>URL PORTADA</label>
      <input type="text" value="${s.portada||''}" onchange="contenido.series[${i}].portada=this.value"/>
      <label>TEMPORADAS</label>
      ${tempHTML}
      <button class="add-btn" onclick="addTemporada(${i})">+ Temporada</button>
    `;
    list.appendChild(div);
  });
}

function addSerie() {
  if(!contenido.series) contenido.series = [];
  contenido.series.push({ nombre: "Nueva serie", genero: "", portada: "", temporadas: [] });
  renderSeries();
}

function delSerie(i) {
  contenido.series.splice(i, 1);
  renderSeries();
}

function addTemporada(si) {
  if(!contenido.series[si].temporadas) contenido.series[si].temporadas = [];
  contenido.series[si].temporadas.push({ nombre: "Temporada 1", episodios: [] });
  renderSeries();
}

function addEpisodio(si, ti) {
  contenido.series[si].temporadas[ti].episodios.push({ nombre: "Episodio", link: "" });
  renderSeries();
}

function delEpisodio(si, ti, ei) {
  contenido.series[si].temporadas[ti].episodios.splice(ei, 1);
  renderSeries();
}

// ── GUARDAR EN GITHUB ──
async function guardar() {
  if(!ghToken) {
    showMsg("⚠ Primero guarda tu token en CONFIG", true);
    return;
  }
  showMsg("Guardando en GitHub...", false, true);
  try {
    await Promise.all([
      pushFile("canales.json", JSON.stringify(canales, null, 2)),
      pushFile("contenido.json", JSON.stringify(contenido, null, 2))
    ]);
    showMsg("✓ Guardado en GitHub correctamente");
  } catch(e) {
    showMsg("Error: " + e.message, true);
  }
}

async function pushFile(filename, content) {
  const url = `https://api.github.com/repos/${ghUser}/${ghRepo}/contents/${filename}`;
  const meta = await fetch(url, {
    headers: { Authorization: "token " + ghToken, Accept: "application/vnd.github.v3+json" }
  });
  const metaJson = await meta.json();
  const sha = metaJson.sha;
  const encoded = btoa(unescape(encodeURIComponent(content)));
  const res = await fetch(url, {
    method: "PUT",
    headers: {
      Authorization: "token " + ghToken,
      Accept: "application/vnd.github.v3+json",
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ message: "Admin: update " + filename, content: encoded, sha: sha })
  });
  if(!res.ok) {
    const err = await res.json();
    throw new Error(err.message || res.statusText);
  }
}

function showMsg(text, isErr = false, loading = false) {
  const el = document.getElementById("msg");
  el.className = "msg " + (isErr ? "err" : "ok");
  el.textContent = text;
  el.style.display = "block";
  if(!loading && !isErr) setTimeout(() => el.style.display = "none", 3000);
}
</script>
</body>
</html>
