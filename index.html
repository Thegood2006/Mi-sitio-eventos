<!-- ① Bloquear popups ANTES de todo -->
<script>
(function() {
  'use strict';
  // Bloquar window.open globalmente
  window.open = function() {
    return { closed: true, close(){}, focus(){}, document:{ write(){}, close(){} } };
  };
  // Bloquar postMessage de redirecciones
  window.addEventListener("message", e => {
    if (e.data && typeof e.data === "string" && /open|redirect|navigate|popup/i.test(e.data))
      e.stopImmediatePropagation();
  }, true);
  // Evitar que iframes accedan a top/parent
  try {
    Object.defineProperty(window, 'top',    { get(){ return window; }, configurable: true });
    Object.defineProperty(window, 'parent', { get(){ return window; }, configurable: true });
  } catch(e) {}
})();
</script>

<!-- ═══════════════════════════════════════════════════════════
     JAVASCRIPT PRINCIPAL
═══════════════════════════════════════════════════════════ -->
<script>
/* ── GLOBALS ─────────────────────────────────────────────── */
let currentLink = "";
let tvMode = false;
let currentSerie = null;
let currentSeason = 0;
let currentEpisodeIndex = -1;
let controlsTimer = null;
let contenidoGlobal = { peliculas: [], series: [] };

const RENDER_SERVER = "https://theygoodtv-server.onrender.com";
const URL_CANALES   = "https://raw.githubusercontent.com/Thegood2006/MI-sitio-eventos/main/canales.json";
const URL_CONTENIDO = "https://raw.githubusercontent.com/Thegood2006/MI-sitio-eventos/main/contenido.json";

/* ── CARGA INICIAL ───────────────────────────────────────── */
async function cargarTodo() {
  try {
    let canales;
    try {
      const r = await fetch(RENDER_SERVER + "/streams", { signal: AbortSignal.timeout(8000) });
      if (r.ok) canales = await r.json(); else throw new Error();
    } catch {
      canales = await (await fetch(URL_CANALES + "?nocache=" + Date.now())).json();
    }
    const contenido = await (await fetch(URL_CONTENIDO + "?nocache=" + Date.now())).json();

    renderCategoria("futbolMenu",        canales.futbol);
    renderCategoria("cyclingMenu",       canales.ciclismo);
    renderCategoria("ufcMenu",           canales.ufc);
    renderCategoria("ecuadorMenu",       canales.ecuador);
    renderCategoria("internacionalMenu", canales.internacional);

    contenidoGlobal = contenido;
    renderCards("peliculasGrid", contenido.peliculas, false);
    renderCards("seriesGrid",    contenido.series,    true);
    if (canales.ultima_verificacion) mostrarUltimaVerificacion(canales.ultima_verificacion);
    initBanner(contenido.peliculas);
    initBannerSeries(contenido.series);
  } catch(e) { console.error("Error cargando datos:", e); }
}

/* ── RENDER CATEGORÍAS ───────────────────────────────────── */
function renderCategoria(menuId, eventos) {
  const menu = document.getElementById(menuId);
  if (!menu || !eventos) return;
  menu.innerHTML = "";
  eventos.forEach(evento => {
    const div = document.createElement("div");
    div.className = "event-item";
    const tipo = evento.tipo || 'm3u8';
    const urls = evento.reproductores || [];
    let botonesHTML = "";
    urls.forEach((url, i) => {
      const activo = evento.estados ? evento.estados[i] : true;
      const cls = activo === false ? "player-btn caido" : "player-btn";
      const safeUrl = url.replace(/'/g, "\\'");
      botonesHTML += `<button class="${cls}" onclick="loadStream('${safeUrl}','${tipo}')">
        <i class="fa-solid fa-play"></i> Servidor ${i+1}
      </button>`;
    });
    div.innerHTML = `
      <div class="live">EN VIVO</div>
      <h4>${evento.nombre}</h4>
      <p>${evento.liga}</p>
      <div class="player-options">${botonesHTML}</div>`;
    menu.appendChild(div);
  });
}

function mostrarUltimaVerificacion(ts) {
  const sidebar = document.querySelector(".sidebar");
  if (!sidebar || !ts) return;
  const div = document.createElement("div");
  div.className = "ultima-verificacion";
  div.innerHTML = `<i class="fa-solid fa-clock"></i> Verificado: ${ts}`;
  sidebar.appendChild(div);
}

/* ── HELPERS de creación ─────────────────────────────────── */
function crearVideoElement() {
  const v = document.createElement("video");
  v.id = "video"; v.controls = true; v.autoplay = true; v.playsInline = true;
  v.setAttribute("webkit-playsinline", "");
  v.style.cssText = "width:100%;height:100%;display:block;background:#000;";
  return v;
}

function crearCastIndicator() {
  const d = document.createElement("div");
  d.id = "castIndicator";
  d.innerHTML = '<span class="cast-dot"></span><i class="fa-solid fa-tv"></i> TRANSMITIENDO';
  return d;
}

/* ── LOAD STREAM (centralizado aquí, el patch lo sobreescribe) */
function loadStream(url, tipo) {
  if (!url || url.trim() === '' || url.startsWith('TU_LINK')) {
    mostrarErrorVideo('⚠️ Este canal no tiene link asignado todavía.');
    return;
  }
  currentLink = url;
  if (window._hls) { window._hls.destroy(); window._hls = null; }

  const container = document.getElementById('videoContainer');
  const esM3U8 = url.includes('.m3u8') || url.includes('chunklist') || tipo === 'm3u8';
  const esMp4  = !esM3U8 && (url.endsWith('.mp4') || url.includes('.mp4?') || tipo === 'mp4');
  const esIframe = !esM3U8 && !esMp4;

  if (esIframe) { crearIframeConAdBlock(container, url); return; }

  container.innerHTML = '';
  const video = crearVideoElement();
  container.appendChild(video);
  container.appendChild(crearCastIndicator());

  video.addEventListener('timeupdate', actualizarBarraTV);
  video.addEventListener('pause', () => { const b=document.getElementById('tvPlayPauseBtn'); if(b) b.innerHTML='<i class="fa-solid fa-play"></i>'; });
  video.addEventListener('play',  () => { const b=document.getElementById('tvPlayPauseBtn'); if(b) b.innerHTML='<i class="fa-solid fa-pause"></i>'; });

  if (esM3U8 && typeof Hls !== 'undefined' && Hls.isSupported()) {
    window._hls = new Hls({ enableWorker:true, lowLatencyMode:true, backBufferLength:90 });
    window._hls.loadSource(url);
    window._hls.attachMedia(video);
    window._hls.on(Hls.Events.MANIFEST_PARSED, () => video.play().catch(() => { video.muted=true; video.play(); }));
    window._hls.on(Hls.Events.ERROR, (e,d) => {
      if (d.fatal) {
        if (d.type===Hls.ErrorTypes.NETWORK_ERROR) window._hls.startLoad();
        else if (d.type===Hls.ErrorTypes.MEDIA_ERROR) window._hls.recoverMediaError();
        else window._hls.destroy();
      }
    });
    return;
  }
  if (esM3U8 && video.canPlayType('application/vnd.apple.mpegurl')) {
    video.src = url;
    video.addEventListener('loadedmetadata', () => video.play().catch(() => { video.muted=true; video.play(); }));
    return;
  }
  video.src = url;
  video.play().catch(() => { video.muted=true; video.play(); });
}

/* Iframe con bloqueo de ads — el patch lo mejora aún más */
function crearIframeConAdBlock(container, url) {
  container.innerHTML = '';
  const wrapper = document.createElement('div');
  wrapper.style.cssText = 'position:relative;width:100%;height:100%;background:#000;overflow:hidden;';

  const iframe = document.createElement('iframe');
  iframe.src = url;
  iframe.setAttribute('allowfullscreen','');
  iframe.setAttribute('allow','autoplay; encrypted-media; fullscreen; picture-in-picture');
  iframe.setAttribute('referrerpolicy','no-referrer');
  iframe.setAttribute('sandbox','allow-scripts allow-same-origin allow-forms allow-presentation');
  iframe.style.cssText = 'width:100%;height:100%;border:none;display:block;background:#000;';

  iframe.addEventListener('load', () => {
    try {
      const doc = iframe.contentDocument || iframe.contentWindow?.document;
      if (doc?.head) {
        const s = doc.createElement('style');
        s.textContent = `
          [id*="ad"],[class*="popup"],[class*="overlay"],[class*="banner"],
          [class*="interstitial"],[class*="preroll"],[class*="vast"],
          div[style*="z-index: 2147483647"],div[style*="position: fixed"][style*="top: 0"]
          { display:none!important; }
          body { overflow:hidden!important; }
          video { width:100vw!important; height:100vh!important; }
          header,footer,nav,.header,.footer,.navbar,.topbar { display:none!important; }
        `;
        doc.head.appendChild(s);
        try { iframe.contentWindow.open = () => ({ closed:true, close(){}, focus(){} }); } catch(e){}
      }
    } catch(e) { /* cross-origin: sandbox activo */ }
  });

  // Capas anti-ad en bordes
  [
    'top:0;left:0;right:0;height:60px',
    'bottom:0;left:0;right:0;height:70px',
    'top:60px;bottom:70px;left:0;width:85px',
    'top:60px;bottom:70px;right:0;width:85px',
  ].forEach(s => {
    const trap = document.createElement('div');
    trap.style.cssText = `position:absolute;${s};z-index:15;background:transparent;cursor:default;pointer-events:all;`;
    trap.addEventListener('click',      e => { e.stopPropagation(); e.preventDefault(); });
    trap.addEventListener('mousedown',  e => e.preventDefault());
    trap.addEventListener('touchstart', e => e.preventDefault(), { passive:false });
    wrapper.appendChild(trap);
  });

  // Badge
  const badge = document.createElement('div');
  badge.style.cssText = `
    position:absolute;top:8px;right:8px;z-index:50;
    background:rgba(0,0,0,0.8);border:1px solid rgba(255,255,255,0.15);
    color:#aaa;font-family:Roboto,sans-serif;font-size:11px;font-weight:600;
    padding:4px 10px;border-radius:20px;pointer-events:none;
    display:flex;align-items:center;gap:6px;
  `;
  badge.innerHTML = '<span style="width:6px;height:6px;background:#00c864;border-radius:50%;display:inline-block;"></span> AD SHIELD';

  wrapper.appendChild(iframe);
  wrapper.appendChild(badge);
  wrapper.appendChild(crearCastIndicator());
  container.appendChild(wrapper);
}

function mostrarErrorVideo(msg) {
  const c = document.getElementById('videoContainer');
  if (!c) return;
  c.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:center;
    min-height:300px;background:#111;color:#888;font-family:Roboto,sans-serif;
    font-size:14px;text-align:center;padding:24px;flex-direction:column;gap:12px;">
      <i class="fa-solid fa-circle-exclamation" style="font-size:2.5rem;color:#ff4444;"></i>
      <span>${msg}</span>
    </div>`;
}

/* ── CARDS ───────────────────────────────────────────────── */
function renderCards(gridId, items, esSerie) {
  const grid = document.getElementById(gridId);
  if (!grid || !items) return;
  grid.innerHTML = "";
  items.forEach(item => {
    const div = document.createElement("div");
    div.className = "card";
    div.setAttribute("tabindex","0");
    const accion = esSerie
      ? `onclick="openSeriesModal(this)" data-serie='${JSON.stringify(item).replace(/'/g,"&#39;")}'`
      : `onclick="loadStream(this.dataset.link)" data-link="${(item.link||'').replace(/"/g,'&quot;')}"`;
    div.innerHTML = `
      <img src="${item.portada||''}" alt="${item.nombre}"
           onerror="this.src='https://placehold.co/130x195/161616/555?text=SIN+IMG'">
      <div class="card-info">
        <h4>${item.nombre}</h4>
        <p>${item.genero||''}</p>
        <button class="card-play" ${accion}>
          <i class="fa-solid fa-${esSerie?'list':'play'}"></i>
          ${esSerie?'TEMPORADAS':'REPRODUCIR'}
        </button>
      </div>`;
    div.addEventListener("keydown", e => {
      if (e.key==="Enter"||e.key===" ") { div.querySelector(".card-play").click(); e.preventDefault(); }
    });
    grid.appendChild(div);
  });
}

/* ── SERIES MODAL ────────────────────────────────────────── */
function openSeriesModal(btn) {
  const raw = btn.dataset?.serie || btn.closest(".card")?.querySelector("[data-serie]")?.dataset?.serie;
  if (!raw) return;
  try { currentSerie = JSON.parse(raw.replace(/&#39;/g,"'")); } catch(e) { return; }
  document.getElementById("modalTitle").textContent = currentSerie.nombre;
  if (currentSerie.temporadas?.length > 0) {
    renderSeasonTabs(currentSerie.temporadas);
    selectSeason(0);
  } else if (currentSerie.link) { loadStream(currentSerie.link); return; }
  document.getElementById("seriesModal").classList.add("open");
}

function renderSeasonTabs(temporadas) {
  const tabs = document.getElementById("seasonTabs");
  tabs.innerHTML = "";
  temporadas.forEach((t, i) => {
    const btn = document.createElement("button");
    btn.className = "season-tab" + (i===0?" active":"");
    btn.textContent = t.nombre || `T${i+1}`;
    btn.onclick = () => selectSeason(i);
    tabs.appendChild(btn);
  });
}

function selectSeason(index) {
  currentSeason = index; currentEpisodeIndex = -1;
  const temp = currentSerie.temporadas[index];
  document.querySelectorAll(".season-tab").forEach((t,i) => t.classList.toggle("active", i===index));
  const list = document.getElementById("episodesList");
  list.innerHTML = "";
  if (!temp.episodios?.length) {
    list.innerHTML = '<p style="color:#888;font-size:0.8rem;text-align:center;padding:20px">Sin episodios</p>';
    return;
  }
  temp.episodios.forEach((ep, i) => {
    const clave = `visto_${currentSerie.nombre}_t${currentSeason}_e${i}`;
    const visto = localStorage.getItem(clave) === "1";
    const item = document.createElement("div");
    item.className = "episode-item" + (visto?" visto":"");
    item.id = `ep-item-${i}`;
    item.innerHTML = `
      <div class="episode-info">
        <div class="episode-num">EP ${i+1}</div>
        <div class="episode-name">${ep.nombre||"Episodio "+(i+1)}</div>
      </div>
      ${visto?'<span class="ep-visto-badge"><i class="fa-solid fa-check"></i> VISTO</span>':''}
      <button class="episode-play"
        onclick="reproducirEpisodio(${i},'${(ep.link||'').replace(/'/g,"\\'")}')">
        <i class="fa-solid fa-play"></i> PLAY
      </button>`;
    list.appendChild(item);
  });
  actualizarNavEpisodios();
}

function reproducirEpisodio(idx, link) {
  currentEpisodeIndex = idx;
  localStorage.setItem(`visto_${currentSerie.nombre}_t${currentSeason}_e${idx}`, "1");
  const item = document.getElementById(`ep-item-${idx}`);
  if (item) {
    item.classList.add("visto");
    if (!item.querySelector(".ep-visto-badge")) {
      const b = document.createElement("span");
      b.className = "ep-visto-badge";
      b.innerHTML = '<i class="fa-solid fa-check"></i> VISTO';
      item.insertBefore(b, item.querySelector(".episode-play"));
    }
  }
  actualizarNavEpisodios();
  loadStream(link);
  closeSeriesModal();
}

function actualizarNavEpisodios() {
  const total = currentSerie?.temporadas?.[currentSeason]?.episodios?.length || 0;
  const prev = document.getElementById("btnEpPrev");
  const next = document.getElementById("btnEpNext");
  const cnt  = document.getElementById("epCounter");
  if (prev) prev.disabled = currentEpisodeIndex <= 0;
  if (next) next.disabled = currentEpisodeIndex < 0 || currentEpisodeIndex >= total-1;
  if (cnt) cnt.textContent = currentEpisodeIndex >= 0 && total > 0
    ? `EP ${currentEpisodeIndex+1} / ${total}` : (total > 0 ? `${total} eps` : "");
}

function navegarEpisodio(dir) {
  if (!currentSerie || currentEpisodeIndex < 0) return;
  const eps = currentSerie.temporadas[currentSeason].episodios;
  const ni = currentEpisodeIndex + dir;
  if (ni < 0 || ni >= eps.length) return;
  reproducirEpisodio(ni, eps[ni].link);
}

function actualizarBarraTV() {
  const v = document.getElementById("video");
  if (!v || !v.duration) return;
  const pct = (v.currentTime / v.duration) * 100;
  const fill = document.getElementById("tvProgressFill");
  const time = document.getElementById("tvTime");
  if (fill) fill.style.width = pct + "%";
  if (time) {
    const f = s => `${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,"0")}`;
    time.textContent = `${f(v.currentTime)} / ${f(v.duration)}`;
  }
}

function togglePlayPause() {
  const v=document.getElementById("video"); if(!v) return;
  const b=document.getElementById("tvPlayPauseBtn");
  if(v.paused){ v.play(); if(b) b.innerHTML='<i class="fa-solid fa-pause"></i>'; }
  else { v.pause(); if(b) b.innerHTML='<i class="fa-solid fa-play"></i>'; }
  showControls();
}
function skipVideo(s)  { const v=document.getElementById("video"); if(!v) return; v.currentTime=Math.max(0,v.currentTime+s); showControls(); }
function toggleMute()  { const v=document.getElementById("video"); if(!v) return; v.muted=!v.muted; const b=document.getElementById("tvMuteBtn"); if(b) b.innerHTML=v.muted?'<i class="fa-solid fa-volume-xmark"></i>':'<i class="fa-solid fa-volume-high"></i>'; showControls(); }
function seekVideo(e)  { const v=document.getElementById("video"); if(!v||!v.duration) return; const bar=document.getElementById("tvProgress"); v.currentTime=(e.offsetX/bar.offsetWidth)*v.duration; showControls(); }
function showControls(){ const c=document.getElementById("tvControls"); c.classList.remove("hidden"); clearTimeout(controlsTimer); controlsTimer=setTimeout(()=>c.classList.add("hidden"),4000); }

function fullscreenPlayer() {
  const c=document.getElementById("videoContainer");
  const v=document.getElementById("video");
  if(document.fullscreenElement){ document.exitFullscreen(); return; }
  const fs=c.requestFullscreen||c.webkitRequestFullscreen||c.mozRequestFullScreen;
  if(fs) fs.call(c).catch(()=>{ if(v?.webkitEnterFullscreen) v.webkitEnterFullscreen(); });
  else if(v?.webkitEnterFullscreen) v.webkitEnterFullscreen();
}

/* ── TMDB ────────────────────────────────────────────────── */
const TMDB_KEY  = "48ad3d1469534954a306bf380db6bfe0";
const TMDB_BASE = "https://api.themoviedb.org/3";
const TMDB_IMG  = "https://image.tmdb.org/t/p/w500";

async function buscarTMDb() {
  const query=document.getElementById("tmdbSearch").value.trim();
  if(!query) return;
  const grid=document.getElementById("searchGrid");
  const label=document.getElementById("searchLabel");
  grid.innerHTML='<p style="color:#aaa;font-size:0.7rem;grid-column:1/-1">Buscando...</p>';
  grid.style.display="grid"; label.style.display="block";
  try {
    const res=await fetch(`${TMDB_BASE}/search/multi?api_key=${TMDB_KEY}&query=${encodeURIComponent(query)}&language=es-ES`);
    const data=await res.json();
    const items=(data.results||[]).filter(r=>r.media_type==="movie"||r.media_type==="tv").slice(0,12);
    grid.innerHTML="";
    if(!items.length){ grid.innerHTML='<p style="color:#888;font-size:0.7rem;grid-column:1/-1">Sin resultados</p>'; return; }
    items.forEach(item=>{
      const titulo=item.title||item.name||"Sin título";
      const año=(item.release_date||item.first_air_date||"").slice(0,4);
      const poster=item.poster_path?TMDB_IMG+item.poster_path:"https://placehold.co/130x195/161616/555?text=SIN+IMG";
      const tipo=item.media_type==="tv"?"Serie":"Película";
      const div=document.createElement("div"); div.className="card"; div.setAttribute("tabindex","0");
      div.innerHTML=`<img src="${poster}" alt="${titulo}">
        <div class="card-info"><h4>${titulo}</h4><p>${tipo} • ${año}</p>
        <button class="card-play" onclick="abrirDetalleTMDb(${item.id},'${item.media_type}')">
          <i class="fa-solid fa-circle-info"></i> VER INFO
        </button></div>`;
      grid.appendChild(div);
    });
  } catch(e){ grid.innerHTML='<p style="color:#ff4444;font-size:0.7rem;grid-column:1/-1">Error al buscar</p>'; }
}

async function abrirDetalleTMDb(id, tipo) {
  try {
    const ep=tipo==="tv"?`tv/${id}`:`movie/${id}`;
    const item=await (await fetch(`${TMDB_BASE}/${ep}?api_key=${TMDB_KEY}&language=es-ES`)).json();
    const titulo=item.title||item.name||"Sin título";
    document.getElementById("tmdbPoster").src=item.poster_path?TMDB_IMG+item.poster_path:"";
    document.getElementById("tmdbTitle").textContent=titulo;
    document.getElementById("tmdbYear").textContent=(item.release_date||item.first_air_date||"").slice(0,4);
    document.getElementById("tmdbGenre").textContent=(item.genres||[]).map(g=>g.name).slice(0,2).join(", ");
    document.getElementById("tmdbRating").textContent=item.vote_average?`⭐ ${item.vote_average.toFixed(1)}`:"Sin calificación";
    document.getElementById("tmdbOverview").textContent=item.overview||"Sin sinopsis.";
    const btns=document.getElementById("tmdbPlayBtns"); btns.innerHTML="";
    document.getElementById("tmdbNoLink").style.display="none";
    const pm=(contenidoGlobal.peliculas||[]).find(p=>p.nombre.toLowerCase().includes(titulo.toLowerCase().slice(0,8)));
    const sm=(contenidoGlobal.series||[]).find(s=>s.nombre.toLowerCase().includes(titulo.toLowerCase().slice(0,8)));
    if(pm?.link&&!pm.link.startsWith("TU_LINK")){
      const b=document.createElement("button"); b.className="tmdb-play-btn";
      b.innerHTML='<i class="fa-solid fa-play"></i> REPRODUCIR';
      b.onclick=()=>{loadStream(pm.link);cerrarTMDb();}; btns.appendChild(b);
    } else if(sm){
      const b=document.createElement("button"); b.className="tmdb-play-btn";
      b.innerHTML='<i class="fa-solid fa-list"></i> VER TEMPORADAS';
      b.onclick=()=>{openSeriesModal({dataset:{serie:JSON.stringify(sm)}});cerrarTMDb();}; btns.appendChild(b);
    } else { document.getElementById("tmdbNoLink").style.display="block"; }
    const cb=document.createElement("button"); cb.className="tmdb-close-btn";
    cb.innerHTML='<i class="fa-solid fa-xmark"></i> CERRAR'; cb.onclick=cerrarTMDb; btns.appendChild(cb);
    document.getElementById("tmdbModal").classList.add("open");
  } catch(e){ console.error("TMDb error:",e); }
}
function cerrarTMDb() { document.getElementById("tmdbModal").classList.remove("open"); }

function getMimeForUrl(url){ return (url?.includes('.m3u8')||url?.includes('chunklist'))?"application/x-mpegURL":"video/mp4"; }
function initCastSDK(){try{castContext=cast.framework.CastContext.getInstance();castContext.setOptions({receiverApplicationId:chrome.cast.media.DEFAULT_MEDIA_RECEIVER_APP_ID,autoJoinPolicy:chrome.cast.AutoJoinPolicy.ORIGIN_SCOPED});castContext.addEventListener(cast.framework.CastContextEventType.SESSION_STATE_CHANGED,onCastStateChanged);castInitialized=true;}catch(e){castInitialized=false;}}
async function onCastStateChanged(e){const S=cast.framework.SessionState;if(e.sessionState===S.SESSION_STARTED||e.sessionState===S.SESSION_RESUMED){const s=castContext.getCurrentSession();if(s&&currentLink)await enviarCast(s);}else if(e.sessionState===S.SESSION_ENDED){setCast(false);}}
async function enviarCast(session){try{const mime=getMimeForUrl(currentLink);const info=new chrome.cast.media.MediaInfo(currentLink,mime);info.streamType=mime==="application/x-mpegURL"?chrome.cast.media.StreamType.LIVE:chrome.cast.media.StreamType.BUFFERED;await session.loadMedia(new chrome.cast.media.LoadRequest(info));setCast(true);mostrarToast("📺 ¡Transmitiendo en TV!");}catch(e){mostrarToast("⚠️ Error al cargar en TV.");}}

async function cargarProximosEventos() {
  const grid=document.getElementById("proximosGrid");
  if(!grid) return;
  grid.innerHTML='<div class="proximos-loading"><i class="fa-solid fa-spinner fa-spin"></i> Cargando partidos...</div>';

  let eventosLinks={};
  try {
    const cData=await (await fetch(URL_CANALES+"?nocache="+Date.now(),{signal:AbortSignal.timeout(5000)})).json();
    if(cData.eventos) cData.eventos.forEach(ev=>{eventosLinks[ev.id]=ev;});
  } catch(e){}

  const API_KEY="c7ac3c8a9376c3813bf128410f3c8d04";
  const HDR={"x-apisports-key":API_KEY};
  const LIGAS=[
    {id:"39",nombre:"Premier League",temporada:"2024"},
    {id:"140",nombre:"La Liga",temporada:"2024"},
    {id:"78",nombre:"Bundesliga",temporada:"2024"},
    {id:"135",nombre:"Serie A",temporada:"2024"},
    {id:"262",nombre:"Liga MX",temporada:"2024"},
    {id:"11",nombre:"Liga Pro Ecuador",temporada:"2024"},
  ];
  const hoy=new Date();
  const fechaHoy=hoy.toISOString().split("T")[0];
  const fechaLim=new Date(hoy.getTime()+7*24*60*60*1000).toISOString().split("T")[0];

  async function fetchLiga(liga){
    try{
      const url=`https://v3.football.api-sports.io/fixtures?league=${liga.id}&season=${liga.temporada}&from=${fechaHoy}&to=${fechaLim}&status=NS`;
      const res=await fetch(url,{headers:HDR,signal:AbortSignal.timeout(8000)});
      if(!res.ok) return [];
      const data=await res.json();
      const src=data.response?.length?data.response:[];
      if(!src.length){
        const url2=`https://v3.football.api-sports.io/fixtures?league=${liga.id}&season=2025&from=${fechaHoy}&to=${fechaLim}&status=NS`;
        const res2=await fetch(url2,{headers:HDR,signal:AbortSignal.timeout(8000)});
        const d2=await res2.json();
        return (d2.response||[]).slice(0,3).map(ev=>mapEv(ev,liga.nombre));
      }
      return src.slice(0,3).map(ev=>mapEv(ev,liga.nombre));
    }catch(e){return[];}
  }
  function mapEv(ev,liga){return{
    idEvent:ev.fixture.id,
    strHomeTeam:ev.teams.home.name,
    strAwayTeam:ev.teams.away.name,
    dateEvent:ev.fixture.date.split("T")[0],
    strTime:ev.fixture.date.split("T")[1]?.slice(0,5)||"00:00",
    _liga:liga,_logoHome:ev.teams.home.logo,_logoAway:ev.teams.away.logo
  };}

  const res=await Promise.allSettled(LIGAS.map(l=>fetchLiga(l)));
  let todos=[];
  res.forEach(r=>{if(r.status==="fulfilled")todos.push(...r.value);});
  todos.sort((a,b)=>new Date(a.dateEvent+"T"+a.strTime)-new Date(b.dateEvent+"T"+b.strTime));
  todos=todos.slice(0,12);

  if(!todos.length){
    grid.innerHTML='<div class="proximos-loading"><i class="fa-solid fa-calendar-xmark"></i><br>Sin partidos próximos</div>';
    return;
  }
  grid.innerHTML="";
  todos.forEach(ev=>{
    const fechaEv=new Date(ev.dateEvent+"T"+ev.strTime+":00");
    const esHoy=ev.dateEvent===fechaHoy;
    const hora=fechaEv.toLocaleTimeString("es",{hour:"2-digit",minute:"2-digit"});
    const fechaStr=esHoy?`HOY ${hora}`:fechaEv.toLocaleDateString("es",{weekday:"short",day:"2-digit",month:"short"})+" "+hora;
    const linkData=eventosLinks[ev.idEvent]||Object.values(eventosLinks).find(e=>e.nombre&&(e.nombre.toLowerCase().includes((ev.strHomeTeam||"").toLowerCase().slice(0,6))||e.nombre.toLowerCase().includes((ev.strAwayTeam||"").toLowerCase().slice(0,6))));
    const div=document.createElement("div");
    div.className="evento-proximo";
    div.innerHTML=`
      <div class="evento-proximo-top">
        <div class="evento-proximo-info">
          <div class="evento-proximo-nombre">
            ${ev._logoHome?`<img src="${ev._logoHome}" style="width:16px;height:16px;object-fit:contain;margin-right:4px;vertical-align:middle;">`:''}
            ${ev.strHomeTeam} <span style="color:#555;margin:0 4px">vs</span> ${ev.strAwayTeam}
            ${ev._logoAway?`<img src="${ev._logoAway}" style="width:16px;height:16px;object-fit:contain;margin-left:4px;vertical-align:middle;">`:''}
          </div>
          <div class="evento-proximo-liga">${ev._liga}</div>
        </div>
        <div class="evento-proximo-fecha">
          ${esHoy?'<span class="evento-proximo-live">● HOY</span>':''}
          ${fechaStr}
        </div>
      </div>
      ${linkData?.reproductores?.length
        ?`<button class="evento-ver-btn" onclick="loadStream('${linkData.reproductores[0]}')"><i class="fa-solid fa-play"></i> VER PARTIDO</button>`
        :`<div class="evento-sin-link"><i class="fa-solid fa-clock"></i> Link próximamente</div>`}`;
    grid.appendChild(div);
  });
}

/* ── TECLADO ─────────────────────────────────────────────── */
document.addEventListener("keydown", e => {
  if(e.key==="Escape"){ closeSeriesModal(); return; }
  if(tvMode){
    showControls();
    switch(e.key){
      case " ": case "MediaPlayPause": togglePlayPause(); e.preventDefault(); return;
      case "ArrowLeft": skipVideo(e.shiftKey?-30:-10); e.preventDefault(); return;
      case "ArrowRight": skipVideo(e.shiftKey?30:10); e.preventDefault(); return;
      case "f": case "F": fullscreenPlayer(); return;
      case "m": case "M": toggleMute(); return;
    }
  }
});
document.addEventListener("mousemove",()=>{ if(tvMode) showControls(); });

/* ── DETECCIÓN TV ────────────────────────────────────────── */
function detectarTV(){
  const ua=navigator.userAgent.toLowerCase();
  if(/smarttv|androidtv|googletv|webos|tizen|hbbtv|roku|firetv/.test(ua)){
    tvMode=true; document.body.classList.add("tv-mode");
  }
}

/* ── INIT ────────────────────────────────────────────────── */
detectarTV();
cargarTodo();
cargarProximosEventos();
</script>
