<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THEY GOOD TV</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>

/* =============================================
   TV MODE - D-PAD NAVIGATION & FULLSCREEN FIX
   ============================================= */
:root {
  --focus-color: #00f0ff;
  --focus-shadow: 0 0 0 3px #00f0ff, 0 0 20px #00f0ff88;
}

/* Make ALL interactive elements focusable for D-pad */
button, .card, .event-item, [tabindex] {
  outline: none;
}
button:focus-visible,
.card:focus-visible,
.player-btn:focus-visible,
.card-play:focus-visible,
.event-btn:focus-visible {
  outline: 3px solid var(--focus-color);
  outline-offset: 2px;
  box-shadow: var(--focus-shadow);
  transform: scale(1.06);
  z-index: 10;
  position: relative;
}

/* TV Mode class (toggled by button) */
body.tv-mode {
  cursor: none;
}
body.tv-mode .container {
  flex-direction: column;
}
body.tv-mode .player-box {
  width: 100%;
  max-width: 100%;
}
body.tv-mode #video {
  width: 100vw;
  height: 56.25vw; /* 16:9 */
  max-height: 100vh;
}
body.tv-mode .sidebar {
  width: 100%;
  max-height: 40vh;
  overflow-y: auto;
}

/* FULLSCREEN OVERRIDE — fuerza al video a ocupar toda la pantalla */
#video:-webkit-full-screen {
  width: 100vw !important;
  height: 100vh !important;
  object-fit: contain;
}
#video:-moz-full-screen {
  width: 100vw !important;
  height: 100vh !important;
  object-fit: contain;
}
#video:fullscreen {
  width: 100vw !important;
  height: 100vh !important;
  object-fit: contain;
}
/* Para Android TV WebView / Chrome custom tabs */
.video-container:-webkit-full-screen {
  width: 100vw !important;
  height: 100vh !important;
}
.video-container:fullscreen {
  width: 100vw !important;
  height: 100vh !important;
}
.video-container:fullscreen video {
  width: 100% !important;
  height: 100% !important;
  object-fit: contain;
}

/* TV MODE BUTTON */
#tvModeBtn {
  background: linear-gradient(90deg, #ff6b00, #ff3d00);
  color: #fff;
  font-family: 'Orbitron', sans-serif;
  font-size: 0.7rem;
  font-weight: 700;
  border: none;
  padding: 6px 14px;
  border-radius: 6px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: transform 0.15s, box-shadow 0.15s;
}
#tvModeBtn:hover, #tvModeBtn:focus-visible {
  transform: scale(1.05);
  box-shadow: 0 0 14px #ff6b0066;
}

/* =============================================
   SECTION TITLES
   ============================================= */
.section-title {
  color: #00f0ff;
  font-family: 'Orbitron', sans-serif;
  font-size: 1.1rem;
  margin: 20px 0 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}

/* =============================================
   CARDS GRID (Películas)
   ============================================= */
.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
  gap: 12px;
  margin-bottom: 20px;
}
.card {
  background: #0a0a1a;
  border: 1px solid #00f0ff33;
  border-radius: 8px;
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.2s, border-color 0.2s;
  tabindex: 0;
}
.card:hover {
  transform: scale(1.04);
  border-color: #00f0ff;
}
.card img {
  width: 100%;
  aspect-ratio: 2/3;
  object-fit: cover;
  display: block;
}
.card-info {
  padding: 8px;
}
.card-info h4 {
  color: #fff;
  font-size: 0.75rem;
  margin: 0 0 4px;
  font-family: 'Orbitron', sans-serif;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.card-info p {
  color: #00f0ff99;
  font-size: 0.65rem;
  margin: 0 0 6px;
}
.card-play {
  background: linear-gradient(90deg, #00f0ff, #7b2fff);
  border: none;
  color: #000;
  font-size: 0.65rem;
  font-weight: bold;
  padding: 4px 8px;
  border-radius: 4px;
  cursor: pointer;
  width: 100%;
  font-family: 'Orbitron', sans-serif;
  transition: opacity 0.15s, transform 0.15s;
}
.card-play:hover, .card-play:focus-visible {
  opacity: 0.85;
  transform: scale(1.03);
}

/* =============================================
   SERIES — MODAL CON PESTAÑAS DE TEMPORADAS
   ============================================= */
#seriesModal {
  display: none;
  position: fixed;
  inset: 0;
  background: #000000cc;
  z-index: 1000;
  align-items: center;
  justify-content: center;
  padding: 16px;
}
#seriesModal.open {
  display: flex;
}
.modal-box {
  background: #07071a;
  border: 1px solid #00f0ff55;
  border-radius: 14px;
  width: 100%;
  max-width: 560px;
  max-height: 85vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  box-shadow: 0 0 60px #00f0ff22;
}
.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 18px;
  border-bottom: 1px solid #00f0ff22;
  gap: 10px;
}
.modal-header h3 {
  color: #fff;
  font-family: 'Orbitron', sans-serif;
  font-size: 0.9rem;
  margin: 0;
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.modal-close {
  background: none;
  border: 1px solid #ff003c88;
  color: #ff003c;
  border-radius: 6px;
  padding: 4px 10px;
  cursor: pointer;
  font-family: 'Orbitron', sans-serif;
  font-size: 0.7rem;
  transition: background 0.15s;
}
.modal-close:hover, .modal-close:focus-visible {
  background: #ff003c22;
}

/* Pestañas de temporadas */
.season-tabs {
  display: flex;
  gap: 6px;
  padding: 12px 18px 0;
  overflow-x: auto;
  scrollbar-width: none;
  flex-shrink: 0;
}
.season-tabs::-webkit-scrollbar { display: none; }
.season-tab {
  background: #0a0a1a;
  border: 1px solid #00f0ff44;
  color: #00f0ff99;
  font-family: 'Orbitron', sans-serif;
  font-size: 0.65rem;
  font-weight: 700;
  padding: 5px 12px;
  border-radius: 20px;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.15s;
  flex-shrink: 0;
}
.season-tab:hover, .season-tab:focus-visible {
  border-color: #00f0ff;
  color: #00f0ff;
}
.season-tab.active {
  background: linear-gradient(90deg, #00f0ff22, #7b2fff22);
  border-color: #00f0ff;
  color: #00f0ff;
  box-shadow: 0 0 10px #00f0ff33;
}

/* Lista de episodios */
.episodes-list {
  flex: 1;
  overflow-y: auto;
  padding: 12px 18px 18px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  scrollbar-width: thin;
  scrollbar-color: #00f0ff33 transparent;
}
.episode-item {
  background: #0d0d22;
  border: 1px solid #00f0ff22;
  border-radius: 8px;
  padding: 10px 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  transition: border-color 0.15s;
}
.episode-item:hover {
  border-color: #00f0ff66;
}
.episode-info {
  flex: 1;
  min-width: 0;
}
.episode-num {
  color: #00f0ff;
  font-family: 'Orbitron', sans-serif;
  font-size: 0.6rem;
  font-weight: 700;
  margin-bottom: 2px;
}
.episode-name {
  color: #fff;
  font-size: 0.78rem;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.episode-play {
  background: linear-gradient(90deg, #00f0ff, #7b2fff);
  border: none;
  color: #000;
  font-size: 0.65rem;
  font-weight: bold;
  padding: 5px 10px;
  border-radius: 4px;
  cursor: pointer;
  font-family: 'Orbitron', sans-serif;
  white-space: nowrap;
  transition: opacity 0.15s, transform 0.15s;
  flex-shrink: 0;
}
.episode-play:hover, .episode-play:focus-visible {
  opacity: 0.85;
  transform: scale(1.04);
}

/* Cards de series — abren modal */
.card.serie-card {
  cursor: pointer;
}

/* =============================================
   CANALES INTERNACIONALES (igual que Ecuador)
   ============================================= */
/* Reutiliza los estilos de .event-category / .event-menu del style.css original */
</style>
</head>
<body>

<header>
  <h1><i class="fa-solid fa-gamepad"></i> THEY GOOD TV</h1>
  <p>FUTURISTIC • LIVE SPORTS • GAMER STYLE</p>
</header>

<div class="container">

  <!-- PLAYER -->
  <div class="player-box">
    <div class="video-container" id="videoContainer">
      <video id="video" controls autoplay playsinline webkit-playsinline x5-playsinline></video>
      <button id="castBtn" onclick="castToTV()">
        <i class="fa-solid fa-tv"></i>
      </button>
    </div>
    <div class="controls">
      <button onclick="fullscreenPlayer()">
        <i class="fa-solid fa-expand"></i> FULLSCREEN
      </button>
      <button id="tvModeBtn" onclick="toggleTVMode()">
        <i class="fa-solid fa-display"></i> MODO TV
      </button>
      <button onclick="copyLink()">
        <i class="fa-solid fa-link"></i> COPIAR LINK
      </button>
      <button onclick="shareTV()">
        <i class="fa-solid fa-share"></i> COMPARTIR
      </button>
    </div>
  </div>

  <!-- SIDEBAR -->
  <div class="sidebar">

    <h2 class="events-title">
      <i class="fa-solid fa-trophy"></i> EVENTOS EN VIVO
    </h2>

    <!-- FÚTBOL -->
    <div class="event-category">
      <button class="event-btn" onclick="toggleMenu('futbolMenu')">
        <span><i class="fa-solid fa-futbol"></i> FÚTBOL</span>
        <i class="fa-solid fa-chevron-down"></i>
      </button>
      <div id="futbolMenu" class="event-menu" style="display:none"></div>
    </div>

    <!-- CICLISMO -->
    <div class="event-category">
      <button class="event-btn" onclick="toggleMenu('cyclingMenu')">
        <span><i class="fa-solid fa-person-biking"></i> CICLISMO</span>
        <i class="fa-solid fa-chevron-down"></i>
      </button>
      <div id="cyclingMenu" class="event-menu" style="display:none"></div>
    </div>

    <!-- UFC -->
    <div class="event-category">
      <button class="event-btn" onclick="toggleMenu('ufcMenu')">
        <span><i class="fa-solid fa-fire"></i> UFC / MMA</span>
        <i class="fa-solid fa-chevron-down"></i>
      </button>
      <div id="ufcMenu" class="event-menu" style="display:none"></div>
    </div>

    <!-- ECUADOR -->
    <div class="event-category">
      <button class="event-btn" onclick="toggleMenu('ecuadorMenu')">
        <span><i class="fa-solid fa-satellite-dish"></i> CANALES ECUADOR</span>
        <i class="fa-solid fa-chevron-down"></i>
      </button>
      <div id="ecuadorMenu" class="event-menu" style="display:none"></div>
    </div>

    <!-- CANALES INTERNACIONALES (nuevo) -->
    <div class="event-category">
      <button class="event-btn" onclick="toggleMenu('internacionalMenu')">
        <span><i class="fa-solid fa-earth-americas"></i> CANALES INTERNACIONALES</span>
        <i class="fa-solid fa-chevron-down"></i>
      </button>
      <div id="internacionalMenu" class="event-menu" style="display:none"></div>
    </div>

    <!-- PELÍCULAS -->
    <div class="section-title">
      <i class="fa-solid fa-film"></i> PELÍCULAS
    </div>
    <div class="cards-grid" id="peliculasGrid"></div>

    <!-- SERIES -->
    <div class="section-title">
      <i class="fa-solid fa-tv"></i> SERIES
    </div>
    <div class="cards-grid" id="seriesGrid"></div>

  </div>
</div>

<div class="footer">© 2026 THEY GOOD TV</div>

<!-- MODAL DE SERIE CON TEMPORADAS -->
<div id="seriesModal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
  <div class="modal-box">
    <div class="modal-header">
      <h3 id="modalTitle">Serie</h3>
      <button class="modal-close" onclick="closeSeriesModal()">
        <i class="fa-solid fa-xmark"></i> CERRAR
      </button>
    </div>
    <div class="season-tabs" id="seasonTabs"></div>
    <div class="episodes-list" id="episodesList"></div>
  </div>
</div>

<script>

let currentLink = "";
let hls;
let tvMode = false;
let currentSerie = null;
let currentSeason = 0;

const URL_CANALES   = "https://raw.githubusercontent.com/Thegood2006/MI-sitio-eventos/main/canales.json";
const URL_CONTENIDO = "https://raw.githubusercontent.com/Thegood2006/MI-sitio-eventos/main/contenido.json";

/* =============================================
   CARGA INICIAL
   ============================================= */
async function cargarTodo() {
  try {
    const [resCanales, resContenido] = await Promise.all([
      fetch(URL_CANALES   + "?nocache=" + Date.now()),
      fetch(URL_CONTENIDO + "?nocache=" + Date.now())
    ]);
    const canales  = await resCanales.json();
    const contenido = await resContenido.json();

    renderCategoria("futbolMenu",        canales.futbol);
    renderCategoria("cyclingMenu",       canales.ciclismo);
    renderCategoria("ufcMenu",           canales.ufc);
    renderCategoria("ecuadorMenu",       canales.ecuador);
    renderCategoria("internacionalMenu", canales.internacional); // nuevo

    renderCards("peliculasGrid", contenido.peliculas, false);
    renderCards("seriesGrid",    contenido.series,    true);  // true = es serie
  } catch(e) {
    console.error("Error cargando datos:", e);
  }
}

/* =============================================
   RENDER CANALES / EVENTOS
   ============================================= */
function renderCategoria(menuId, eventos) {
  const menu = document.getElementById(menuId);
  if (!menu || !eventos) return;
  menu.innerHTML = "";
  eventos.forEach(evento => {
    const div = document.createElement("div");
    div.className = "event-item";
    let botonesHTML = "";
    evento.reproductores.forEach((url, i) => {
      botonesHTML += `<button class="player-btn" onclick="loadStream('${url}')">
        <i class="fa-solid fa-play"></i> Reproductor ${i + 1}
      </button>`;
    });
    div.innerHTML = `
      <div class="live">● EN VIVO</div>
      <h4>${evento.nombre}</h4>
      <p>${evento.liga}</p>
      <div class="player-options">${botonesHTML}</div>`;
    menu.appendChild(div);
  });
}

/* =============================================
   RENDER CARDS (Películas y Series)
   ============================================= */
function renderCards(gridId, items, esSerie) {
  const grid = document.getElementById(gridId);
  if (!grid || !items) return;
  grid.innerHTML = "";
  items.forEach(item => {
    const div = document.createElement("div");
    div.className = esSerie ? "card serie-card" : "card";
    div.setAttribute("tabindex", "0");

    // Series → abren modal con temporadas
    // Películas → reproducen directo
    const accionBtn = esSerie
      ? `onclick="openSeriesModal(this)" data-serie='${JSON.stringify(item).replace(/'/g,"&#39;")}' `
      : `onclick="loadStream('${item.link}')"`;

    div.innerHTML = `
      <img src="${item.portada}" alt="${item.nombre}"
           onerror="this.src='https://placehold.co/130x195/0a0a1a/00f0ff?text=SIN+IMG'">
      <div class="card-info">
        <h4>${item.nombre}</h4>
        <p>${item.genero}</p>
        <button class="card-play" ${accionBtn}>
          <i class="fa-solid fa-${esSerie ? 'list' : 'play'}"></i>
          ${esSerie ? 'TEMPORADAS' : 'REPRODUCIR'}
        </button>
      </div>`;

    // D-pad: Enter también activa la card
    div.addEventListener("keydown", e => {
      if (e.key === "Enter" || e.key === " ") {
        div.querySelector(".card-play").click();
        e.preventDefault();
      }
    });

    grid.appendChild(div);
  });
}

/* =============================================
   MODAL DE SERIES CON PESTAÑAS DE TEMPORADAS
   ============================================= */

/*
  Formato esperado en contenido.json para series:
  {
    "nombre": "Breaking Bad",
    "genero": "Drama",
    "portada": "...",
    "temporadas": [
      {
        "nombre": "Temporada 1",
        "episodios": [
          { "nombre": "Piloto", "link": "https://..." },
          { "nombre": "El gato en el saco", "link": "https://..." }
        ]
      }
    ]
  }

  Si tu JSON aún usa "link" directo (sin temporadas), también funciona
  y se muestra como un solo botón reproducir.
*/

function openSeriesModal(btn) {
  const raw = btn.closest ? btn : btn.parentElement;
  // Busca el data-serie en el botón o en su card padre
  let serieData = btn.dataset?.serie || btn.closest(".card")?.querySelector("[data-serie]")?.dataset?.serie;
  if (!serieData) return;

  try {
    currentSerie = JSON.parse(serieData.replace(/&#39;/g,"'"));
  } catch(e) { return; }

  const modal = document.getElementById("seriesModal");
  document.getElementById("modalTitle").textContent = currentSerie.nombre;

  // Si tiene temporadas → pestañas; si no → compatibilidad con "link" simple
  if (currentSerie.temporadas && currentSerie.temporadas.length > 0) {
    renderSeasonTabs(currentSerie.temporadas);
    selectSeason(0);
  } else if (currentSerie.link) {
    // Fallback: sin temporadas, reproduce directo
    modal.classList.remove("open");
    loadStream(currentSerie.link);
    return;
  } else {
    document.getElementById("episodesList").innerHTML =
      `<p style="color:#888;font-size:0.8rem;text-align:center">Sin episodios disponibles</p>`;
    document.getElementById("seasonTabs").innerHTML = "";
  }

  modal.classList.add("open");
  // Foco en el botón cerrar (accesibilidad TV)
  setTimeout(() => modal.querySelector(".modal-close").focus(), 50);
}

function renderSeasonTabs(temporadas) {
  const tabs = document.getElementById("seasonTabs");
  tabs.innerHTML = "";
  temporadas.forEach((temp, i) => {
    const btn = document.createElement("button");
    btn.className = "season-tab" + (i === 0 ? " active" : "");
    btn.textContent = temp.nombre || `T${i + 1}`;
    btn.setAttribute("tabindex", "0");
    btn.onclick = () => selectSeason(i);
    tabs.appendChild(btn);
  });
}

function selectSeason(index) {
  currentSeason = index;
  const temporada = currentSerie.temporadas[index];

  // Actualizar tab activo
  document.querySelectorAll(".season-tab").forEach((t, i) => {
    t.classList.toggle("active", i === index);
  });

  // Renderizar episodios
  const list = document.getElementById("episodesList");
  list.innerHTML = "";
  if (!temporada.episodios || temporada.episodios.length === 0) {
    list.innerHTML = `<p style="color:#888;font-size:0.8rem;text-align:center">Sin episodios disponibles</p>`;
    return;
  }
  temporada.episodios.forEach((ep, i) => {
    const item = document.createElement("div");
    item.className = "episode-item";
    item.innerHTML = `
      <div class="episode-info">
        <div class="episode-num">EP ${i + 1}</div>
        <div class="episode-name">${ep.nombre || "Episodio " + (i + 1)}</div>
      </div>
      <button class="episode-play" onclick="loadStream('${ep.link}'); closeSeriesModal();">
        <i class="fa-solid fa-play"></i> PLAY
      </button>`;
    list.appendChild(item);
  });
}

function closeSeriesModal() {
  document.getElementById("seriesModal").classList.remove("open");
}

// Cerrar modal con Escape (D-pad Back también envía Escape en algunos launchers)
document.addEventListener("keydown", e => {
  if (e.key === "Escape") closeSeriesModal();
});

/* =============================================
   CARGAR STREAM — detecta mp4 o m3u8
   ============================================= */
function loadStream(url) {
  if (!url || url.startsWith("TU_LINK")) {
    alert("Este contenido aún no tiene link");
    return;
  }
  currentLink = url;
  const video = document.getElementById("video");

  if (hls) { hls.destroy(); hls = null; }

  if (url.includes(".mp4")) {
    video.src = url;
    video.load();
    video.play().catch(() => {});
    return;
  }

  // HLS (m3u8)
  if (Hls.isSupported()) {
    hls = new Hls({ enableWorker: true });
    hls.loadSource(url);
    hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED, () => video.play().catch(() => {}));
    hls.on(Hls.Events.ERROR, (event, data) => {
      if (data.fatal) window.open(url, "_blank");
    });
  } else if (video.canPlayType("application/vnd.apple.mpegurl")) {
    // Safari / iOS nativamente
    video.src = url;
    video.load();
    video.play().catch(() => {});
  } else {
    window.open(url, "_blank");
  }

  // En TV mode, scroll al video
  if (tvMode) video.scrollIntoView({ behavior: "smooth" });
}

/* =============================================
   FULLSCREEN — funciona en Android TV
   ============================================= */
function fullscreenPlayer() {
  const container = document.getElementById("videoContainer");
  const video     = document.getElementById("video");

  // Intenta fullscreen en el contenedor primero (mejor en Android TV)
  const el = container.requestFullscreen
    ? container
    : video;

  if (el.requestFullscreen) {
    el.requestFullscreen().catch(() => tryVideoFullscreen(video));
  } else if (el.webkitRequestFullscreen) {
    el.webkitRequestFullscreen();
  } else if (video.webkitEnterFullscreen) {
    // Fallback iOS / algunos Android
    video.webkitEnterFullscreen();
  } else {
    // Último recurso: abrir en nueva pestaña
    window.open(currentLink || "", "_blank");
  }
}

function tryVideoFullscreen(video) {
  if (video.webkitEnterFullscreen) {
    video.webkitEnterFullscreen();
  } else if (video.webkitRequestFullscreen) {
    video.webkitRequestFullscreen();
  }
}

/* =============================================
   DETECCIÓN AUTOMÁTICA DE TV
   Detecta Android TV, Smart TV, Fire TV, etc.
   por User Agent y tamaño de pantalla
   ============================================= */
function detectarDispositivo() {
  const ua = navigator.userAgent.toLowerCase();

  const esTV =
    ua.includes("tv") ||
    ua.includes("smarttv") ||
    ua.includes("smart-tv") ||
    ua.includes("androidtv") ||
    ua.includes("android tv") ||
    ua.includes("googletv") ||
    ua.includes("google tv") ||
    ua.includes("firetv") ||
    ua.includes("fire tv") ||
    ua.includes("webos") ||      // LG Smart TV
    ua.includes("tizen") ||      // Samsung Smart TV
    ua.includes("netcast") ||    // LG NetCast
    ua.includes("viera") ||      // Panasonic
    ua.includes("hbbtv") ||      // TV híbrida europea
    ua.includes("crkey") ||      // Chromecast
    ua.includes("roku") ||
    // Pantalla muy grande con poca resolución de puntero = TV
    (window.screen.width >= 1280 && !window.matchMedia("(pointer:fine)").matches);

  if (esTV) {
    tvMode = true;
    document.body.classList.add("tv-mode");
    // Ocultar botón modo TV (ya está en modo TV automático)
    const btn = document.getElementById("tvModeBtn");
    if (btn) btn.style.display = "none";
  }
}

function toggleTVMode() {
  tvMode = !tvMode;
  document.body.classList.toggle("tv-mode", tvMode);
  const btn = document.getElementById("tvModeBtn");
  btn.innerHTML = tvMode
    ? `<i class="fa-solid fa-display"></i> MODO NORMAL`
    : `<i class="fa-solid fa-display"></i> MODO TV`;
}

/* =============================================
   UTILIDADES
   ============================================= */
function fullscreenPlayer() {
  const container = document.getElementById("videoContainer");
  const video     = document.getElementById("video");
  const el = container;

  const fsMethod = el.requestFullscreen || el.webkitRequestFullscreen
    || el.mozRequestFullScreen || el.msRequestFullscreen;

  if (fsMethod) {
    fsMethod.call(el).catch(() => {
      // Si falla el contenedor, prueba el video directamente
      const vFs = video.requestFullscreen || video.webkitRequestFullscreen
        || video.webkitEnterFullscreen;
      if (vFs) vFs.call(video);
    });
  } else if (video.webkitEnterFullscreen) {
    video.webkitEnterFullscreen();
  }
}

function copyLink() {
  if (!currentLink) { alert("Selecciona un evento"); return; }
  navigator.clipboard.writeText(currentLink);
  alert("Link copiado");
}

async function shareTV() {
  if (!currentLink) { alert("Selecciona un evento"); return; }
  if (navigator.share) {
    await navigator.share({ title: "THEY GOOD TV", text: "Mira este contenido", url: currentLink });
  } else {
    navigator.clipboard.writeText(currentLink);
    alert("Link copiado para compartir");
  }
}

function castToTV() {
  if (!currentLink) { alert("Selecciona un evento primero"); return; }
  window.open(currentLink, "_blank");
  alert("Se abrió en Chrome.\nToca el ícono Cast en el video.");
}

function toggleMenu(menuId) {
  const menu = document.getElementById(menuId);
  menu.style.display = menu.style.display === "block" ? "none" : "block";
}

/* =============================================
   D-PAD: navegación con flechas del control remoto
   ============================================= */
document.addEventListener("keydown", e => {
  // Solo activa si hay foco en un botón / card
  const active = document.activeElement;
  if (!active) return;

  // Flechas → mueve foco entre botones/cards hermanos
  if (["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].includes(e.key)) {
    const focusables = Array.from(
      document.querySelectorAll("button:not([disabled]), .card[tabindex]")
    ).filter(el => el.offsetParent !== null); // solo visibles

    const idx = focusables.indexOf(active);
    if (idx === -1) return;

    let next = idx;
    if (e.key === "ArrowDown" || e.key === "ArrowRight") next = Math.min(idx + 1, focusables.length - 1);
    if (e.key === "ArrowUp"   || e.key === "ArrowLeft")  next = Math.max(idx - 1, 0);

    focusables[next].focus();
    focusables[next].scrollIntoView({ block: "nearest" });
    e.preventDefault();
  }
});
