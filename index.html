<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THEY GOOD TV</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
/* =============================
   COMPARTIDO
============================= */
* { box-sizing: border-box; }

.section-title {
  color: #00f0ff;
  font-family: 'Orbitron', sans-serif;
  font-size: 1.1rem;
  margin: 20px 0 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
  gap: 12px;
  margin-bottom: 20px;
}

.card {
  background: #0a0a1a;
  border: 2px solid #00f0ff33;
  border-radius: 8px;
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.2s, border-color 0.2s;
}

.card:hover, .card.focused {
  transform: scale(1.06);
  border-color: #00f0ff;
  outline: none;
}

.card img {
  width: 100%;
  aspect-ratio: 2/3;
  object-fit: cover;
  display: block;
}

.card-info { padding: 8px; }

.card-info h4 {
  color: #fff;
  font-size: 0.75rem;
  margin: 0 0 4px;
  font-family: 'Orbitron', sans-serif;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.card-info p {
  color: #00f0ff99;
  font-size: 0.65rem;
  margin: 0 0 6px;
}

.card-play {
  background: linear-gradient(90deg, #00f0ff, #7b2fff);
  border: none;
  color: #000;
  font-size: 0.65rem;
  font-weight: bold;
  padding: 4px 8px;
  border-radius: 4px;
  cursor: pointer;
  width: 100%;
  font-family: 'Orbitron', sans-serif;
}

/* =============================
   MODO TV
============================= */
body.tv-mode {
  background: #000;
  overflow: hidden;
}

body.tv-mode .container {
  display: flex;
  flex-direction: row;
  height: 100vh;
  overflow: hidden;
}

/* Sidebar TV */
body.tv-mode .sidebar {
  width: 380px;
  min-width: 380px;
  height: 100vh;
  overflow-y: auto;
  background: #05050f;
  border-right: 2px solid #00f0ff33;
  padding: 16px;
  scrollbar-width: none;
}

body.tv-mode .sidebar::-webkit-scrollbar { display: none; }

/* Player TV */
body.tv-mode .player-box {
  flex: 1;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

body.tv-mode .video-container {
  flex: 1;
  position: relative;
}

body.tv-mode #video {
  width: 100%;
  height: 100%;
  object-fit: contain;
  background: #000;
}

body.tv-mode .controls {
  display: none;
}

body.tv-mode #castBtn {
  display: none;
}

/* Botones TV focusables */
body.tv-mode .tv-btn {
  display: block;
  width: 100%;
  background: #0a0a1a;
  border: 2px solid #00f0ff33;
  color: #fff;
  font-family: 'Orbitron', sans-serif;
  font-size: 0.9rem;
  padding: 14px 16px;
  margin-bottom: 8px;
  border-radius: 8px;
  cursor: pointer;
  text-align: left;
  transition: all 0.15s;
}

body.tv-mode .tv-btn:focus,
body.tv-mode .tv-btn.focused {
  background: linear-gradient(90deg, #00f0ff22, #7b2fff22);
  border-color: #00f0ff;
  outline: none;
  transform: scale(1.02);
}

body.tv-mode .tv-section {
  margin-bottom: 8px;
}

body.tv-mode .tv-section-title {
  color: #00f0ff;
  font-family: 'Orbitron', sans-serif;
  font-size: 0.8rem;
  padding: 8px 0 4px;
  border-bottom: 1px solid #00f0ff33;
  margin-bottom: 8px;
}

body.tv-mode .tv-submenu {
  display: none;
  padding-left: 8px;
}

body.tv-mode .tv-submenu.open {
  display: block;
}

body.tv-mode .tv-item {
  background: #0d0d20;
  border: 2px solid #00f0ff22;
  border-radius: 6px;
  padding: 10px 12px;
  margin-bottom: 6px;
  color: #fff;
  font-size: 0.8rem;
}

body.tv-mode .tv-item-name {
  font-family: 'Orbitron', sans-serif;
  font-size: 0.75rem;
  margin-bottom: 4px;
  color: #fff;
}

body.tv-mode .tv-item-liga {
  color: #00f0ff99;
  font-size: 0.65rem;
  margin-bottom: 6px;
}

body.tv-mode .tv-play-btn {
  background: linear-gradient(90deg, #00f0ff, #7b2fff);
  border: none;
  color: #000;
  font-family: 'Orbitron', sans-serif;
  font-size: 0.7rem;
  font-weight: bold;
  padding: 6px 10px;
  border-radius: 4px;
  cursor: pointer;
  margin-right: 6px;
  margin-bottom: 4px;
}

body.tv-mode .tv-play-btn:focus,
body.tv-mode .tv-play-btn.focused {
  outline: 3px solid #fff;
  transform: scale(1.05);
}

/* Cards TV horizontal */
body.tv-mode .cards-grid {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

body.tv-mode .card {
  display: flex;
  flex-direction: row;
  height: 80px;
  border-radius: 6px;
}

body.tv-mode .card img {
  width: 55px;
  height: 80px;
  aspect-ratio: unset;
  object-fit: cover;
  flex-shrink: 0;
}

body.tv-mode .card-info {
  padding: 8px;
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

body.tv-mode .card-info h4 {
  font-size: 0.7rem;
  white-space: normal;
}

body.tv-mode .card-play {
  font-size: 0.6rem;
  padding: 3px 6px;
}

body.tv-mode .card:focus,
body.tv-mode .card.focused {
  border-color: #00f0ff;
  outline: none;
}

/* Header TV */
body.tv-mode header {
  padding: 8px 16px;
  background: linear-gradient(90deg, #0a0a2e, #1a0a3e);
}

body.tv-mode header h1 {
  font-size: 1.2rem;
}

body.tv-mode header p {
  font-size: 0.6rem;
}

body.tv-mode .footer { display: none; }

/* Indicador modo TV */
.tv-indicator {
  display: none;
  position: fixed;
  top: 8px;
  right: 12px;
  background: #00f0ff;
  color: #000;
  font-family: 'Orbitron', sans-serif;
  font-size: 0.6rem;
  padding: 2px 8px;
  border-radius: 4px;
  z-index: 999;
}

body.tv-mode .tv-indicator { display: block; }
</style>
</head>
<body>

<div class="tv-indicator">📺 MODO TV</div>

<header>
  <h1><i class="fa-solid fa-gamepad"></i> THEY GOOD TV</h1>
  <p>FUTURISTIC • LIVE SPORTS • GAMER STYLE</p>
</header>

<div class="container">

  <!-- PLAYER -->
  <div class="player-box">
    <div class="video-container">
      <video id="video" controls autoplay playsinline></video>
      <button id="castBtn" onclick="castToTV()">
        <i class="fa-solid fa-tv"></i>
      </button>
    </div>
    <div class="controls">
      <button onclick="fullscreenPlayer()">
        <i class="fa-solid fa-expand"></i> FULLSCREEN
      </button>
      <button onclick="copyLink()">
        <i class="fa-solid fa-link"></i> COPIAR LINK
      </button>
      <button onclick="shareTV()">
        <i class="fa-solid fa-share"></i> COMPARTIR
      </button>
    </div>
  </div>

  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">

    <h2 class="events-title">
      <i class="fa-solid fa-trophy"></i> EVENTOS EN VIVO
    </h2>

    <!-- FÚTBOL -->
    <div class="event-category tv-section">
      <button class="event-btn tv-btn" onclick="toggleMenu('futbolMenu')">
        <span><i class="fa-solid fa-futbol"></i> FÚTBOL</span>
        <i class="fa-solid fa-chevron-down"></i>
      </button>
      <div id="futbolMenu" class="event-menu tv-submenu" style="display:none"></div>
    </div>

    <!-- CICLISMO -->
    <div class="event-category tv-section">
      <button class="event-btn tv-btn" onclick="toggleMenu('cyclingMenu')">
        <span><i class="fa-solid fa-person-biking"></i> CICLISMO</span>
        <i class="fa-solid fa-chevron-down"></i>
      </button>
      <div id="cyclingMenu" class="event-menu tv-submenu" style="display:none"></div>
    </div>

    <!-- UFC -->
    <div class="event-category tv-section">
      <button class="event-btn tv-btn" onclick="toggleMenu('ufcMenu')">
        <span><i class="fa-solid fa-fire"></i> UFC / MMA</span>
        <i class="fa-solid fa-chevron-down"></i>
      </button>
      <div id="ufcMenu" class="event-menu tv-submenu" style="display:none"></div>
    </div>

    <!-- ECUADOR -->
    <div class="event-category tv-section">
      <button class="event-btn tv-btn" onclick="toggleMenu('ecuadorMenu')">
        <span><i class="fa-solid fa-satellite-dish"></i> CANALES ECUADOR</span>
        <i class="fa-solid fa-chevron-down"></i>
      </button>
      <div id="ecuadorMenu" class="event-menu tv-submenu" style="display:none"></div>
    </div>

    <!-- PELÍCULAS -->
    <div class="section-title">
      <i class="fa-solid fa-film"></i> PELÍCULAS
    </div>
    <div class="cards-grid" id="peliculasGrid"></div>

    <!-- SERIES -->
    <div class="section-title">
      <i class="fa-solid fa-tv"></i> SERIES
    </div>
    <div class="cards-grid" id="seriesGrid"></div>

  </div>
</div>

<div class="footer">© 2026 THEY GOOD TV</div>

<script>

let currentLink = "";
let hls;
let isTV = false;

/* =========================
   DETECTAR TV
========================= */
function detectarTV() {
  const ua = navigator.userAgent.toLowerCase();
  const esTVUA = /tv|android tv|smart-tv|smarttv|googletv|appletv|roku|firetv|fire tv|crkey|chromecast|aftb|aftt|afts|afte|aftm|kfaswi|kfdowi|kfgiwi|kfmewi|kfot|kftt|kfthwi|kfjwi/.test(ua);
  const esPantallaGrande = window.innerWidth >= 1200 && window.innerHeight >= 600 && !('ontouchstart' in window);
  
  if(esTVUA || esPantallaGrande) {
    document.body.classList.add('tv-mode');
    isTV = true;
    iniciarNavegacionTV();
  }
}

/* =========================
   NAVEGACIÓN TV CON CONTROL REMOTO
========================= */
function iniciarNavegacionTV() {
  document.addEventListener('keydown', function(e) {
    const focusable = getFocusables();
    const current = document.activeElement;
    const idx = focusable.indexOf(current);

    switch(e.keyCode) {
      case 38: // Arriba
        e.preventDefault();
        if(idx > 0) focusable[idx - 1].focus();
        else focusable[focusable.length - 1].focus();
        break;
      case 40: // Abajo
        e.preventDefault();
        if(idx < focusable.length - 1) focusable[idx + 1].focus();
        else focusable[0].focus();
        break;
      case 13: // OK / Enter
        e.preventDefault();
        if(current) current.click();
        break;
      case 8: // Back
      case 27: // Escape
        e.preventDefault();
        // Cerrar menú abierto
        document.querySelectorAll('.event-menu').forEach(m => m.style.display = 'none');
        // Volver foco al sidebar
        const firstBtn = document.querySelector('.tv-btn');
        if(firstBtn) firstBtn.focus();
        break;
      case 37: // Izquierda - ir al video
        e.preventDefault();
        document.getElementById('video').focus();
        break;
      case 39: // Derecha - ir al sidebar
        e.preventDefault();
        const btn = document.querySelector('.tv-btn');
        if(btn) btn.focus();
        break;
    }

    // Scroll automático para mantener el elemento visible
    if(document.activeElement) {
      document.activeElement.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
    }
  });

  // Foco inicial
  setTimeout(() => {
    const first = document.querySelector('.tv-btn');
    if(first) first.focus();
  }, 800);
}

function getFocusables() {
  return Array.from(document.querySelectorAll(
    '.tv-btn, .player-btn, .card-play, #video'
  )).filter(el => !el.disabled && el.offsetParent !== null);
}

/* =========================
   CARGAR DATOS
========================= */
const URL_CANALES = "https://raw.githubusercontent.com/Thegood2006/MI-sitio-eventos/main/canales.json";
const URL_CONTENIDO = "https://raw.githubusercontent.com/Thegood2006/MI-sitio-eventos/main/contenido.json";

async function cargarTodo() {
  try {
    const [resCanales, resContenido] = await Promise.all([
      fetch(URL_CANALES + "?nocache=" + Date.now()),
      fetch(URL_CONTENIDO + "?nocache=" + Date.now())
    ]);
    const canales = await resCanales.json();
    const contenido = await resContenido.json();
    renderCategoria("futbolMenu", canales.futbol);
    renderCategoria("cyclingMenu", canales.ciclismo);
    renderCategoria("ufcMenu", canales.ufc);
    renderCategoria("ecuadorMenu", canales.ecuador);
    renderCards("peliculasGrid", contenido.peliculas);
    renderCards("seriesGrid", contenido.series);
  } catch(e) {
    console.error("Error cargando datos:", e);
  }
}

function renderCategoria(menuId, eventos) {
  const menu = document.getElementById(menuId);
  if(!menu || !eventos) return;
  menu.innerHTML = "";
  eventos.forEach(evento => {
    const div = document.createElement("div");
    div.className = "event-item";
    let botonesHTML = "";
    evento.reproductores.forEach((url, i) => {
      botonesHTML += `<button class="player-btn tv-btn" onclick="loadStream('${url}')">
        <i class="fa-solid fa-play"></i> Reproductor ${i + 1}
      </button>`;
    });
    div.innerHTML = `
      <div class="live">● EN VIVO</div>
      <h4>${evento.nombre}</h4>
      <p>${evento.liga}</p>
      <div class="player-options">${botonesHTML}</div>`;
    menu.appendChild(div);
  });
}

function renderCards(gridId, items) {
  const grid = document.getElementById(gridId);
  if(!grid || !items) return;
  grid.innerHTML = "";
  items.forEach(item => {
    const div = document.createElement("div");
    div.className = "card";
    div.setAttribute('tabindex', '0');
    div.innerHTML = `
      <img src="${item.portada}" alt="${item.nombre}" onerror="this.src='https://placehold.co/130x195/0a0a1a/00f0ff?text=SIN+IMG'">
      <div class="card-info">
        <h4>${item.nombre}</h4>
        <p>${item.genero}</p>
        <button class="card-play" onclick="loadStream('${item.link}')">
          <i class="fa-solid fa-play"></i> REPRODUCIR
        </button>
      </div>`;
    grid.appendChild(div);
  });
}

/* =========================
   CARGAR STREAM
========================= */
function loadStream(url) {
  if(!url || url.startsWith("TU_LINK")) {
    alert("Este contenido aún no tiene link");
    return;
  }
  currentLink = url;
  const video = document.getElementById("video");
  if(hls) { hls.destroy(); hls = null; }

  if(url.includes(".mp4")) {
    video.src = url;
    video.load();
    video.play().catch(() => {});
    if(isTV) video.focus();
    return;
  }

  if(Hls.isSupported()) {
    hls = new Hls();
    hls.loadSource(url);
    hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED, function() {
      video.play().catch(() => {});
      if(isTV) video.focus();
    });
    hls.on(Hls.Events.ERROR, function(event, data) {
      if(data.fatal) window.open(url, "_blank");
    });
  } else if(video.canPlayType("application/vnd.apple.mpegurl")) {
    video.src = url;
    video.load();
    video.play().catch(() => {});
  } else {
    window.open(url, "_blank");
  }
}

/* =========================
   CONTROLES
========================= */
function fullscreenPlayer() {
  const video = document.getElementById("video");
  if(video.requestFullscreen) video.requestFullscreen();
}

function copyLink() {
  if(!currentLink) { alert("Selecciona un evento"); return; }
  navigator.clipboard.writeText(currentLink);
  alert("Link copiado");
}

async function shareTV() {
  if(!currentLink) { alert("Selecciona un evento"); return; }
  if(navigator.share) {
    await navigator.share({ title: "THEY GOOD TV", text: "Mira este contenido", url: currentLink });
  } else {
    navigator.clipboard.writeText(currentLink);
    alert("Link copiado para compartir");
  }
}

function castToTV() {
  if(!currentLink) { alert("Selecciona un evento primero"); return; }
  window.open(currentLink, "_blank");
  alert("Se abrió en Chrome.\nToca el ícono Cast en el video.");
}

function toggleMenu(menuId) {
  const menu = document.getElementById(menuId);
  const isOpen = menu.style.display === "block";
  // Cerrar todos
  document.querySelectorAll('.event-menu').forEach(m => m.style.display = 'none');
  // Abrir el seleccionado si estaba cerrado
  if(!isOpen) menu.style.display = "block";
}

/* =========================
   INICIAR
========================= */
detectarTV();
cargarTodo();

</script>
</body>
</html>
