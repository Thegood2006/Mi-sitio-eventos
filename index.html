<script>

let currentLink = "";
let hls;

/* =========================
   CARGAR STREAM
========================= */

function loadStream(url){

  currentLink = url;

  const video =
  document.getElementById("video");

  if(hls){

    hls.destroy();

  }

  if(Hls.isSupported()){

    hls = new Hls();

    hls.loadSource(url);

    hls.attachMedia(video);

    hls.on(Hls.Events.MANIFEST_PARSED,function(){

      video.play();

    });

  }else{

    video.src = url;

  }

}

/* =========================
   FULLSCREEN
========================= */

function fullscreenPlayer(){

  const video =
  document.getElementById("video");

  if(video.requestFullscreen){

    video.requestFullscreen();

  }

}

/* =========================
   COPIAR LINK
========================= */

function copyLink(){

  if(!currentLink){

    alert("Selecciona un evento");

    return;

  }

  navigator.clipboard.writeText(currentLink);

  alert("Link copiado");

}

/* =========================
   COMPARTIR
========================= */

async function shareTV(){

  if(!currentLink){

    alert("Selecciona un evento");

    return;

  }

  if(navigator.share){

    await navigator.share({

      title:"THEY GOOD TV",

      text:"Mira este evento en vivo",

      url:currentLink

    });

  }

}

/* =========================
   MENÚ DESPLEGABLE
========================= */

function toggleMenu(menuId){

  const menu =
  document.getElementById(menuId);

  if(menu.style.display === "block"){

    menu.style.display = "none";

  }else{

    menu.style.display = "block";

  }

}

</script>
