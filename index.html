<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THEY GOOD TV</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
:root {
  --focus-color: #00e1ff;
  --focus-shadow: 0 0 0 3px #00e1ff, 0 0 20px #00e1ff88;
}

button:focus-visible, .card:focus-visible, .player-btn:focus-visible,
.card-play:focus-visible, .event-btn:focus-visible, .episode-play:focus-visible {
  outline: 3px solid var(--focus-color);
  outline-offset: 2px;
  box-shadow: var(--focus-shadow);
  transform: scale(1.05);
  z-index: 10;
  position: relative;
}

/* =============================================
   TV CONTROLS BAR
   ============================================= */
#tvControls {
  display: none;
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: linear-gradient(0deg, rgba(0,0,0,.95) 0%, transparent 100%);
  padding: 20px 30px 16px;
  z-index: 500;
  flex-direction: column;
  gap: 10px;
  transition: opacity 0.4s;
}
#tvControls.visible { display: flex; }
#tvControls.hidden { opacity: 0; pointer-events: none; }

.tv-progress {
  width: 100%;
  height: 4px;
  background: rgba(255,255,255,.2);
  border-radius: 4px;
  cursor: pointer;
  position: relative;
}
.tv-progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #00e1ff, #8b00ff);
  border-radius: 4px;
  width: 0%;
  transition: width 0.5s linear;
}

.tv-btn-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
}

.tv-time {
  color: rgba(255,255,255,.8);
  font-family: 'Orbitron', sans-serif;
  font-size: 0.7rem;
  min-width: 100px;
  text-align: center;
}

.tv-ctrl-btn {
  background: rgba(255,255,255,.1);
  border: 1px solid rgba(255,255,255,.2);
  border-radius: 50%;
  color: #fff;
  cursor: pointer;
  width: 48px;
  height: 48px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  transition: .2s;
  flex-shrink: 0;
}
.tv-ctrl-btn.big {
  width: 64px;
  height: 64px;
  font-size: 24px;
  background: rgba(0,225,255,.2);
  border-color: #00e1ff;
}
.tv-ctrl-btn:hover, .tv-ctrl-btn:focus {
  background: rgba(0,225,255,.3);
  border-color: #00e1ff;
  box-shadow: 0 0 15px #00e1ff66;
  outline: none;
  transform: scale(1.1);
}

/* HINT TV */
#tvHint {
  display: none;
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(0,0,0,.85);
  border: 1px solid #00e1ff44;
  border-radius: 16px;
  padding: 24px 32px;
  z-index: 999;
  text-align: center;
  color: #fff;
  font-family: 'Orbitron', sans-serif;
}
#tvHint h3 { color: #00e1ff; font-size: 1rem; margin-bottom: 16px; }
.hint-grid {
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 8px 16px;
  text-align: left;
  font-size: 0.7rem;
}
.hint-key {
  background: rgba(0,225,255,.2);
  border: 1px solid #00e1ff;
  border-radius: 6px;
  padding: 3px 8px;
  color: #00e1ff;
  font-weight: bold;
  white-space: nowrap;
}
.hint-desc { color: rgba(255,255,255,.8); align-self: center; }

/* =============================================
   TV MODE LAYOUT
   ============================================= */
body.tv-mode { cursor: none; overflow: hidden; }

body.tv-mode .container {
  display: flex;
  flex-direction: row;
  height: calc(100vh - 70px);
  overflow: hidden;
  padding: 0;
  gap: 0;
  max-width: 100%;
}

body.tv-mode header {
  padding: 8px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
body.tv-mode header h1 { font-size: 18px; }
body.tv-mode header p { display: none; }

body.tv-mode .player-box {
  flex: 1;
  border-radius: 0;
  border: none;
  position: relative;
}
body.tv-mode .video-container { height: 100%; }
body.tv-mode #video {
  width: 100%;
  height: 100%;
  object-fit: contain;
  cursor: none;
}
body.tv-mode .controls { display: none; }
body.tv-mode #castBtn { display: none; }
body.tv-mode #tvControls { display: flex; }

body.tv-mode .sidebar {
  width: 400px;
  min-width: 400px;
  height: 100%;
  max-height: 100%;
  border-radius: 0;
  border-left: 2px solid rgba(0,225,255,.2);
  overflow-y: auto;
  padding: 14px;
  scrollbar-width: thin;
  scrollbar-color: #00e1ff33 transparent;
}

/* Botones grandes TV */
body.tv-mode .event-btn {
  font-size: 0.95rem;
  padding: 16px 18px;
  border-radius: 10px;
  margin-bottom: 8px;
}
body.tv-mode .event-btn:focus {
  outline: 3px solid #00e1ff;
  box-shadow: 0 0 20px #00e1ff88;
}
body.tv-mode .player-btn {
  font-size: 0.85rem;
  padding: 14px 16px;
  border-radius: 10px;
  margin-bottom: 6px;
}
body.tv-mode .player-btn:focus {
  outline: 3px solid #00e1ff;
  box-shadow: 0 0 20px #00e1ff88;
}
body.tv-mode .event-item { padding: 14px; margin-bottom: 10px; }
body.tv-mode .event-item h4 { font-size: 0.95rem; }
body.tv-mode .event-item p { font-size: 0.75rem; }
body.tv-mode .events-title { font-size: 1rem; }
body.tv-mode .section-title { font-size: 0.95rem; }
body.tv-mode .live { font-size: 0.75rem; }
body.tv-mode .footer { display: none; }

body.tv-mode .cards-grid {
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 10px;
}
body.tv-mode .card:focus {
  outline: 3px solid #00e1ff;
  box-shadow: 0 0 20px #00e1ff88;
}
body.tv-mode .card-play {
  font-size: 0.75rem;
  padding: 7px 10px;
}

/* Indicador TV */
#tvBadge {
  display: none;
  background: rgba(0,225,255,.15);
  border: 1px solid #00e1ff;
  color: #00e1ff;
  font-family: 'Orbitron', sans-serif;
  font-size: 0.55rem;
  padding: 3px 10px;
  border-radius: 20px;
}
body.tv-mode #tvBadge { display: inline-block; }

/* =============================================
   SECTION TITLES
   ============================================= */
.section-title {
  color: #00f0ff;
  font-family: 'Orbitron', sans-serif;
  font-size: 1.1rem;
  margin: 20px 0 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}

/* =============================================
   CARDS GRID
   ============================================= */
.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
  gap: 12px;
  margin-bottom: 20px;
}
.card {
  background: #0a0a1a;
  border: 1px solid #00f0ff33;
  border-radius: 8px;
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.2s, border-color 0.2s;
}
.card:hover { transform: scale(1.04); border-color: #00f0ff; }
.card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; display: block; }
.card-info { padding: 8px; }
.card-info h4 {
  color: #fff; font-size: 0.75rem; margin: 0 0 4px;
  font-family: 'Orbitron', sans-serif;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.card-info p { color: #00f0ff99; font-size: 0.65rem; margin: 0 0 6px; }
.card-play {
  background: linear-gradient(90deg, #00f0ff, #7b2fff);
  border: none; color: #000; font-size: 0.65rem; font-weight: bold;
  padding: 4px 8px; border-radius: 4px; cursor: pointer; width: 100%;
  font-family: 'Orbitron', sans-serif; transition: opacity 0.15s, transform 0.15s;
}
.card-play:hover { opacity: 0.85; transform: scale(1.03); }

/* =============================================
   SERIES MODAL
   ============================================= */
#seriesModal {
  display: none; position: fixed; inset: 0;
  background: #000000cc; z-index: 1000;
  align-items: center; justify-content: center; padding: 16px;
}
#seriesModal.open { display: flex; }
.modal-box {
  background: #07071a; border: 1px solid #00f0ff55;
  border-radius: 14px; width: 100%; max-width: 560px;
  max-height: 85vh; overflow: hidden; display: flex;
  flex-direction: column; box-shadow: 0 0 60px #00f0ff22;
}
.modal-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 18px; border-bottom: 1px solid #00f0ff22; gap: 10px;
}
.modal-header h3 {
  color: #fff; font-family: 'Orbitron', sans-serif; font-size: 0.9rem;
  margin: 0; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.modal-close {
  background: none; border: 1px solid #ff003c88; color: #ff003c;
  border-radius: 6px; padding: 4px 10px; cursor: pointer;
  font-family: 'Orbitron', sans-serif; font-size: 0.7rem;
}
.modal-close:hover { background: #ff003c22; }
.season-tabs {
  display: flex; gap: 6px; padding: 12px 18px 0;
  overflow-x: auto; scrollbar-width: none; flex-shrink: 0;
}
.season-tabs::-webkit-scrollbar { display: none; }
.season-tab {
  background: #0a0a1a; border: 1px solid #00f0ff44; color: #00f0ff99;
  font-family: 'Orbitron', sans-serif; font-size: 0.65rem; font-weight: 700;
  padding: 5px 12px; border-radius: 20px; cursor: pointer;
  white-space: nowrap; transition: all 0.15s; flex-shrink: 0;
}
.season-tab.active {
  background: linear-gradient(90deg, #00f0ff22, #7b2fff22);
  border-color: #00f0ff; color: #00f0ff; box-shadow: 0 0 10px #00f0ff33;
}
.episodes-list {
  flex: 1; overflow-y: auto; padding: 12px 18px 18px;
  display: flex; flex-direction: column; gap: 8px;
  scrollbar-width: thin; scrollbar-color: #00f0ff33 transparent;
}
.episode-item {
  background: #0d0d22; border: 1px solid #00f0ff22; border-radius: 8px;
  padding: 10px 12px; display: flex; align-items: center;
  justify-content: space-between; gap: 10px; transition: border-color 0.15s;
}
.episode-item:hover { border-color: #00f0ff66; }
.episode-info { flex: 1; min-width: 0; }
.episode-num { color: #00f0ff; font-family: 'Orbitron', sans-serif; font-size: 0.6rem; font-weight: 700; margin-bottom: 2px; }
.episode-name { color: #fff; font-size: 0.78rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.episode-play {
  background: linear-gradient(90deg, #00f0ff, #7b2fff); border: none;
  color: #000; font-size: 0.65rem; font-weight: bold; padding: 5px 10px;
  border-radius: 4px; cursor: pointer; font-family: 'Orbitron', sans-serif;
  white-space: nowrap; transition: opacity 0.15s; flex-shrink: 0;
}
.episode-play:hover { opacity: 0.85; }

/* TV MODE BUTTON */
#tvModeBtn {
  background: linear-gradient(90deg, #ff6b00, #ff3d00); color: #fff;
  font-family: 'Orbitron', sans-serif; font-size: 0.7rem; font-weight: 700;
  border: none; padding: 6px 14px; border-radius: 6px; cursor: pointer;
  display: flex; align-items: center; gap: 6px; transition: .3s;
}
#tvModeBtn:hover { transform: scale(1.05); box-shadow: 0 0 14px #ff6b0066; }

/* FULLSCREEN */
#video:fullscreen, #video:-webkit-full-screen { width: 100vw !important; height: 100vh !important; object-fit: contain; }
.video-container:fullscreen, .video-container:-webkit-full-screen { width: 100vw !important; height: 100vh !important; }
.video-container:fullscreen video { width: 100% !important; height: 100% !important; object-fit: contain; }
</style>
</head>
<body>

<header>
  <h1><i class="fa-solid fa-gamepad"></i> THEY GOOD TV</h1>
  <p>FUTURISTIC • LIVE SPORTS • GAMER STYLE</p>
  <span id="tvBadge"><i class="fa-solid fa-tv"></i> MODO TV</span>
</header>

<div class="container">

  <!-- PLAYER -->
  <div class="player-box">
    <div class="video-container" id="videoContainer">
      <video id="video" controls autoplay playsinline webkit-playsinline></video>
      <button id="castBtn" onclick="castToTV()">
        <i class="fa-solid fa-tv"></i>
      </button>
    </div>
    <div class="controls">
      <button onclick="fullscreenPlayer()"><i class="fa-solid fa-expand"></i> FULLSCREEN</button>
      <button id="tvModeBtn" onclick="toggleTVMode()"><i class="fa-solid fa-display"></i> MODO TV</button>
      <button onclick="copyLink()"><i class="fa-solid fa-link"></i> COPIAR LINK</button>
      <button onclick="shareTV()"><i class="fa-solid fa-share"></i> COMPARTIR</button>
    </div>
  </div>

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2 class="events-title"><i class="fa-solid fa-trophy"></i> EVENTOS EN VIVO</h2>

    <div class="event-category">
      <button class="event-btn" onclick="toggleMenu('futbolMenu')">
        <span><i class="fa-solid fa-futbol"></i> FÚTBOL</span>
        <i class="fa-solid fa-chevron-down"></i>
      </button>
      <div id="futbolMenu" class="event-menu" style="display:none"></div>
    </div>

    <div class="event-category">
      <button class="event-btn" onclick="toggleMenu('cyclingMenu')">
        <span><i class="fa-solid fa-person-biking"></i> CICLISMO</span>
        <i class="fa-solid fa-chevron-down"></i>
      </button>
      <div id="cyclingMenu" class="event-menu" style="display:none"></div>
    </div>

    <div class="event-category">
      <button class="event-btn" onclick="toggleMenu('ufcMenu')">
        <span><i class="fa-solid fa-fire"></i> UFC / MMA</span>
        <i class="fa-solid fa-chevron-down"></i>
      </button>
      <div id="ufcMenu" class="event-menu" style="display:none"></div>
    </div>

    <div class="event-category">
      <button class="event-btn" onclick="toggleMenu('ecuadorMenu')">
        <span><i class="fa-solid fa-satellite-dish"></i> CANALES ECUADOR</span>
        <i class="fa-solid fa-chevron-down"></i>
      </button>
      <div id="ecuadorMenu" class="event-menu" style="display:none"></div>
    </div>

    <div class="event-category">
      <button class="event-btn" onclick="toggleMenu('internacionalMenu')">
        <span><i class="fa-solid fa-earth-americas"></i> CANALES INTERNACIONALES</span>
        <i class="fa-solid fa-chevron-down"></i>
      </button>
      <div id="internacionalMenu" class="event-menu" style="display:none"></div>
    </div>

    <div class="section-title"><i class="fa-solid fa-film"></i> PELÍCULAS</div>
    <div class="cards-grid" id="peliculasGrid"></div>

    <div class="section-title"><i class="fa-solid fa-tv"></i> SERIES</div>
    <div class="cards-grid" id="seriesGrid"></div>
  </div>
</div>

<div class="footer">© 2026 THEY GOOD TV</div>

<!-- CONTROLES TV (solo visibles en modo TV) -->
<div id="tvControls">
  <div class="tv-progress" id="tvProgress" onclick="seekVideo(event)">
    <div class="tv-progress-fill" id="tvProgressFill"></div>
  </div>
  <div class="tv-btn-row">
    <span class="tv-time" id="tvTime">0:00 / 0:00</span>
    <button class="tv-ctrl-btn" onclick="skipVideo(-30)" title="Retroceder 30s"><i class="fa-solid fa-backward"></i></button>
    <button class="tv-ctrl-btn" onclick="skipVideo(-10)" title="Retroceder 10s"><i class="fa-solid fa-rotate-left"></i></button>
    <button class="tv-ctrl-btn big" id="tvPlayPauseBtn" onclick="togglePlayPause()" title="Play/Pausa"><i class="fa-solid fa-pause"></i></button>
    <button class="tv-ctrl-btn" onclick="skipVideo(10)" title="Adelantar 10s"><i class="fa-solid fa-rotate-right"></i></button>
    <button class="tv-ctrl-btn" onclick="skipVideo(30)" title="Adelantar 30s"><i class="fa-solid fa-forward"></i></button>
    <button class="tv-ctrl-btn" onclick="fullscreenPlayer()" title="Pantalla completa"><i class="fa-solid fa-expand"></i></button>
    <button class="tv-ctrl-btn" onclick="toggleMute()" id="tvMuteBtn" title="Silenciar"><i class="fa-solid fa-volume-high"></i></button>
  </div>
</div>

<!-- HINT DE CONTROLES TV -->
<div id="tvHint">
  <h3><i class="fa-solid fa-gamepad"></i> CONTROLES TV</h3>
  <div class="hint-grid">
    <span class="hint-key">↑ ↓ ← →</span><span class="hint-desc">Navegar menús</span>
    <span class="hint-key">OK / Enter</span><span class="hint-desc">Seleccionar</span>
    <span class="hint-key">Back / Esc</span><span class="hint-desc">Volver al menú</span>
    <span class="hint-key">Space</span><span class="hint-desc">Play / Pausa</span>
    <span class="hint-key">← →</span><span class="hint-desc">Retroceder / Adelantar</span>
    <span class="hint-key">F</span><span class="hint-desc">Pantalla completa</span>
    <span class="hint-key">M</span><span class="hint-desc">Silenciar</span>
  </div>
  <button class="tv-ctrl-btn" style="margin:16px auto 0;display:flex;border-radius:8px;width:auto;padding:8px 20px;" onclick="document.getElementById('tvHint').style.display='none'">
    ENTENDIDO
  </button>
</div>

<!-- MODAL SERIES -->
<div id="seriesModal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
  <div class="modal-box">
    <div class="modal-header">
      <h3 id="modalTitle">Serie</h3>
      <button class="modal-close" onclick="closeSeriesModal()"><i class="fa-solid fa-xmark"></i> CERRAR</button>
    </div>
    <div class="season-tabs" id="seasonTabs"></div>
    <div class="episodes-list" id="episodesList"></div>
  </div>
</div>

<script>
let currentLink = "";
let hls;
let tvMode = false;
let currentSerie = null;
let currentSeason = 0;
let controlsTimer = null;

const URL_CANALES   = "https://raw.githubusercontent.com/Thegood2006/MI-sitio-eventos/main/canales.json";
const URL_CONTENIDO = "https://raw.githubusercontent.com/Thegood2006/MI-sitio-eventos/main/contenido.json";

/* =============================================
   CARGA INICIAL
   ============================================= */
async function cargarTodo() {
  try {
    const [resCanales, resContenido] = await Promise.all([
      fetch(URL_CANALES   + "?nocache=" + Date.now()),
      fetch(URL_CONTENIDO + "?nocache=" + Date.now())
    ]);
    const canales   = await resCanales.json();
    const contenido = await resContenido.json();

    renderCategoria("futbolMenu",        canales.futbol);
    renderCategoria("cyclingMenu",       canales.ciclismo);
    renderCategoria("ufcMenu",           canales.ufc);
    renderCategoria("ecuadorMenu",       canales.ecuador);
    renderCategoria("internacionalMenu", canales.internacional);
    renderCards("peliculasGrid", contenido.peliculas, false);
    renderCards("seriesGrid",    contenido.series,    true);
  } catch(e) {
    console.error("Error cargando datos:", e);
  }
}

/* =============================================
   RENDER CANALES
   ============================================= */
function renderCategoria(menuId, eventos) {
  const menu = document.getElementById(menuId);
  if (!menu || !eventos) return;
  menu.innerHTML = "";
  eventos.forEach(evento => {
    const div = document.createElement("div");
    div.className = "event-item";
    let botonesHTML = "";
    evento.reproductores.forEach((url, i) => {
      botonesHTML += `<button class="player-btn" onclick="loadStream('${url}')">
        <i class="fa-solid fa-play"></i> Reproductor ${i + 1}
      </button>`;
    });
    div.innerHTML = `
      <div class="live">● EN VIVO</div>
      <h4>${evento.nombre}</h4>
      <p>${evento.liga}</p>
      <div class="player-options">${botonesHTML}</div>`;
    menu.appendChild(div);
  });
}

/* =============================================
   RENDER CARDS
   ============================================= */
function renderCards(gridId, items, esSerie) {
  const grid = document.getElementById(gridId);
  if (!grid || !items) return;
  grid.innerHTML = "";
  items.forEach(item => {
    const div = document.createElement("div");
    div.className = esSerie ? "card serie-card" : "card";
    div.setAttribute("tabindex", "0");

    const accionBtn = esSerie
      ? `onclick="openSeriesModal(this)" data-serie='${JSON.stringify(item).replace(/'/g,"&#39;")}'`
      : `onclick="loadStream('${item.link}')"`;

    div.innerHTML = `
      <img src="${item.portada}" alt="${item.nombre}"
           onerror="this.src='https://placehold.co/130x195/0a0a1a/00f0ff?text=SIN+IMG'">
      <div class="card-info">
        <h4>${item.nombre}</h4>
        <p>${item.genero}</p>
        <button class="card-play" ${accionBtn}>
          <i class="fa-solid fa-${esSerie ? 'list' : 'play'}"></i>
          ${esSerie ? 'TEMPORADAS' : 'REPRODUCIR'}
        </button>
      </div>`;

    div.addEventListener("keydown", e => {
      if (e.key === "Enter" || e.key === " ") { div.querySelector(".card-play").click(); e.preventDefault(); }
    });
    grid.appendChild(div);
  });
}

/* =============================================
   SERIES MODAL
   ============================================= */
function openSeriesModal(btn) {
  let serieData = btn.dataset?.serie || btn.closest(".card")?.querySelector("[data-serie]")?.dataset?.serie;
  if (!serieData) return;
  try { currentSerie = JSON.parse(serieData.replace(/&#39;/g,"'")); } catch(e) { return; }

  const modal = document.getElementById("seriesModal");
  document.getElementById("modalTitle").textContent = currentSerie.nombre;

  if (currentSerie.temporadas && currentSerie.temporadas.length > 0) {
    renderSeasonTabs(currentSerie.temporadas);
    selectSeason(0);
  } else if (currentSerie.link) {
    modal.classList.remove("open");
    loadStream(currentSerie.link);
    return;
  } else {
    document.getElementById("episodesList").innerHTML = `<p style="color:#888;font-size:0.8rem;text-align:center">Sin episodios disponibles</p>`;
    document.getElementById("seasonTabs").innerHTML = "";
  }
  modal.classList.add("open");
  setTimeout(() => modal.querySelector(".modal-close").focus(), 50);
}

function renderSeasonTabs(temporadas) {
  const tabs = document.getElementById("seasonTabs");
  tabs.innerHTML = "";
  temporadas.forEach((temp, i) => {
    const btn = document.createElement("button");
    btn.className = "season-tab" + (i === 0 ? " active" : "");
    btn.textContent = temp.nombre || `T${i + 1}`;
    btn.onclick = () => selectSeason(i);
    tabs.appendChild(btn);
  });
}

function selectSeason(index) {
  currentSeason = index;
  const temporada = currentSerie.temporadas[index];
  document.querySelectorAll(".season-tab").forEach((t, i) => t.classList.toggle("active", i === index));
  const list = document.getElementById("episodesList");
  list.innerHTML = "";
  if (!temporada.episodios || temporada.episodios.length === 0) {
    list.innerHTML = `<p style="color:#888;font-size:0.8rem;text-align:center">Sin episodios disponibles</p>`;
    return;
  }
  temporada.episodios.forEach((ep, i) => {
    const item = document.createElement("div");
    item.className = "episode-item";
    item.innerHTML = `
      <div class="episode-info">
        <div class="episode-num">EP ${i + 1}</div>
        <div class="episode-name">${ep.nombre || "Episodio " + (i + 1)}</div>
      </div>
      <button class="episode-play" onclick="loadStream('${ep.link}'); closeSeriesModal();">
        <i class="fa-solid fa-play"></i> PLAY
      </button>`;
    list.appendChild(item);
  });
}

function closeSeriesModal() {
  document.getElementById("seriesModal").classList.remove("open");
}

/* =============================================
   CARGAR STREAM
   ============================================= */
function loadStream(url) {
  if (!url || url.startsWith("TU_LINK")) { alert("Este contenido aún no tiene link"); return; }
  currentLink = url;
  const video = document.getElementById("video");
  if (hls) { hls.destroy(); hls = null; }

  if (url.includes(".mp4")) {
    video.src = url;
    video.load();
    video.play().catch(() => {});
    if (tvMode) setTimeout(() => fullscreenPlayer(), 1000);
    return;
  }

  if (Hls.isSupported()) {
    hls = new Hls({ enableWorker: true });
    hls.loadSource(url);
    hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED, () => {
      video.play().catch(() => {});
      if (tvMode) setTimeout(() => fullscreenPlayer(), 1000);
    });
    hls.on(Hls.Events.ERROR, (event, data) => {
      if (data.fatal) {
        hls.destroy(); hls = null;
        video.src = url;
        video.load();
        video.play().catch(() => {});
      }
    });
  } else if (video.canPlayType("application/vnd.apple.mpegurl")) {
    video.src = url;
    video.load();
    video.play().catch(() => {});
    if (tvMode) setTimeout(() => fullscreenPlayer(), 1000);
  } else {
    video.src = url;
    video.load();
    video.play().catch(() => {});
  }
}

/* =============================================
   CONTROLES TV
   ============================================= */
function togglePlayPause() {
  const video = document.getElementById("video");
  const btn = document.getElementById("tvPlayPauseBtn");
  if (video.paused) {
    video.play();
    btn.innerHTML = '<i class="fa-solid fa-pause"></i>';
  } else {
    video.pause();
    btn.innerHTML = '<i class="fa-solid fa-play"></i>';
  }
  showControls();
}

function skipVideo(seconds) {
  const video = document.getElementById("video");
  video.currentTime = Math.max(0, video.currentTime + seconds);
  showControls();
}

function toggleMute() {
  const video = document.getElementById("video");
  const btn = document.getElementById("tvMuteBtn");
  video.muted = !video.muted;
  btn.innerHTML = video.muted
    ? '<i class="fa-solid fa-volume-xmark"></i>'
    : '<i class="fa-solid fa-volume-high"></i>';
  showControls();
}

function seekVideo(e) {
  const video = document.getElementById("video");
  const bar = document.getElementById("tvProgress");
  const ratio = e.offsetX / bar.offsetWidth;
  video.currentTime = ratio * video.duration;
  showControls();
}

function showControls() {
  const ctrl = document.getElementById("tvControls");
  ctrl.classList.remove("hidden");
  clearTimeout(controlsTimer);
  controlsTimer = setTimeout(() => ctrl.classList.add("hidden"), 4000);
}

// Actualizar barra de progreso
const video = document.getElementById("video");
video.addEventListener("timeupdate", () => {
  if (!video.duration) return;
  const pct = (video.currentTime / video.duration) * 100;
  document.getElementById("tvProgressFill").style.width = pct + "%";
  const fmt = s => `${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,"0")}`;
  document.getElementById("tvTime").textContent = `${fmt(video.currentTime)} / ${fmt(video.duration)}`;
});

video.addEventListener("pause", () => {
  document.getElementById("tvPlayPauseBtn").innerHTML = '<i class="fa-solid fa-play"></i>';
});
video.addEventListener("play", () => {
  document.getElementById("tvPlayPauseBtn").innerHTML = '<i class="fa-solid fa-pause"></i>';
});

/* =============================================
   DETECCIÓN TV
   ============================================= */
function detectarDispositivo() {
  const ua = navigator.userAgent.toLowerCase();
  const esTV =
    ua.includes("smarttv") || ua.includes("smart-tv") ||
    ua.includes("androidtv") || ua.includes("android tv") ||
    ua.includes("googletv") || ua.includes("google tv") ||
    ua.includes("firetv") || ua.includes("fire tv") ||
    ua.includes("webos") || ua.includes("tizen") ||
    ua.includes("netcast") || ua.includes("viera") ||
    ua.includes("hbbtv") || ua.includes("crkey") || ua.includes("roku") ||
    (window.innerWidth >= 1200 && !('ontouchstart' in window) && window.innerHeight >= 600);

  if (esTV) {
    tvMode = true;
    document.body.classList.add("tv-mode");
    document.getElementById("tvModeBtn").style.display = "none";
    // Mostrar hint de controles
    setTimeout(() => {
      document.getElementById("tvHint").style.display = "block";
    }, 1500);
  }
}

function toggleTVMode() {
  tvMode = !tvMode;
  document.body.classList.toggle("tv-mode", tvMode);
  const btn = document.getElementById("tvModeBtn");
  btn.innerHTML = tvMode
    ? `<i class="fa-solid fa-display"></i> MODO NORMAL`
    : `<i class="fa-solid fa-display"></i> MODO TV`;
}

/* =============================================
   TECLADO / CONTROL REMOTO
   ============================================= */
document.addEventListener("keydown", e => {
  // Cerrar modal
  if (e.key === "Escape") { closeSeriesModal(); return; }

  // Controles de video en TV
  if (tvMode) {
    showControls();
    switch(e.key) {
      case " ": case "MediaPlayPause": togglePlayPause(); e.preventDefault(); return;
      case "ArrowLeft":  if (e.shiftKey) skipVideo(-30); else skipVideo(-10); e.preventDefault(); return;
      case "ArrowRight": if (e.shiftKey) skipVideo(30);  else skipVideo(10);  e.preventDefault(); return;
      case "f": case "F": fullscreenPlayer(); return;
      case "m": case "M": toggleMute(); return;
      case "Backspace": case "GoBack":
        // Salir de fullscreen o volver al menú
        if (document.fullscreenElement) { document.exitFullscreen(); }
        else { const first = document.querySelector(".event-btn"); if(first) first.focus(); }
        return;
    }
  }

  // Navegación D-pad entre botones
  if (["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].includes(e.key)) {
    const active = document.activeElement;
    const focusables = Array.from(
      document.querySelectorAll("button:not([disabled]), .card[tabindex='0']")
    ).filter(el => el.offsetParent !== null);
    const idx = focusables.indexOf(active);
    if (idx === -1) { if(focusables[0]) focusables[0].focus(); return; }
    let next = idx;
    if (e.key === "ArrowDown" || e.key === "ArrowRight") next = Math.min(idx + 1, focusables.length - 1);
    if (e.key === "ArrowUp"   || e.key === "ArrowLeft")  next = Math.max(idx - 1, 0);
    focusables[next].focus();
    focusables[next].scrollIntoView({ block: "nearest" });
    e.preventDefault();
  }
});

// Mostrar controles al mover ratón/tocar en TV
document.addEventListener("mousemove", () => { if(tvMode) showControls(); });
document.addEventListener("touchstart", () => { if(tvMode) showControls(); });

/* =============================================
   UTILIDADES
   ============================================= */
function fullscreenPlayer() {
  const container = document.getElementById("videoContainer");
  const vid = document.getElementById("video");
  const el = document.fullscreenElement ? null : container;
  if (!el) { document.exitFullscreen && document.exitFullscreen(); return; }
  const fs = el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen;
  if (fs) fs.call(el).catch(() => {
    const vfs = vid.requestFullscreen || vid.webkitRequestFullscreen || vid.webkitEnterFullscreen;
    if(vfs) vfs.call(vid);
  });
  else if (vid.webkitEnterFullscreen) vid.webkitEnterFullscreen();
}

function copyLink() {
  if (!currentLink) { alert("Selecciona un evento"); return; }
  navigator.clipboard.writeText(currentLink);
  alert("Link copiado");
}

async function shareTV() {
  if (!currentLink) { alert("Selecciona un evento"); return; }
  if (navigator.share) {
    await navigator.share({ title: "THEY GOOD TV", text: "Mira este contenido", url: currentLink });
  } else {
    navigator.clipboard.writeText(currentLink);
    alert("Link copiado para compartir");
  }
}

function castToTV() {
  if (!currentLink) { alert("Selecciona un evento primero"); return; }
  window.open(currentLink, "_blank");
}

function toggleMenu(menuId) {
  const menu = document.getElementById(menuId);
  menu.style.display = menu.style.display === "block" ? "none" : "block";
}

detectarDispositivo();
cargarTodo();
