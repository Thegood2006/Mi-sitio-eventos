(function() {

    if (!url || url === 'about:blank' || ADpattern.test(url)) {
      return { closed: true, close: () => {}, focus: () => {}, document: { write: () => {}, close: () => {} } };
    }
    return _open(url, ...args);
  };
  window.addEventListener("message", e => {
    if (e.data && typeof e.data === "string" && /open|redirect|navigate|popup/i.test(e.data)) {
      e.stopImmediatePropagation();
    }
  }, true);
  try {
    Object.defineProperty(window, 'top', { get: function(){ return window; }, configurable: true });
    Object.defineProperty(window, 'parent', { get: function(){ return window; }, configurable: true });
  } catch(e) {}
})();
</script>

<style>
/* ── RESET & BASE ──────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --focus-color: #00e1ff;
  --cyan: #00e1ff;
  --purple: #8b00ff;
  --bg: #050510;
  --bg2: #07071a;
  --bg3: #0d0d22;
}
body { background: var(--bg); color: #fff; font-family: sans-serif; min-height: 100vh; }

button:focus-visible, .card:focus-visible, .player-btn:focus-visible,
.card-play:focus-visible, .event-btn:focus-visible, .episode-play:focus-visible {
  outline: 3px solid var(--focus-color); outline-offset: 2px;
  box-shadow: 0 0 0 3px #00e1ff, 0 0 20px #00e1ff88;
  transform: scale(1.05); z-index: 10; position: relative;
}

/* ── HEADER ────────────────────────────────── */
header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 20px;
  background: linear-gradient(90deg, rgba(0,0,0,.98), rgba(7,7,26,.98));
  border-bottom: 1px solid rgba(0,225,255,.2);
  position: sticky; top: 0; z-index: 200;
  box-shadow: 0 4px 30px rgba(0,225,255,.07);
}
.header-left, .header-right { display: flex; align-items: center; gap: 14px; }
.logo-wrap { display: flex; align-items: center; gap: 12px; }
.logo-icon {
  width: 42px; height: 42px;
  background: linear-gradient(135deg, rgba(0,225,255,.15), rgba(139,0,255,.2));
  border: 1px solid rgba(0,225,255,.4); border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; color: #00e1ff; flex-shrink: 0;
  animation: logoGlow 3s ease-in-out infinite;
}
@keyframes logoGlow {
  0%,100% { box-shadow: 0 0 14px rgba(0,225,255,.2); }
  50% { box-shadow: 0 0 28px rgba(0,225,255,.4), 0 0 50px rgba(139,0,255,.15); }
}
header h1 {
  font-family: 'Orbitron', sans-serif; font-size: 1rem; font-weight: 900;
  background: linear-gradient(90deg, #00e1ff, #a855f7, #00e1ff);
  background-size: 200% auto; -webkit-background-clip: text;
  -webkit-text-fill-color: transparent; background-clip: text;
  letter-spacing: 2px; animation: shimmer 4s linear infinite;
}
@keyframes shimmer { from { background-position: 0%; } to { background-position: 200%; } }
header p { font-family: 'Orbitron', sans-serif; font-size: 0.42rem; color: rgba(0,225,255,.4); letter-spacing: 2px; margin: 2px 0 0; }
.header-live-dot {
  display: flex; align-items: center; gap: 6px;
  color: rgba(255,255,255,.5); font-family: 'Orbitron', sans-serif;
  font-size: 0.48rem; letter-spacing: 1.5px; padding: 4px 10px;
  border: 1px solid rgba(255,61,90,.2); border-radius: 20px;
  background: rgba(255,61,90,.06);
}
.live-pulse { width: 7px; height: 7px; background: #ff3d5a; border-radius: 50%; display: inline-block; animation: livePulse 1.4s ease infinite; }
@keyframes livePulse { 0%,100% { box-shadow: 0 0 0 0 rgba(255,61,90,.7); } 50% { box-shadow: 0 0 0 5px rgba(255,61,90,0); } }
#tvBadge {
  display: none; background: rgba(0,225,255,.15); border: 1px solid #00e1ff;
  color: #00e1ff; font-family: 'Orbitron', sans-serif;
  font-size: 0.55rem; padding: 3px 10px; border-radius: 20px;
}
body.tv-mode #tvBadge { display: inline-block; }

/* ── LAYOUT ────────────────────────────────── */
.container {
  display: flex; gap: 16px; padding: 16px;
  max-width: 1400px; margin: 0 auto;
}
.player-box {
  flex: 1; background: #000; border-radius: 16px;
  overflow: hidden; box-shadow: 0 0 50px rgba(0,225,255,.06);
  border: 1px solid rgba(0,225,255,.1); min-width: 0;
}
.video-container { position: relative; width: 100%; background: #000; min-height: 280px; }
#video { width: 100%; display: block; background: #000; }
.sidebar {
  width: 380px; min-width: 320px; max-height: calc(100vh - 80px);
  overflow-y: auto; padding: 14px;
  background: linear-gradient(180deg, rgba(6,6,22,.99), rgba(3,3,14,.99));
  border: 1px solid rgba(0,225,255,.1); border-radius: 16px;

}

/* ── CONTROLES ─────────────────────────────── */

}

.controls button:hover {

/* ── TABS ──────────────────────────────────── */

/* ── EVENT ITEMS ───────────────────────────── */
.events-title {

}
.event-item h4 { color: #fff; font-size: 0.8rem; margin-bottom: 2px; }
.event-item p { color: rgba(0,225,255,.7); font-size: 0.65rem; margin-bottom: 8px; }
.player-options { display: flex; flex-wrap: wrap; gap: 6px; }
.player-btn {
  background: linear-gradient(135deg, rgba(0,225,255,.1), rgba(123,47,255,.1));
  border: 1px solid rgba(0,225,255,.25); border-radius: 8px;
  color: #00e1ff; font-family: 'Orbitron', sans-serif; font-size: 0.6rem;

}
.player-btn:hover { background: rgba(0,225,255,.2); border-color: #00e1ff; }
.player-btn.caido { opacity: 0.4; background: linear-gradient(135deg, #333, #222); border-color: #444; color: #666; }

/* ── CARDS ─────────────────────────────────── */
.section-title {
  color: #00f0ff; font-family: 'Orbitron', sans-serif;
  font-size: 0.72rem; letter-spacing: 2.5px;
  border-bottom: 1px solid rgba(0,225,255,.1);

}
.cards-grid {

}
.card {

}

.card-info { padding: 8px; }

}

}

/* ── SEARCH BOX ─────────────────────────────── */
.search-box { display: flex; gap: 8px; margin-bottom: 14px; }
.search-box input {

}
.search-box input:focus { border-color: #00e1ff; box-shadow: 0 0 10px rgba(0,225,255,.2); }
.search-box button {
  background: linear-gradient(135deg, #00e1ff, #0011ff); border: none;
  border-radius: 10px; color: #fff; font-family: 'Orbitron', sans-serif;

}

.search-results-label { color: #00e1ff; font-size: 0.65rem; margin-bottom: 8px; letter-spacing: 1px; }

/* ── BANNER ─────────────────────────────────── */
.banner-estrenos {

.banner-arrow {

}
.banner-arrow:hover { background: rgba(0,225,255,.2); }

.banner-dots { position: absolute; bottom: 8px; right: 10px; display: flex; gap: 4px; z-index: 10; }
.banner-dot { width: 5px; height: 5px; border-radius: 50%; background: rgba(255,255,255,.3); border: none; cursor: pointer; transition: .2s; padding: 0; }
.banner-dot.active { background: #00e1ff; width: 14px; border-radius: 3px; }

.episode-num { color: #00f0ff; font-family: 'Orbitron', sans-serif; font-size: 0.6rem; font-weight: 700; margin-bottom: 2px; }

.episode-play { background: linear-gradient(90deg, #00f0ff, #7b2fff); border: none; color: #000; font-size: 0.65rem; font-weight: bold; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-family: 'Orbitron', sans-serif; white-space: nowrap; }

.ep-visto-badge { font-size: 0.55rem; color: #00ff99; background: rgba(0,255,153,.12); border: 1px solid rgba(0,255,153,.3); border-radius: 10px; padding: 2px 7px; white-space: nowrap; }

.modal-nav-btn { background: rgba(0,225,255,.06); border: 1px solid rgba(0,225,255,.2); color: #00e1ff; font-family: 'Orbitron', sans-serif; font-size: 0.6rem; padding: 7px 14px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 6px; }

.modal-ep-counter { color: rgba(255,255,255,.4); font-size: 0.6rem; align-self: center; font-family: 'Orbitron', sans-serif; }

/* ── PRÓXIMOS EVENTOS ───────────────────────── */

/* ── TMDB MODAL ─────────────────────────────── */

/* ── CAST ───────────────────────────────────── */
#castIndicator {

.cast-dot { width: 7px; height: 7px; background: #00ff99; border-radius: 50%; animation: livePulse 1.2s ease infinite; }
@keyframes castPulse { 0%,100% { box-shadow: 0 0 10px #00ff9944; } 50% { box-shadow: 0 0 20px #00ff99aa; } }
#stopCastBtn { background: linear-gradient(135deg, rgba(255,61,90,.15), rgba(180,0,0,.15)); border: 1px solid rgba(255,61,90,.5); color: #ff3d5a; padding: 7px 12px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 0.58rem; display: flex; align-items: center; gap: 5px; font-family: 'Orbitron', sans-serif; }

<script>
/* ══════════════════════════════════════════════
   VARIABLES GLOBALES
══════════════════════════════════════════════ */
let currentLink = "";
let tvMode = false;
let currentSerie = null;
let currentSeason = 0;
let currentEpisodeIndex = -1;
let controlsTimer = null;
let contenidoGlobal = { peliculas: [], series: [] };
let currentTipo = 'm3u8';

const RENDER_SERVER = "https://theygoodtv-server.onrender.com";
const URL_CANALES   = "https://raw.githubusercontent.com/Thegood2006/MI-sitio-eventos/main/canales.json";
const URL_CONTENIDO = "https://raw.githubusercontent.com/Thegood2006/MI-sitio-eventos/main/contenido.json";

/* ══════════════════════════════════════════════
   DETECCIÓN DE CANALES BLOQUEADOS POR X-Frame-Options
   Canales que SÍ permiten iframe: solo streams m3u8 o embeds de terceros
   Canales oficiales (.com, .ec, etc.) normalmente bloquean el embed
══════════════════════════════════════════════ */

// Dominios que sabemos que bloquean iframes (canales oficiales)
const DOMINIOS_BLOQUEADOS = [
  'tctelevision.ec', 'tc.ec', 'tc.com',
  'rcnmundo.com', 'rcn.com.co', 'canalrcn.com',
  'canal1.com.co', 'canal1.co',
  'caracoltv.com', 'caracol.com.co',
  'teleamazonas.com', 'ecuavisa.com',
  'gamatv.com.ec', 'rts.com.ec',
  'televicentro.com.hn', 'tvazteca.com',
  'televisa.com', 'univision.com',
  'cnn.com', 'bbc.com', 'foxsports.com',
  'espn.com', 'nbc.com', 'abc.com', 'cbs.com'
];

function esDominioBloqueado(url) {
  try {
    const hostname = new URL(url).hostname.replace('www.','');
    return DOMINIOS_BLOQUEADOS.some(d => hostname.includes(d));
  } catch(e) { return false; }
}

/* ══════════════════════════════════════════════
   CARGA INICIAL
══════════════════════════════════════════════ */
async function cargarTodo() {
  try {
    let canales;
    try {
      const renderRes = await fetch(RENDER_SERVER + "/streams", { signal: AbortSignal.timeout(8000) });
      if (renderRes.ok) { canales = await renderRes.json(); } else { throw new Error(); }
    } catch {
      const resCanales = await fetch(URL_CANALES + "?nocache=" + Date.now());
      canales = await resCanales.json();
    }
    const resContenido = await fetch(URL_CONTENIDO + "?nocache=" + Date.now());
    const contenido = await resContenido.json();
    renderCategoria("futbolMenu",        canales.futbol);
    renderCategoria("cyclingMenu",       canales.ciclismo);
    renderCategoria("ufcMenu",           canales.ufc);
    renderCategoria("ecuadorMenu",       canales.ecuador);
    renderCategoria("internacionalMenu", canales.internacional);
    contenidoGlobal = contenido;
    renderCards("peliculasGrid", contenido.peliculas, false);
    renderCards("seriesGrid",    contenido.series,    true);
    if (canales.ultima_verificacion) mostrarUltimaVerificacion(canales.ultima_verificacion);
    initBanner(contenido.peliculas);
    initBannerSeries(contenido.series);
  } catch(e) { console.error("Error cargando datos:", e); }
}

/* ══════════════════════════════════════════════
   RENDER CANALES
══════════════════════════════════════════════ */
function renderCategoria(menuId, eventos) {
  const menu = document.getElementById(menuId);
  if (!menu || !eventos) return;
  menu.innerHTML = "";
  eventos.forEach((evento, idx) => {
    const div = document.createElement("div");
    div.className = "event-item";
    const tipoEvento = evento.tipo || 'm3u8';
    const urls = evento.reproductores || [];
    let botonesHTML = "";
    urls.forEach((url, i) => {
      const estaActivo = evento.estados ? evento.estados[i] : true;
      const cls = estaActivo === false ? "player-btn caido" : "player-btn";
      const safeUrl = url.replace(/'/g,"\\'");
      botonesHTML += `<button class="${cls}" onclick="loadStream('${safeUrl}','${tipoEvento}')"><i class="fa-solid fa-play"></i> Servidor ${i+1}</button>`;
    });
    div.innerHTML = `
      <div class="live">● EN VIVO</div>
      <h4>${evento.nombre}</h4>
      <p>${evento.liga}</p>
      <div class="player-options">${botonesHTML}</div>`;
    menu.appendChild(div);
  });
}

function mostrarUltimaVerificacion(ts) {
  const sidebar = document.querySelector(".sidebar");
  if (!sidebar || !ts) return;
  const div = document.createElement("div");
  div.className = "ultima-verificacion";
  div.innerHTML = `<i class="fa-solid fa-clock"></i> Verificado: ${ts}`;
  sidebar.appendChild(div);
}

/* ══════════════════════════════════════════════
   CARGAR STREAM — CON MANEJO DE IFRAMES BLOQUEADOS
══════════════════════════════════════════════ */
function loadStream(url, tipo) {
  if (!url || url.startsWith("TU_LINK") || url.trim() === "") {
    mostrarError("⚠️ Este canal no tiene link asignado todavía.");
    return;
  }

  currentLink = url;

  // Detectar tipo automáticamente
  const esM3U8 = url.includes(".m3u8") || url.includes("chunklist") || url.includes("playlist") || tipo === 'm3u8';
  const esIframe =
    tipo === 'iframe' ||
    url.includes("fastream") || url.includes("2embed") ||
    url.includes("vidsrc") || url.includes("dood") || url.includes("embed") ||
    (url.endsWith(".html") && !url.includes(".m3u8"));
  const esMp4 = !esM3U8 && !esIframe;

  currentTipo = esM3U8 ? 'm3u8' : esIframe ? 'iframe' : 'mp4';

  // Destruir HLS anterior si existe
  if (window._hls) { window._hls.destroy(); window._hls = null; }

  const container = document.getElementById("videoContainer");

  /* ── CANAL OFICIAL BLOQUEADO ──────────────── */
  if (esIframe && esDominioBloqueado(url)) {
    mostrarCanalBloqueado(url);
    return;
  }

  /* ── IFRAME con bloqueo de ads ──────────── */
  if (esIframe) {
    crearIframeConAdBlock(container, url);
    return;
  }

  /* ── VIDEO NATIVO (m3u8 / mp4) ─────────── */
  container.innerHTML = "";
  const video = crearVideoElement();
  const castInd = crearCastIndicator();
  container.appendChild(video);
  container.appendChild(castInd);

  video.addEventListener("timeupdate", actualizarBarraTV);
  video.addEventListener("pause", () => { const b = document.getElementById("tvPlayPauseBtn"); if(b) b.innerHTML='<i class="fa-solid fa-play"></i>'; });
  video.addEventListener("play",  () => { const b = document.getElementById("tvPlayPauseBtn"); if(b) b.innerHTML='<i class="fa-solid fa-pause"></i>'; });

  if (esM3U8 && typeof Hls !== 'undefined' && Hls.isSupported()) {
    window._hls = new Hls({ enableWorker: true, lowLatencyMode: true, backBufferLength: 90 });
    window._hls.loadSource(url);
    window._hls.attachMedia(video);
    window._hls.on(Hls.Events.MANIFEST_PARSED, () => video.play().catch(() => { video.muted = true; video.play(); }));
    window._hls.on(Hls.Events.ERROR, (e, d) => {
      if (d.fatal) { if(d.type===Hls.ErrorTypes.NETWORK_ERROR) window._hls.startLoad(); else if(d.type===Hls.ErrorTypes.MEDIA_ERROR) window._hls.recoverMediaError(); else window._hls.destroy(); }
    });
    return;
  }
  if (esM3U8 && video.canPlayType("application/vnd.apple.mpegurl")) {
    video.src = url;
    video.addEventListener("loadedmetadata", () => video.play().catch(() => { video.muted = true; video.play(); }));
    return;
  }
  video.src = url;
  video.play().catch(() => { video.muted = true; video.play(); });
}

function crearVideoElement() {
  const v = document.createElement("video");
  v.id = "video"; v.controls = true; v.autoplay = true; v.playsInline = true;
  v.setAttribute("webkit-playsinline",""); v.crossOrigin = "anonymous";
  v.style.cssText = "width:100%;display:block;background:#000;min-height:280px;";
  return v;
}

function crearCastIndicator() {
  const d = document.createElement("div");
  d.id = "castIndicator";
  d.innerHTML = '<span class="cast-dot"></span><i class="fa-solid fa-tv"></i> TRANSMITIENDO';
  return d;
}

/* ──────────────────────────────────────────────
   IFRAME CON BLOQUEO AGRESIVO DE PUBLICIDAD
   Técnicas usadas:
   1. sandbox sin allow-popups ni allow-top-navigation → no puede abrir ventanas
   2. Capas overlay en zonas típicas de banners (bordes)
   3. Interceptor de clicks en overlay que bloquea propagación
   4. postMessage blocker para redirecciones
   5. Inyección CSS cuando es same-origin
────────────────────────────────────────────── */
function crearIframeConAdBlock(container, url) {
  container.innerHTML = "";

  const wrapper = document.createElement("div");
  wrapper.className = "iframe-wrapper";

  const iframe = document.createElement("iframe");
  iframe.src = url;
  iframe.setAttribute("allowfullscreen", "");
  iframe.setAttribute("allow", "autoplay; encrypted-media; fullscreen; picture-in-picture");
  iframe.setAttribute("referrerpolicy", "no-referrer");
  // CLAVE: sin allow-popups → bloquea apertura de ventanas emergentes
  // sin allow-top-navigation → no puede redirigir la página principal
  iframe.setAttribute("sandbox", "allow-scripts allow-same-origin allow-forms allow-presentation");

  // Intentar inyectar CSS bloqueador si es same-origin
  iframe.addEventListener("load", () => {
    try {
      const doc = iframe.contentDocument || iframe.contentWindow?.document;
      if (doc && doc.head) {
        const style = doc.createElement("style");
        style.textContent = getAdBlockCSS();
        doc.head.appendChild(style);
        // Bloquear window.open dentro del iframe
        if (iframe.contentWindow) {
          iframe.contentWindow.open = () => ({ closed: true, close(){}, focus(){} });
        }
      }
    } catch(e) { /* cross-origin: el sandbox ya bloqueó popups */ }
  });

  // Overlays que interceptan clics en zonas de anuncios
  // (top bar, bottom bar, left side, right side)
  const zonas = [
    { style: "top:0;left:0;right:0;height:55px" },          // banner superior
    { style: "bottom:0;left:0;right:0;height:65px" },        // banner inferior
    { style: "top:55px;bottom:65px;left:0;width:80px" },     // barra izquierda
    { style: "top:55px;bottom:65px;right:0;width:80px" },    // barra derecha
  ];
  zonas.forEach(z => {
    const ov = document.createElement("div");
    ov.className = "ad-click-trap";
    ov.style.cssText = `position:absolute;${z.style};`;
    // Bloquear click y evitar propagación hacia el iframe
    ov.addEventListener("click", e => { e.stopPropagation(); e.preventDefault(); });
    ov.addEventListener("mousedown", e => e.preventDefault());
    wrapper.appendChild(ov);
  });

  // Badge AD Shield
  const badge = document.createElement("div");
  badge.className = "ad-shield-badge";
  badge.innerHTML = '<i class="fa-solid fa-shield-halved"></i> AD SHIELD ON';

  // Indicador de cast
  const castInd = crearCastIndicator();

  wrapper.appendChild(iframe);
  wrapper.appendChild(badge);
  wrapper.appendChild(castInd);
  container.appendChild(wrapper);
}

// CSS que se inyecta inside del iframe cuando es same-origin
function getAdBlockCSS() {
  return `
    [id*="ad-"],[id*="banner"],[id*="popup"],[id*="overlay"],[id*="modal-ad"],[id*="advertisement"],
    [class*="banner-ad"],[class*="popup"],[class*="modal-ad"],[class*="overlay-ad"],[class*="sponsor"],
    [class*="advertisement"],[class*="interstitial"],[class*="preroll"],[class*="vast-"],[class*="ima-"],
    [class*="adsense"],[class*="google-ad"],[class*="dfp-"],[class*="pubads"],[class*="taboola"],
    [class*="outbrain"],[class*="mgid"],[class*="propeller"],
    a[href*="track"],a[href*="click"],
    iframe[src*="ads"],iframe[src*="track"],iframe[src*="doubleclick"],iframe[src*="googlesyndication"],
    div[style*="z-index: 2147483647"],div[style*="z-index:2147483647"] { display:none!important; }
    body { overflow:hidden!important; }
    video { width:100vw!important; height:100vh!important; }
  `;
}

/* ──────────────────────────────────────────────
   CANAL BLOQUEADO (X-Frame-Options)
   Se muestra cuando el canal es de un dominio oficial
   que no permite ser embebido en iframes.
────────────────────────────────────────────── */
function mostrarCanalBloqueado(url) {
  const container = document.getElementById("videoContainer");
  container.innerHTML = "";

  let nombreCanal = url;
  try { nombreCanal = new URL(url).hostname.replace('www.',''); } catch(e){}

  const div = document.createElement("div");
  div.className = "blocked-notice";
  div.innerHTML = `
    <div class="icon"><i class="fa-solid fa-shield-halved"></i></div>
    <h3>CANAL CON PROTECCIÓN ANTI-IFRAME</h3>
    <p>
      <strong>${nombreCanal}</strong> usa políticas de seguridad (<em>X-Frame-Options / CSP</em>)
      que impiden mostrar su contenido dentro de esta página.<br><br>
      Esto es una restricción del canal, no un error del reproductor.
    </p>
    <p style="color:rgba(255,200,0,.7)">
      <i class="fa-solid fa-lightbulb"></i>
      <strong>Solución:</strong> En tu <code>canales.json</code>, usa el link M3U8 del stream
      del canal en vez de la URL de su página web.
      Ejemplo: en vez de <code>tctelevision.ec</code> usa su stream
      <code>https://...tc...stream.m3u8</code>
    </p>
    <button class="blocked-btn" onclick="window.open('${url}','_blank')">
      <i class="fa-solid fa-arrow-up-right-from-square"></i> ABRIR EN NUEVA PESTAÑA
    </button>`;
  container.appendChild(div);
}

function renderCards(gridId, items, esSerie) {
  const grid = document.getElementById(gridId);
  if (!grid || !items) return;
  grid.innerHTML = "";
  items.forEach(item => {
    const div = document.createElement("div");
    div.className = esSerie ? "card serie-card" : "card";
    div.setAttribute("tabindex","0");
    const accionBtn = esSerie
      ? `onclick="openSeriesModal(this)" data-serie='${JSON.stringify(item).replace(/'/g,"&#39;")}'`
      : `onclick="loadStream(this.dataset.link)" data-link="${(item.link||'').replace(/"/g,'&quot;')}"`;
    div.innerHTML = `
      <img src="${item.portada}" alt="${item.nombre}" onerror="this.src='https://placehold.co/130x195/0a0a1a/00f0ff?text=SIN+IMG'">
      <div class="card-info">
        <h4>${item.nombre}</h4>
        <p>${item.genero}</p>
        <button class="card-play" ${accionBtn}>
          <i class="fa-solid fa-${esSerie?'list':'play'}"></i> ${esSerie?'TEMPORADAS':'REPRODUCIR'}
        </button>
      </div>`;
    div.addEventListener("keydown", e => { if(e.key==="Enter"||e.key===" "){ div.querySelector(".card-play").click(); e.preventDefault(); }});
    grid.appendChild(div);
  });
}

══════════════════════════════════════════════ */
function openSeriesModal(btn) {
  let serieData = btn.dataset?.serie || btn.closest(".card")?.querySelector("[data-serie]")?.dataset?.serie;
  if (!serieData) return;
  try { currentSerie = JSON.parse(serieData.replace(/&#39;/g,"'")); } catch(e) { return; }
  const modal = document.getElementById("seriesModal");
  document.getElementById("modalTitle").textContent = currentSerie.nombre;
  if (currentSerie.temporadas?.length > 0) {
    renderSeasonTabs(currentSerie.temporadas);
    selectSeason(0);
  } else if (currentSerie.link) {
    loadStream(currentSerie.link); return;
  }
  modal.classList.add("open");
}

function renderSeasonTabs(temporadas) {
  const tabs = document.getElementById("seasonTabs");
  tabs.innerHTML = "";
  temporadas.forEach((t, i) => {
    const btn = document.createElement("button");
    btn.className = "season-tab" + (i===0?" active":"");
    btn.textContent = t.nombre || `T${i+1}`;
    btn.onclick = () => selectSeason(i);
    tabs.appendChild(btn);
  });
}

function selectSeason(index) {
  currentSeason = index; currentEpisodeIndex = -1;
  const temporada = currentSerie.temporadas[index];
  document.querySelectorAll(".season-tab").forEach((t,i) => t.classList.toggle("active",i===index));
  const list = document.getElementById("episodesList");
  list.innerHTML = "";
  if (!temporada.episodios?.length) { list.innerHTML = '<p style="color:#888;font-size:0.8rem;text-align:center;padding:20px">Sin episodios disponibles</p>'; return; }
  temporada.episodios.forEach((ep, i) => {
    const clave = `visto_${currentSerie.nombre}_t${currentSeason}_e${i}`;
    const visto = localStorage.getItem(clave) === "1";
    const item = document.createElement("div");
    item.className = "episode-item" + (visto?" visto":"");
    item.id = `ep-item-${i}`;
    item.innerHTML = `
      <div class="episode-info">
        <div class="episode-num">EP ${i+1}</div>
        <div class="episode-name">${ep.nombre||"Episodio "+(i+1)}</div>
      </div>
      ${visto?'<span class="ep-visto-badge"><i class="fa-solid fa-check"></i> VISTO</span>':''}
      <button class="episode-play" onclick="reproducirEpisodio(${i},'${(ep.link||'').replace(/'/g,"\\'")}')">
        <i class="fa-solid fa-play"></i> PLAY
      </button>`;
    list.appendChild(item);
  });
  actualizarNavEpisodios();
}

function reproducirEpisodio(idx, link) {
  currentEpisodeIndex = idx;
  const clave = `visto_${currentSerie.nombre}_t${currentSeason}_e${idx}`;
  localStorage.setItem(clave,"1");
  const item = document.getElementById(`ep-item-${idx}`);
  if (item) {
    item.classList.add("visto");
    if (!item.querySelector(".ep-visto-badge")) {
      const b = document.createElement("span"); b.className="ep-visto-badge"; b.innerHTML='<i class="fa-solid fa-check"></i> VISTO';
      item.insertBefore(b, item.querySelector(".episode-play"));
    }
  }
  actualizarNavEpisodios();
  loadStream(link);
  closeSeriesModal();
}

function actualizarNavEpisodios() {
  const temp = currentSerie?.temporadas?.[currentSeason];
  const total = temp?.episodios?.length || 0;
  const prev = document.getElementById("btnEpPrev");
  const next = document.getElementById("btnEpNext");
  const cnt  = document.getElementById("epCounter");
  if (prev) prev.disabled = currentEpisodeIndex <= 0;
  if (next) next.disabled = currentEpisodeIndex < 0 || currentEpisodeIndex >= total-1;
  if (cnt) cnt.textContent = currentEpisodeIndex >= 0 && total > 0 ? `EP ${currentEpisodeIndex+1} / ${total}` : (total > 0 ? `${total} eps` : "");
}

function navegarEpisodio(dir) {
  if (!currentSerie || currentEpisodeIndex < 0) return;
  const temp = currentSerie.temporadas[currentSeason];
  const newIdx = currentEpisodeIndex + dir;
  if (newIdx < 0 || newIdx >= temp.episodios.length) return;
  reproducirEpisodio(newIdx, temp.episodios[newIdx].link);
}

function closeSeriesModal() { document.getElementById("seriesModal").classList.remove("open"); }

function actualizarBarraTV() {
  const video = document.getElementById("video");
  if (!video || !video.duration) return;
  const pct = (video.currentTime / video.duration) * 100;
  const fill = document.getElementById("tvProgressFill");
  const time = document.getElementById("tvTime");
  if (fill) fill.style.width = pct + "%";
  if (time) { const f = s=>`${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,"0")}`; time.textContent = `${f(video.currentTime)} / ${f(video.duration)}`; }
}

function togglePlayPause() { const v=document.getElementById("video"); if(!v)return; const b=document.getElementById("tvPlayPauseBtn"); if(v.paused){v.play();if(b)b.innerHTML='<i class="fa-solid fa-pause"></i>';}else{v.pause();if(b)b.innerHTML='<i class="fa-solid fa-play"></i>';} showControls(); }
function skipVideo(s) { const v=document.getElementById("video"); if(!v)return; v.currentTime=Math.max(0,v.currentTime+s); showControls(); }
function toggleMute() { const v=document.getElementById("video"); if(!v)return; v.muted=!v.muted; const b=document.getElementById("tvMuteBtn"); if(b) b.innerHTML=v.muted?'<i class="fa-solid fa-volume-xmark"></i>':'<i class="fa-solid fa-volume-high"></i>'; showControls(); }
function seekVideo(e) { const v=document.getElementById("video"); if(!v||!v.duration)return; const bar=document.getElementById("tvProgress"); v.currentTime=(e.offsetX/bar.offsetWidth)*v.duration; showControls(); }
function showControls() { const c=document.getElementById("tvControls"); c.classList.remove("hidden"); clearTimeout(controlsTimer); controlsTimer=setTimeout(()=>c.classList.add("hidden"),4000); }

function fullscreenPlayer() {
  const c = document.getElementById("videoContainer");
  const v = document.getElementById("video");
  if (document.fullscreenElement) { document.exitFullscreen(); return; }
  const fs = c.requestFullscreen || c.webkitRequestFullscreen || c.mozRequestFullScreen;
  if (fs) fs.call(c).catch(()=>{ if(v&&v.webkitEnterFullscreen) v.webkitEnterFullscreen(); });
  else if (v&&v.webkitEnterFullscreen) v.webkitEnterFullscreen();
}
function copyLink() { if(!currentLink){alert("Selecciona un evento");return;} navigator.clipboard.writeText(currentLink); alert("Link copiado ✓"); }
async function shareTV() { if(!currentLink){alert("Selecciona un evento");return;} if(navigator.share){await navigator.share({title:"THEY GOOD TV",url:currentLink});}else{navigator.clipboard.writeText(currentLink);alert("Link copiado ✓");} }

function filtrarTV(query) {
  const q = query.trim().toLowerCase();
  const grid = document.getElementById('tvSearchGrid');

  if (!q) { grid.style.display='none'; label.style.display='none'; return; }

  all.forEach(item => { const n=item.querySelector('h4')?.textContent||''; const l=item.querySelector('p')?.textContent||''; if(n.toLowerCase().includes(q)||l.toLowerCase().includes(q)) found.push(item.cloneNode(true)); });

function filtrarSeries(query) {
  const q=query.trim().toLowerCase();
  const grid=document.getElementById('seriesSearchGrid');

}

const TMDB_KEY = "48ad3d1469534954a306bf380db6bfe0";
const TMDB_BASE = "https://api.themoviedb.org/3";
const TMDB_IMG  = "https://image.tmdb.org/t/p/w500";

async function buscarTMDb() {
  const query = document.getElementById("tmdbSearch").value.trim();
  if (!query) return;
  const grid=document.getElementById("searchGrid"); const label=document.getElementById("searchLabel");
  grid.innerHTML='<p style="color:#00e1ff;font-size:0.7rem;grid-column:1/-1">Buscando...</p>';
  grid.style.display="grid"; label.style.display="block";
  try {
    const res=await fetch(`${TMDB_BASE}/search/multi?api_key=${TMDB_KEY}&query=${encodeURIComponent(query)}&language=es-ES`);
    const data=await res.json();
    const items=(data.results||[]).filter(r=>r.media_type==="movie"||r.media_type==="tv").slice(0,12);
    grid.innerHTML="";
    if(!items.length){grid.innerHTML='<p style="color:#888;font-size:0.7rem;grid-column:1/-1">Sin resultados</p>';return;}
    items.forEach(item=>{
      const titulo=item.title||item.name||"Sin título";
      const año=(item.release_date||item.first_air_date||"").slice(0,4);
      const poster=item.poster_path?TMDB_IMG+item.poster_path:"https://placehold.co/130x195/0a0a1a/00f0ff?text=SIN+IMG";
      const tipo=item.media_type==="tv"?"Serie":"Película";
      const div=document.createElement("div"); div.className="card"; div.setAttribute("tabindex","0");
      div.innerHTML=`<img src="${poster}" alt="${titulo}" onerror="this.src='https://placehold.co/130x195/0a0a1a/00f0ff?text=SIN+IMG'"><div class="card-info"><h4>${titulo}</h4><p>${tipo} • ${año}</p><button class="card-play" onclick="abrirDetalleTMDb(${item.id},'${item.media_type}')"><i class="fa-solid fa-circle-info"></i> VER INFO</button></div>`;
      grid.appendChild(div);
    });
  } catch(e){grid.innerHTML='<p style="color:#ff3d5a;font-size:0.7rem;grid-column:1/-1">Error al buscar</p>';}
}

async function abrirDetalleTMDb(id, tipo) {
  const ep = tipo==="tv"?`tv/${id}`:`movie/${id}`;
  try {
    const res=await fetch(`${TMDB_BASE}/${ep}?api_key=${TMDB_KEY}&language=es-ES`);
    const item=await res.json();
    const titulo=item.title||item.name||"Sin título";
    const año=(item.release_date||item.first_air_date||"").slice(0,4);
    const rating=item.vote_average?`⭐ ${item.vote_average.toFixed(1)}`:"Sin calificación";
    const generos=(item.genres||[]).map(g=>g.name).slice(0,2).join(", ");
    document.getElementById("tmdbPoster").src=item.poster_path?TMDB_IMG+item.poster_path:"https://placehold.co/130x195/0a0a1a/00f0ff?text=SIN+IMG";
    document.getElementById("tmdbTitle").textContent=titulo;
    document.getElementById("tmdbYear").textContent=año;
    document.getElementById("tmdbGenre").textContent=generos;
    document.getElementById("tmdbRating").textContent=rating;
    document.getElementById("tmdbOverview").textContent=item.overview||"Sin sinopsis.";
    const btns=document.getElementById("tmdbPlayBtns"); btns.innerHTML="";
    document.getElementById("tmdbNoLink").style.display="none";
    const pm=(contenidoGlobal.peliculas||[]).find(p=>p.nombre.toLowerCase().includes(titulo.toLowerCase().slice(0,8)));
    const sm=(contenidoGlobal.series||[]).find(s=>s.nombre.toLowerCase().includes(titulo.toLowerCase().slice(0,8)));
    if(pm&&pm.link&&!pm.link.startsWith("TU_LINK")){const b=document.createElement("button");b.className="tmdb-play-btn";b.innerHTML='<i class="fa-solid fa-play"></i> REPRODUCIR';b.onclick=()=>{loadStream(pm.link);cerrarTMDb();};btns.appendChild(b);}
    else if(sm){const b=document.createElement("button");b.className="tmdb-play-btn";b.innerHTML='<i class="fa-solid fa-list"></i> VER TEMPORADAS';b.onclick=()=>{openSeriesModal({dataset:{serie:JSON.stringify(sm)}});cerrarTMDb();};btns.appendChild(b);}
    else{document.getElementById("tmdbNoLink").style.display="block";}
    const cb=document.createElement("button");cb.className="tmdb-close-btn";cb.innerHTML='<i class="fa-solid fa-xmark"></i> CERRAR';cb.onclick=cerrarTMDb;btns.appendChild(cb);
    document.getElementById("tmdbModal").classList.add("open");
  } catch(e){console.error("TMDb error:",e);}
}

let bannerIndex=0, bannerItems=[], bannerTimer=null;
function initBanner(peliculas) {
  bannerItems=(peliculas||[]).slice(0,6);
  if(!bannerItems.length){document.querySelector('.banner-estrenos')?.style && (document.querySelector('#seccion-peliculas .banner-estrenos').style.display='none');return;}
  const track=document.getElementById('bannerTrack'); const dots=document.getElementById('bannerDots');
  track.innerHTML=''; dots.innerHTML='';
  bannerItems.forEach((item,i)=>{
    const slide=document.createElement('div'); slide.className='banner-slide';
    const poster=item.portada||`https://placehold.co/400x185/0a0a1a/00f0ff?text=${encodeURIComponent(item.nombre)}`;
    const accion=item.link&&!item.link.startsWith('TU_LINK')?`onclick="loadStream('${(item.link||'').replace(/'/g,"\\'")}')"`:'';
    slide.innerHTML=`<img src="${poster}" alt="${item.nombre}" onerror="this.src='https://placehold.co/400x185/0a0a1a/00f0ff?text=${encodeURIComponent(item.nombre)}'"><div class="banner-slide-info"><div class="banner-slide-title">${item.nombre}</div><div class="banner-slide-meta"><span>${item.genero||''}</span>${item.año?'<span>'+item.año+'</span>':''}</div>${accion?`<button class="banner-slide-play" ${accion}><i class="fa-solid fa-play"></i> REPRODUCIR</button>`:''}</div>`;
    track.appendChild(slide);
    const dot=document.createElement('button'); dot.className='banner-dot'+(i===0?' active':''); dot.onclick=()=>goToBanner(i); dots.appendChild(dot);
  });
  bannerTimer=setInterval(()=>goToBanner((bannerIndex+1)%bannerItems.length),4500);
}
function goToBanner(idx){bannerIndex=idx; document.getElementById('bannerTrack').style.transform=`translateX(-${idx*100}%)`; document.querySelectorAll('#seccion-peliculas .banner-dot').forEach((d,i)=>d.classList.toggle('active',i===idx));}
function bannerMove(dir){goToBanner((bannerIndex+dir+bannerItems.length)%bannerItems.length); clearInterval(bannerTimer); bannerTimer=setInterval(()=>goToBanner((bannerIndex+1)%bannerItems.length),4500);}

function goToBannerSeries(idx){bannerSeriesIndex=idx; const t=document.getElementById('bannerSeriesTrack'); if(t)t.style.transform=`translateX(-${idx*100}%)`; document.querySelectorAll('#seccion-series .banner-dot').forEach((d,i)=>d.classList.toggle('active',i===idx));}
function bannerSeriesMove(dir){goToBannerSeries((bannerSeriesIndex+dir+bannerSeriesItems.length)%bannerSeriesItems.length); clearInterval(bannerSeriesTimer); bannerSeriesTimer=setInterval(()=>goToBannerSeries((bannerSeriesIndex+1)%bannerSeriesItems.length),5000);}

/* ══════════════════════════════════════════════
   CAST
══════════════════════════════════════════════ */
let castContext=null, castingActive=false, castInitialized=false;
function getMimeForUrl(url){if(!url)return"video/mp4";if(url.includes(".m3u8")||url.includes("chunklist"))return"application/x-mpegURL";return"video/mp4";}
function initCastSDK(){try{castContext=cast.framework.CastContext.getInstance();castContext.setOptions({receiverApplicationId:chrome.cast.media.DEFAULT_MEDIA_RECEIVER_APP_ID,autoJoinPolicy:chrome.cast.AutoJoinPolicy.ORIGIN_SCOPED});castContext.addEventListener(cast.framework.CastContextEventType.SESSION_STATE_CHANGED,onCastStateChanged);castInitialized=true;}catch(e){castInitialized=false;}}
async function onCastStateChanged(e){const S=cast.framework.SessionState;if(e.sessionState===S.SESSION_STARTED||e.sessionState===S.SESSION_RESUMED){const s=castContext.getCurrentSession();if(s&&currentLink)await enviarCast(s);else setCast(true);}else if(e.sessionState===S.SESSION_ENDED||e.sessionState===S.SESSION_START_FAILED){setCast(false);mostrarToast("📺 Cast desconectado.");}}
async function enviarCast(session){try{const mime=getMimeForUrl(currentLink);const info=new chrome.cast.media.MediaInfo(currentLink,mime);info.streamType=mime==="application/x-mpegURL"?chrome.cast.media.StreamType.LIVE:chrome.cast.media.StreamType.BUFFERED;const req=new chrome.cast.media.LoadRequest(info);req.autoplay=true;await session.loadMedia(req);setCast(true);mostrarToast("📺 ¡Transmitiendo en TV!");}catch(e){setCast(true);mostrarToast("⚠️ Error al cargar en TV.");}}
window.__onGCastApiAvailable=function(ok){if(ok)initCastSDK();};
function setCast(a){castingActive=a;const cb=document.getElementById("castBtn");const sb=document.getElementById("stopCastBtn");const ci=document.getElementById("castIndicator");if(a){if(cb){cb.style.background="linear-gradient(135deg,rgba(0,255,153,.2),rgba(0,225,255,.2))";cb.style.borderColor="#00ff99";cb.style.color="#00ff99";cb.innerHTML='<i class="fa-solid fa-tv"></i> EN CAST';}if(sb)sb.style.display="flex";if(ci)ci.classList.add("visible");}else{if(cb){cb.style.cssText="";cb.innerHTML='<i class="fa-solid fa-tv"></i> CAST';}if(sb)sb.style.display="none";if(ci)ci.classList.remove("visible");}}
async function finalizarCast(){if(typeof cast!=='undefined'&&castContext){const s=castContext.getCurrentSession();if(s)try{await s.endSession(true);}catch(e){}}setCast(false);mostrarToast("📺 Cast finalizado.");}
async function castToTV(){if(!currentLink){mostrarToast("⚠️ Selecciona un canal primero.");return;}if(!castInitialized&&typeof cast!=='undefined'&&cast.framework)initCastSDK();if(!castInitialized){mostrarToast("⚠️ Google Cast no disponible.\nUsa Chrome con extensión Cast.");return;}const s=castContext.getCurrentSession();if(s){await enviarCast(s);return;}try{mostrarToast("📡 Buscando dispositivos Cast...");await castContext.requestSession();}catch(e){if(e?.code===chrome.cast.ErrorCode.CANCEL)return;mostrarToast("⚠️ Error al conectar.");}}
function mostrarToast(msg){const t=document.getElementById("castToast");if(!t)return;t.innerHTML=msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),4000);}

/* ══════════════════════════════════════════════
   PRÓXIMOS EVENTOS — API FOOTBALL CORREGIDA
   Usa la temporada correcta (2024 para ligas europeas activas en 2025)
   y maneja mejor los errores
══════════════════════════════════════════════ */
async function cargarProximosEventos() {
  const grid = document.getElementById("proximosGrid");
  if (!grid) return;
  grid.innerHTML = '<div class="proximos-loading"><i class="fa-solid fa-spinner fa-spin"></i> Cargando partidos...</div>';

  // Cargar links de canales para cruzar con eventos
  let eventosLinks = {};
  try {
    const resC = await fetch(URL_CANALES + "?nocache=" + Date.now(), { signal: AbortSignal.timeout(5000) });
    const cData = await resC.json();
    if (cData.eventos) cData.eventos.forEach(ev => { eventosLinks[ev.id] = ev; });
  } catch(e) {}

  const API_KEY = "c7ac3c8a9376c3813bf128410f3c8d04";
  const HEADERS = { "x-apisports-key": API_KEY };

  // Ligas con sus IDs y temporadas correctas
  const LIGAS = [
    { id: "39",  nombre: "Premier League",   temporada: "2024" },
    { id: "140", nombre: "La Liga",          temporada: "2024" },
    { id: "78",  nombre: "Bundesliga",       temporada: "2024" },
    { id: "135", nombre: "Serie A",          temporada: "2024" },
    { id: "262", nombre: "Liga MX",          temporada: "2024" },
    { id: "11",  nombre: "Liga Pro Ecuador", temporada: "2024" },
    { id: "9",   nombre: "Copa América",     temporada: "2024" },
  ];

  const hoy = new Date();
  const fechaHoy = hoy.toISOString().split("T")[0];
  // Buscar partidos desde hoy hasta en 7 días
  const fechaLimite = new Date(hoy.getTime() + 7 * 24 * 60 * 60 * 1000).toISOString().split("T")[0];

  async function fetchPartidosLiga(liga) {
    try {
      // Buscar próximos partidos (status=NS = Not Started)
      const url = `https://v3.football.api-sports.io/fixtures?league=${liga.id}&season=${liga.temporada}&from=${fechaHoy}&to=${fechaLimite}&status=NS`;
      const res = await fetch(url, { headers: HEADERS, signal: AbortSignal.timeout(8000) });
      if (!res.ok) return [];
      const data = await res.json();
      if (!data.response || data.errors?.token || data.errors?.requests) {
        // Si la temporada 2024 no funciona, intentar 2025
        if (liga.temporada === "2024") {
          const url2 = `https://v3.football.api-sports.io/fixtures?league=${liga.id}&season=2025&from=${fechaHoy}&to=${fechaLimite}&status=NS`;
          const res2 = await fetch(url2, { headers: HEADERS, signal: AbortSignal.timeout(8000) });
          if (!res2.ok) return [];
          const data2 = await res2.json();
          return (data2.response || []).slice(0, 3).map(ev => ({
            idEvent: ev.fixture.id,
            strHomeTeam: ev.teams.home.name,
            strAwayTeam: ev.teams.away.name,
            dateEvent: ev.fixture.date.split("T")[0],
            strTime: ev.fixture.date.split("T")[1]?.slice(0,5) || "00:00",
            _liga: liga.nombre,
            _logoHome: ev.teams.home.logo,
            _logoAway: ev.teams.away.logo,
          }));
        }
        return [];
      }
      return (data.response || []).slice(0, 3).map(ev => ({
        idEvent: ev.fixture.id,
        strHomeTeam: ev.teams.home.name,
        strAwayTeam: ev.teams.away.name,
        dateEvent: ev.fixture.date.split("T")[0],
        strTime: ev.fixture.date.split("T")[1]?.slice(0,5) || "00:00",
        _liga: liga.nombre,
        _logoHome: ev.teams.home.logo,
        _logoAway: ev.teams.away.logo,
      }));
    } catch(e) { return []; }
  }

  // Cargar todas las ligas en paralelo
  const resultados = await Promise.allSettled(LIGAS.map(l => fetchPartidosLiga(l)));
  let todos = [];
  resultados.forEach(r => { if (r.status === "fulfilled") todos.push(...r.value); });

  // Ordenar por fecha/hora
  todos.sort((a,b) => {
    const fa = new Date(a.dateEvent + "T" + a.strTime + ":00");
    const fb = new Date(b.dateEvent + "T" + b.strTime + ":00");
    return fa - fb;
  });
  todos = todos.slice(0, 12);

  if (!todos.length) {
    grid.innerHTML = `
      <div class="proximos-loading">
        <i class="fa-solid fa-calendar-xmark"></i><br>
        Sin partidos próximos encontrados.<br>
        <small style="font-size:0.55rem;opacity:.6">Verifica tu clave de API de fútbol</small>
      </div>`;
    return;
  }

  grid.innerHTML = "";
  todos.forEach(ev => {
    const fechaEv = new Date(ev.dateEvent + "T" + ev.strTime + ":00");
    const esHoy = ev.dateEvent === fechaHoy;
    const hora = fechaEv.toLocaleTimeString("es", { hour: "2-digit", minute: "2-digit" });
    const fechaStr = esHoy
      ? `HOY ${hora}`
      : fechaEv.toLocaleDateString("es", { weekday:"short", day:"2-digit", month:"short" }) + " " + hora;

    // Buscar link cruzado con canales
    const linkData = eventosLinks[ev.idEvent] ||
      Object.values(eventosLinks).find(e =>
        e.nombre && (e.nombre.toLowerCase().includes((ev.strHomeTeam||"").toLowerCase().slice(0,6)) ||
                     e.nombre.toLowerCase().includes((ev.strAwayTeam||"").toLowerCase().slice(0,6)))
      );

    const div = document.createElement("div");
    div.className = "evento-proximo";
    div.innerHTML = `
      <div class="evento-proximo-top">
        <div class="evento-proximo-info">
          <div class="evento-proximo-nombre">
            ${ev._logoHome ? `<img src="${ev._logoHome}" style="width:16px;height:16px;object-fit:contain;margin-right:4px;vertical-align:middle;">` : ''}
            ${ev.strHomeTeam}
            <span style="color:rgba(255,255,255,.4);margin:0 4px">vs</span>
            ${ev.strAwayTeam}
            ${ev._logoAway ? `<img src="${ev._logoAway}" style="width:16px;height:16px;object-fit:contain;margin-left:4px;vertical-align:middle;">` : ''}
          </div>
          <div class="evento-proximo-liga">${ev._liga}</div>
        </div>
        <div class="evento-proximo-fecha">
          ${esHoy ? '<span class="evento-proximo-live">● HOY</span>' : ''}
          ${fechaStr}
        </div>
      </div>
      ${linkData?.reproductores?.length
        ? `<button class="evento-ver-btn" onclick="loadStream('${linkData.reproductores[0]}')"><i class="fa-solid fa-play"></i> VER PARTIDO</button>`
        : `<div class="evento-sin-link"><i class="fa-solid fa-clock"></i> Link próximamente</div>`}`;
    grid.appendChild(div);
  });
}

/* ══════════════════════════════════════════════
   TECLADO
══════════════════════════════════════════════ */
document.addEventListener("keydown", e => {
  if (e.key==="Escape") { closeSeriesModal(); return; }
  if (tvMode) {
    showControls();
    switch(e.key) {
      case " ": case "MediaPlayPause": togglePlayPause(); e.preventDefault(); return;
      case "ArrowLeft": skipVideo(e.shiftKey?-30:-10); e.preventDefault(); return;
      case "ArrowRight": skipVideo(e.shiftKey?30:10); e.preventDefault(); return;
      case "f": case "F": fullscreenPlayer(); return;
      case "m": case "M": toggleMute(); return;
    }
  }
  if (["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].includes(e.key)) {
    const focusables=Array.from(document.querySelectorAll("button:not([disabled]),.card[tabindex='0']")).filter(el=>el.offsetParent!==null);
    const idx=focusables.indexOf(document.activeElement);
    if(idx===-1){focusables[0]?.focus();return;}
    let next=idx;
    if(e.key==="ArrowDown"||e.key==="ArrowRight") next=Math.min(idx+1,focusables.length-1);
    if(e.key==="ArrowUp"||e.key==="ArrowLeft") next=Math.max(idx-1,0);
    focusables[next].focus(); focusables[next].scrollIntoView({block:"nearest"});
    e.preventDefault();
  }
});
document.addEventListener("mousemove", ()=>{if(tvMode)showControls();});

function detectarTV() {
  const ua=navigator.userAgent.toLowerCase();
  const esTV=ua.includes("smarttv")||ua.includes("androidtv")||ua.includes("googletv")||ua.includes("webos")||ua.includes("tizen")||ua.includes("hbbtv")||ua.includes("roku")||ua.includes("firetv");
  if(esTV){tvMode=true;document.body.classList.add("tv-mode");}
}

/* ══════════════════════════════════════════════
   PARTÍCULAS
══════════════════════════════════════════════ */
(function(){
  const canvas=document.getElementById('bgCanvas');
  if(!canvas)return;
  const ctx=canvas.getContext('2d');
  let W,H,particles;
  function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
  function mk(){return{x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.5+.3,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,a:Math.random(),c:Math.random()>.5?'0,225,255':'139,0,255'};}
  function init(){resize();particles=Array.from({length:80},mk);}
  function draw(){
    ctx.clearRect(0,0,W,H);
    particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;if(p.x<0)p.x=W;if(p.x>W)p.x=0;if(p.y<0)p.y=H;if(p.y>H)p.y=0;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=`rgba(${p.c},${p.a*.6})`;ctx.fill();});
    for(let i=0;i<particles.length;i++)for(let j=i+1;j<particles.length;j++){const dx=particles[i].x-particles[j].x,dy=particles[i].y-particles[j].y,d=Math.sqrt(dx*dx+dy*dy);if(d<80){ctx.beginPath();ctx.moveTo(particles[i].x,particles[i].y);ctx.lineTo(particles[j].x,particles[j].y);ctx.strokeStyle=`rgba(0,225,255,${.06*(1-d/80)})`;ctx.lineWidth=.5;ctx.stroke();}}
    requestAnimationFrame(draw);
  }
  window.addEventListener('resize',resize);
  init();draw();
})();
