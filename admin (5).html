<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — THEY GOOD TV</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: radial-gradient(circle at top, #14143b, #050510 70%); color: #e0e0ff; font-family: 'Orbitron', sans-serif; min-height: 100vh; }

/* LOGIN */
#login { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
.login-box {
  background: linear-gradient(145deg, #111827, #0f172a);
  border: 1px solid rgba(0,255,255,.3);
  border-radius: 20px;
  padding: 40px;
  width: 100%;
  max-width: 380px;
  text-align: center;
  box-shadow: 0 0 30px rgba(0,225,255,.2);
}
.login-box h1 { color: #00e1ff; font-size: 1.6rem; margin-bottom: 6px; text-shadow: 0 0 15px #00e1ff; }
.login-box p { color: #94a3b8; font-size: 0.6rem; letter-spacing: 2px; margin-bottom: 24px; }
.login-box input {
  width: 100%;
  background: #0d1117;
  border: 1px solid rgba(0,255,255,.3);
  border-radius: 10px;
  color: #fff;
  font-family: 'Orbitron', sans-serif;
  font-size: 0.75rem;
  padding: 14px;
  margin-bottom: 14px;
  letter-spacing: 3px;
  outline: none;
  transition: .3s;
}
.login-box input:focus { border-color: #00e1ff; box-shadow: 0 0 10px rgba(0,225,255,.3); }

/* BUTTONS */
.btn {
  background: linear-gradient(135deg, #00e1ff, #0011ff);
  border: none;
  border-radius: 10px;
  color: #fff;
  font-family: 'Orbitron', sans-serif;
  font-size: 0.75rem;
  font-weight: 700;
  padding: 13px 20px;
  cursor: pointer;
  width: 100%;
  margin-bottom: 8px;
  transition: .3s;
  box-shadow: 0 0 15px rgba(0,225,255,.3);
}
.btn:hover { transform: translateY(-2px); box-shadow: 0 0 25px rgba(0,225,255,.5); }
.btn-red { background: linear-gradient(135deg, #ff3d5a, #cc0022); box-shadow: 0 0 15px rgba(255,61,90,.3); }
.btn-green { background: linear-gradient(135deg, #00ff99, #00cc77); color: #000; box-shadow: 0 0 15px rgba(0,255,153,.3); }
.err-msg { color: #ff3d5a; font-size: 0.65rem; margin-top: 8px; }

/* HEADER */
.admin-header {
  background: linear-gradient(90deg, #00e1ff, #0011ff, #8b00ff);
  padding: 16px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 10px;
  box-shadow: 0 0 25px #00e1ff, 0 0 50px #0011ff;
}
.admin-header h1 { color: #fff; font-size: 1rem; text-shadow: 0 0 10px #fff; }
.header-btns { display: flex; gap: 8px; flex-wrap: wrap; }

/* PANEL */
#panel { display: none; }
.panel-body { padding: 16px; max-width: 900px; margin: 0 auto; }

/* TABS */
.tabs { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.tab {
  background: linear-gradient(145deg, #111827, #0f172a);
  border: 1px solid rgba(0,255,255,.2);
  border-radius: 10px;
  color: #6060a0;
  font-family: 'Orbitron', sans-serif;
  font-size: 0.65rem;
  padding: 10px 16px;
  cursor: pointer;
  transition: .3s;
}
.tab:hover { border-color: #00e1ff88; color: #00e1ff88; }
.tab.active { border-color: #00e1ff; color: #00e1ff; box-shadow: 0 0 10px rgba(0,225,255,.2); }
.section { display: none; }
.section.active { display: block; }

/* CARDS */
.card {
  background: linear-gradient(145deg, #111827, #0f172a);
  border: 1px solid rgba(0,255,255,.15);
  border-radius: 16px;
  padding: 18px;
  margin-bottom: 14px;
  box-shadow: 0 0 10px rgba(0,225,255,.05);
}
.card-title { color: #00e1ff; font-size: 0.8rem; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }

/* FORM */
label { display: block; color: #00e1ff; font-size: 0.6rem; margin-bottom: 4px; margin-top: 12px; letter-spacing: 1px; }
input[type=text], input[type=password], textarea {
  width: 100%;
  background: #0d1117;
  border: 1px solid rgba(0,255,255,.2);
  border-radius: 8px;
  color: #fff;
  font-family: 'Orbitron', sans-serif;
  font-size: 0.7rem;
  padding: 10px 12px;
  outline: none;
  transition: .3s;
}
input[type=text]:focus, input[type=password]:focus, textarea:focus {
  border-color: #00e1ff;
  box-shadow: 0 0 8px rgba(0,225,255,.2);
}
textarea { height: 80px; resize: vertical; }

/* MSG */
.msg { padding: 12px; border-radius: 10px; font-size: 0.7rem; margin-bottom: 14px; display: none; }
.msg.ok { background: rgba(0,255,153,.1); border: 1px solid #00ff99; color: #00ff99; }
.msg.err { background: rgba(255,61,90,.1); border: 1px solid #ff3d5a; color: #ff3d5a; }

/* EVENTO CARD */
.evento-card {
  background: #0d1117;
  border: 1px solid rgba(0,255,255,.15);
  border-radius: 10px;
  padding: 14px;
  margin-bottom: 10px;
}
.evento-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.evento-num { color: #00e1ff; font-size: 0.7rem; }
.del-btn {
  background: linear-gradient(135deg, #ff3d5a, #cc0022);
  border: none;
  border-radius: 6px;
  color: #fff;
  cursor: pointer;
  padding: 6px 12px;
  font-size: 0.65rem;
  font-family: 'Orbitron', sans-serif;
  transition: .3s;
}
.del-btn:hover { transform: scale(1.05); box-shadow: 0 0 10px rgba(255,61,90,.4); }
.add-btn {
  background: rgba(0,225,255,.1);
  border: 1px solid #00e1ff;
  border-radius: 8px;
  color: #00e1ff;
  cursor: pointer;
  padding: 10px 16px;
  font-size: 0.65rem;
  font-family: 'Orbitron', sans-serif;
  margin-top: 8px;
  transition: .3s;
  width: 100%;
}
.add-btn:hover { background: rgba(0,225,255,.2); box-shadow: 0 0 10px rgba(0,225,255,.2); }

/* SERIE */
.serie-block {
  background: #0a0a1e;
  border: 1px solid rgba(0,255,255,.2);
  border-radius: 10px;
  padding: 14px;
  margin-bottom: 10px;
}
.temp-block {
  background: #0d1117;
  border: 1px solid rgba(0,255,255,.1);
  border-radius: 8px;
  padding: 10px;
  margin-bottom: 8px;
  margin-top: 8px;
}
.ep-row { display: flex; gap: 6px; margin-bottom: 6px; align-items: center; }
.ep-row input { flex: 1; }

/* GENERADOR AUTOMATICO */
.gen-box {
  background: linear-gradient(145deg, #0a1628, #0d1f3c);
  border: 1px solid rgba(0,225,255,.3);
  border-radius: 14px;
  padding: 18px;
  margin-bottom: 16px;
}
.gen-box-title { color: #00e1ff; font-size: 0.75rem; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
.gen-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
.gen-temp-row {
  display: flex; gap: 8px; align-items: center;
  background: #0d1117; border: 1px solid rgba(0,255,255,.15);
  border-radius: 8px; padding: 8px 12px; margin-bottom: 6px;
}
.gen-temp-row label { color: #00e1ff; font-size: 0.6rem; margin: 0; min-width: 90px; }
.gen-temp-row input { flex:1; margin:0; }
.btn-purple {
  background: linear-gradient(135deg, #7b2fff, #4400cc);
  border: none; border-radius: 10px; color: #fff;
  font-family: 'Orbitron', sans-serif; font-size: 0.75rem; font-weight: 700;
  padding: 13px 20px; cursor: pointer; width: 100%; margin-top: 12px;
  transition: .3s; box-shadow: 0 0 15px rgba(123,47,255,.3);
}
.btn-purple:hover { transform: translateY(-2px); box-shadow: 0 0 25px rgba(123,47,255,.5); }
.gen-preview {
  background: #020208; border: 1px solid rgba(0,255,255,.15);
  border-radius: 8px; padding: 12px; font-size: 0.65rem;
  color: #00e1ff; margin-top: 10px; display: none;
}

/* RESPONSIVE */
@media(max-width:600px) {
  .admin-header h1 { font-size: 0.8rem; }
  .tab { font-size: 0.55rem; padding: 8px 10px; }
  .gen-row { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-box">
    <h1><i class="fa-solid fa-shield-halved"></i> ADMIN</h1>
    <p>THEY GOOD TV — PANEL DE CONTROL</p>
    <input type="password" id="passInput" placeholder="CONTRASEÑA"/>
    <button class="btn" onclick="doLogin()"><i class="fa-solid fa-right-to-bracket"></i> ENTRAR</button>
    <div class="err-msg" id="loginErr" style="display:none"><i class="fa-solid fa-triangle-exclamation"></i> Contraseña incorrecta</div>
  </div>
</div>

<!-- PANEL -->
<div id="panel">
  <div class="admin-header">
    <h1><i class="fa-solid fa-gamepad"></i> THEY GOOD TV — ADMIN</h1>
    <div class="header-btns">
      <button class="btn btn-green" onclick="guardar()" style="width:auto;padding:10px 18px;margin:0;"><i class="fa-solid fa-cloud-arrow-up"></i> GUARDAR EN GITHUB</button>
      <button class="btn btn-red" onclick="salir()" style="width:auto;padding:10px 18px;margin:0;"><i class="fa-solid fa-right-from-bracket"></i> SALIR</button>
    </div>
  </div>

  <div class="panel-body">
    <div id="msg" class="msg"></div>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('canales',this)"><i class="fa-solid fa-satellite-dish"></i> CANALES</button>
      <button class="tab" onclick="switchTab('peliculas',this)"><i class="fa-solid fa-film"></i> PELÍCULAS</button>
      <button class="tab" onclick="switchTab('series',this)"><i class="fa-solid fa-tv"></i> SERIES</button>
      <button class="tab" onclick="switchTab('config',this)"><i class="fa-solid fa-gear"></i> CONFIG</button>
    </div>

    <!-- CANALES -->
    <div id="tab-canales" class="section active">
      <div class="card">
        <div class="card-title"><i class="fa-solid fa-futbol"></i> FÚTBOL</div>
        <div id="futbol-list"></div>
        <button class="add-btn" onclick="addEvento('futbol')"><i class="fa-solid fa-plus"></i> AGREGAR PARTIDO</button>
      </div>
      <div class="card">
        <div class="card-title"><i class="fa-solid fa-person-biking"></i> CICLISMO</div>
        <div id="ciclismo-list"></div>
        <button class="add-btn" onclick="addEvento('ciclismo')"><i class="fa-solid fa-plus"></i> AGREGAR EVENTO</button>
      </div>
      <div class="card">
        <div class="card-title"><i class="fa-solid fa-fire"></i> UFC / MMA</div>
        <div id="ufc-list"></div>
        <button class="add-btn" onclick="addEvento('ufc')"><i class="fa-solid fa-plus"></i> AGREGAR EVENTO</button>
      </div>
      <div class="card">
        <div class="card-title"><i class="fa-solid fa-satellite-dish"></i> CANALES ECUADOR</div>
        <div id="ecuador-list"></div>
        <button class="add-btn" onclick="addEvento('ecuador')"><i class="fa-solid fa-plus"></i> AGREGAR CANAL</button>
      </div>
      <div class="card">
        <div class="card-title"><i class="fa-solid fa-globe"></i> CANALES INTERNACIONALES</div>
        <div id="internacional-list"></div>
        <button class="add-btn" onclick="addEvento('internacional')"><i class="fa-solid fa-plus"></i> AGREGAR CANAL</button>
      </div>
    </div>

    <!-- PELÍCULAS -->
    <div id="tab-peliculas" class="section">
      <div class="card">
        <div class="card-title"><i class="fa-solid fa-film"></i> PELÍCULAS</div>
        <div id="peliculas-list"></div>
        <button class="add-btn" onclick="addPelicula()"><i class="fa-solid fa-plus"></i> AGREGAR PELÍCULA</button>
      </div>
    </div>

    <!-- SERIES -->
    <div id="tab-series" class="section">
      <div class="gen-box">
        <div class="gen-box-title"><i class="fa-solid fa-wand-magic-sparkles"></i> GENERADOR AUTOMÁTICO DE SERIES</div>
        <div class="gen-row">
          <div><label>NOMBRE DE LA SERIE</label><input type="text" id="genNombre" placeholder="Ej: Rosario Tijeras"/></div>
          <div><label>ID DE IMDB</label><input type="text" id="genImdb" placeholder="Ej: tt6340304"/></div>
        </div>
        <div class="gen-row">
          <div><label>GÉNERO</label><input type="text" id="genGenero" placeholder="Acción • Drama"/></div>
          <div><label>URL PORTADA (opcional)</label><input type="text" id="genPortada" placeholder="https://image.tmdb.org/..."/></div>
        </div>
        <div class="gen-row">
          <div>
            <label>REPRODUCTOR</label>
            <select id="genPlayer" style="width:100%;background:#0d1117;border:1px solid rgba(0,255,255,.2);border-radius:8px;color:#fff;font-family:'Orbitron',sans-serif;font-size:0.7rem;padding:10px 12px;outline:none;">
              <option value="https://vidsrc.to/embed/tv/{id}/{t}/{e}">vidsrc.to</option>
              <option value="https://vidsrc.me/embed/tv?imdb={id}&season={t}&episode={e}">vidsrc.me</option>
              <option value="https://2embed.cc/embedtv/{id}&s={t}&e={e}">2embed.cc</option>
            </select>
          </div>
          <div><label>N° DE TEMPORADAS</label><input type="number" id="genNumTemp" min="1" max="20" value="1" oninput="actualizarFilasTemp()"/></div>
        </div>
        <label>EPISODIOS POR TEMPORADA</label>
        <div id="genTempRows"></div>
        <div id="genPreview" class="gen-preview"></div>
        <button class="btn-purple" onclick="generarSerie()"><i class="fa-solid fa-wand-magic-sparkles"></i> GENERAR SERIE COMPLETA</button>
      </div>
      <div class="card">
        <div class="card-title"><i class="fa-solid fa-tv"></i> SERIES AGREGADAS</div>
        <div id="series-list"></div>
        <button class="add-btn" onclick="addSerie()"><i class="fa-solid fa-plus"></i> AGREGAR SERIE MANUAL</button>
      </div>
    </div>

    <!-- CONFIG -->
    <div id="tab-config" class="section">
      <div class="card">
        <div class="card-title"><i class="fa-solid fa-key"></i> CREDENCIALES GITHUB</div>
        <label>USUARIO DE GITHUB</label>
        <input type="text" id="cfgUser" value="Thegood2006"/>
        <label>REPOSITORIO</label>
        <input type="text" id="cfgRepo" value="MI-sitio-eventos"/>
        <label>TOKEN CLASSIC (Settings → Developer settings → Tokens classic → repo)</label>
        <input type="text" id="cfgToken" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" autocomplete="off"/>
        <p style="color:#6060a0;font-size:0.6rem;margin-top:8px;"><i class="fa-solid fa-lock"></i> El token se guarda solo en este navegador</p>
        <button class="btn" style="margin-top:14px;" onclick="guardarConfig()"><i class="fa-solid fa-floppy-disk"></i> GUARDAR CONFIG</button>
      </div>
      <div class="card">
        <div class="card-title"><i class="fa-solid fa-lock"></i> CAMBIAR CONTRASEÑA</div>
        <label>NUEVA CONTRASEÑA</label>
        <input type="password" id="newPass" placeholder="••••••••"/>
        <label>CONFIRMAR CONTRASEÑA</label>
        <input type="password" id="newPass2" placeholder="••••••••"/>
        <button class="btn" style="margin-top:14px;" onclick="cambiarPass()"><i class="fa-solid fa-key"></i> CAMBIAR CONTRASEÑA</button>
      </div>
    </div>
  </div>
</div>

<script>
const PASS_KEY = "tgtv_pass";
const TOKEN_KEY = "tgtv_token";
const DEFAULT_PASS = "admin1234";

let ghUser = "Thegood2006";
let ghRepo = "MI-sitio-eventos";
let ghToken = "";

let canales = { futbol:[], ciclismo:[], ufc:[], ecuador:[], internacional:[] };
let contenido = { peliculas:[], series:[] };

// LOGIN
function doLogin() {
  const pass = document.getElementById("passInput").value;
  const saved = localStorage.getItem(PASS_KEY) || DEFAULT_PASS;
  if(pass === saved) {
    document.getElementById("login").style.display = "none";
    document.getElementById("panel").style.display = "block";
    cargarConfig();
    cargarDatos();
  } else {
    document.getElementById("loginErr").style.display = "block";
  }
}
document.getElementById("passInput").addEventListener("keydown", e => { if(e.key==="Enter") doLogin(); });

function salir() {
  document.getElementById("login").style.display = "flex";
  document.getElementById("panel").style.display = "none";
  document.getElementById("passInput").value = "";
}

function cambiarPass() {
  const p1 = document.getElementById("newPass").value.trim();
  const p2 = document.getElementById("newPass2").value.trim();
  if(!p1) { showMsg("La contraseña no puede estar vacía", true); return; }
  if(p1 !== p2) { showMsg("Las contraseñas no coinciden", true); return; }
  localStorage.setItem(PASS_KEY, p1);
  showMsg("✓ Contraseña cambiada");
}

// CONFIG
function cargarConfig() {
  ghToken = localStorage.getItem(TOKEN_KEY) || "";
  document.getElementById("cfgUser").value = ghUser;
  document.getElementById("cfgRepo").value = ghRepo;
  document.getElementById("cfgToken").value = ghToken;
}

function guardarConfig() {
  ghUser = document.getElementById("cfgUser").value.trim();
  ghRepo = document.getElementById("cfgRepo").value.trim();
  ghToken = document.getElementById("cfgToken").value.trim();
  localStorage.setItem(TOKEN_KEY, ghToken);
  showMsg("✓ Config guardada correctamente");
}

// TABS
function switchTab(tab, el) {
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
  el.classList.add("active");
  document.getElementById("tab-" + tab).classList.add("active");
}

// CARGAR DATOS
async function cargarDatos() {
  const base = `https://raw.githubusercontent.com/${ghUser}/${ghRepo}/main`;
  try {
    const [rc, rco] = await Promise.all([
      fetch(base + "/canales.json?nocache=" + Date.now()),
      fetch(base + "/contenido.json?nocache=" + Date.now())
    ]);
    canales = await rc.json();
    contenido = await rco.json();
    if(!canales.internacional) canales.internacional = [];
    renderTodo();
  } catch(e) {
    showMsg("Error cargando datos: " + e.message, true);
  }
}

// RENDER
function renderTodo() {
  renderCanales("futbol");
  renderCanales("ciclismo");
  renderCanales("ufc");
  renderCanales("ecuador");
  renderCanales("internacional");
  renderPeliculas();
  renderSeries();
}

function renderCanales(cat) {
  const list = document.getElementById(cat + "-list");
  if(!list) return;
  list.innerHTML = "";
  (canales[cat] || []).forEach((ev, i) => {
    const div = document.createElement("div");
    div.className = "evento-card";
    div.innerHTML = `
      <div class="evento-header">
        <span class="evento-num"><i class="fa-solid fa-circle-dot" style="color:#00e1ff"></i> Evento ${i+1}</span>
        <button class="del-btn" onclick="delEvento('${cat}',${i})"><i class="fa-solid fa-trash"></i> Borrar</button>
      </div>
      <label>NOMBRE</label>
      <input type="text" value="${ev.nombre}" onchange="canales['${cat}'][${i}].nombre=this.value"/>
      <label>LIGA / DESCRIPCIÓN</label>
      <input type="text" value="${ev.liga}" onchange="canales['${cat}'][${i}].liga=this.value"/>
      <label>TIPO DE REPRODUCTOR</label>
      <select onchange="canales['${cat}'][${i}].tipo=this.value" style="width:100%;background:#0d1117;border:1px solid rgba(0,225,255,.2);border-radius:8px;color:#fff;font-family:'Orbitron',sans-serif;font-size:0.7rem;padding:10px;margin-bottom:8px;">
        <option value="m3u8" ${(ev.tipo||'m3u8')==='m3u8'?'selected':''}>🎬 M3U8 / MP4 (stream directo)</option>
        <option value="iframe" ${ev.tipo==='iframe'?'selected':''}>🖥️ iFrame / Embed (reproductor externo)</option>
      </select>
      <label>LINKS (uno por línea)</label>
      <textarea onchange="canales['${cat}'][${i}].reproductores=this.value.split('\\n').filter(l=>l.trim())">${(ev.reproductores||[]).join('\n')}</textarea>
      <p style="color:rgba(0,225,255,.5);font-size:0.6rem;margin-top:4px;">💡 Para iFrame pega el link completo del embed. Para M3U8 pega el link .m3u8 o .mp4</p>
    `;
    list.appendChild(div);
  });
}

function addEvento(cat) {
  if(!canales[cat]) canales[cat] = [];
  canales[cat].push({ nombre: "Nuevo evento", liga: "", tipo: "m3u8", reproductores: [""] });
  renderCanales(cat);
}

function delEvento(cat, i) {
  canales[cat].splice(i, 1);
  renderCanales(cat);
}

function renderPeliculas() {
  const list = document.getElementById("peliculas-list");
  list.innerHTML = "";
  (contenido.peliculas || []).forEach((p, i) => {
    const div = document.createElement("div");
    div.className = "evento-card";
    div.innerHTML = `
      <div class="evento-header">
        <span class="evento-num"><i class="fa-solid fa-film" style="color:#00e1ff"></i> ${p.nombre || 'Película '+(i+1)}</span>
        <button class="del-btn" onclick="delPelicula(${i})"><i class="fa-solid fa-trash"></i> Borrar</button>
      </div>
      <label>NOMBRE</label>
      <input type="text" value="${p.nombre}" onchange="contenido.peliculas[${i}].nombre=this.value"/>
      <label>GÉNERO • AÑO</label>
      <input type="text" value="${p.genero}" onchange="contenido.peliculas[${i}].genero=this.value"/>
      <label>URL PORTADA</label>
      <input type="text" value="${p.portada||''}" onchange="contenido.peliculas[${i}].portada=this.value"/>
      <label>TIPO DE REPRODUCTOR</label>
      <select onchange="contenido.peliculas[${i}].tipo=this.value" style="width:100%;background:#0d1117;border:1px solid rgba(0,225,255,.2);border-radius:8px;color:#fff;font-family:'Orbitron',sans-serif;font-size:0.7rem;padding:10px;margin-bottom:8px;">
        <option value="m3u8" ${(p.tipo||'m3u8')==='m3u8'?'selected':''}>🎬 M3U8 / MP4</option>
        <option value="iframe" ${p.tipo==='iframe'?'selected':''}>🖥️ iFrame / Embed</option>
      </select>
      <label>LINK DEL VIDEO</label>
      <input type="text" value="${p.link||''}" onchange="contenido.peliculas[${i}].link=this.value"/>
      <p style="color:rgba(0,225,255,.5);font-size:0.6rem;margin-top:4px;">💡 Ejemplos iframe: https://vidsrc.me/embed/movie?imdb=tt1392190</p>
    `;
    list.appendChild(div);
  });
}

function addPelicula() {
  if(!contenido.peliculas) contenido.peliculas = [];
  contenido.peliculas.push({ nombre: "Nueva película", genero: "", portada: "", tipo: "m3u8", link: "" });
  renderPeliculas();
}

function delPelicula(i) {
  contenido.peliculas.splice(i, 1);
  renderPeliculas();
}

function renderSeries() {
  const list = document.getElementById("series-list");
  list.innerHTML = "";
  (contenido.series || []).forEach((s, i) => {
    const div = document.createElement("div");
    div.className = "serie-block";
    let tempHTML = "";
    (s.temporadas || []).forEach((t, ti) => {
      let epHTML = "";
      (t.episodios || []).forEach((ep, ei) => {
        epHTML += `
          <div class="ep-row">
            <input type="text" value="${ep.nombre}" placeholder="Nombre episodio" onchange="contenido.series[${i}].temporadas[${ti}].episodios[${ei}].nombre=this.value"/>
            <input type="text" value="${ep.link}" placeholder="Link" onchange="contenido.series[${i}].temporadas[${ti}].episodios[${ei}].link=this.value"/>
            <button class="del-btn" onclick="delEpisodio(${i},${ti},${ei})"><i class="fa-solid fa-trash"></i></button>
          </div>`;
      });
      tempHTML += `
        <div class="temp-block">
          <label>TEMPORADA</label>
          <input type="text" value="${t.nombre}" onchange="contenido.series[${i}].temporadas[${ti}].nombre=this.value"/>
          <label style="margin-top:10px;">EPISODIOS</label>
          ${epHTML}
          <button class="add-btn" onclick="addEpisodio(${i},${ti})" style="margin-top:6px;"><i class="fa-solid fa-plus"></i> Episodio</button>
        </div>`;
    });
    div.innerHTML = `
      <div class="evento-header">
        <span class="evento-num"><i class="fa-solid fa-tv" style="color:#00e1ff"></i> ${s.nombre || 'Serie '+(i+1)}</span>
        <button class="del-btn" onclick="delSerie(${i})"><i class="fa-solid fa-trash"></i> Borrar</button>
      </div>
      <label>NOMBRE</label>
      <input type="text" value="${s.nombre}" onchange="contenido.series[${i}].nombre=this.value"/>
      <label>GÉNERO</label>
      <input type="text" value="${s.genero||''}" onchange="contenido.series[${i}].genero=this.value"/>
      <label>URL PORTADA</label>
      <input type="text" value="${s.portada||''}" onchange="contenido.series[${i}].portada=this.value"/>
      <label>TEMPORADAS</label>
      ${tempHTML}
      <button class="add-btn" onclick="addTemporada(${i})"><i class="fa-solid fa-plus"></i> Temporada</button>
    `;
    list.appendChild(div);
  });
}

function addSerie() {
  if(!contenido.series) contenido.series = [];
  contenido.series.push({ nombre: "Nueva serie", genero: "", portada: "", temporadas: [] });
  renderSeries();
}

function delSerie(i) { contenido.series.splice(i,1); renderSeries(); }

function addTemporada(si) {
  if(!contenido.series[si].temporadas) contenido.series[si].temporadas = [];
  contenido.series[si].temporadas.push({ nombre: "Temporada 1", episodios: [] });
  renderSeries();
}

function addEpisodio(si, ti) {
  contenido.series[si].temporadas[ti].episodios.push({ nombre: "Episodio", link: "" });
  renderSeries();
}

function delEpisodio(si, ti, ei) {
  contenido.series[si].temporadas[ti].episodios.splice(ei,1);
  renderSeries();
}

// GUARDAR EN GITHUB
async function guardar() {
  if(!ghToken) { showMsg("⚠ Primero guarda tu token en CONFIG", true); return; }
  showMsg("⏳ Guardando en GitHub...", false, true);
  try {
    await pushFile("canales.json", JSON.stringify(canales, null, 2));
    await pushFile("contenido.json", JSON.stringify(contenido, null, 2));
    showMsg("✓ Guardado en GitHub correctamente");
  } catch(e) {
    showMsg("Error: " + e.message, true);
  }
}

async function pushFile(filename, content) {
  const url = `https://api.github.com/repos/${ghUser}/${ghRepo}/contents/${filename}`;
  const meta = await fetch(url, {
    headers: { Authorization: "token " + ghToken, Accept: "application/vnd.github.v3+json" }
  });
  const metaJson = await meta.json();
  const sha = metaJson.sha;
  const encoded = btoa(unescape(encodeURIComponent(content)));
  const res = await fetch(url, {
    method: "PUT",
    headers: {
      Authorization: "token " + ghToken,
      Accept: "application/vnd.github.v3+json",
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ message: "Admin: update " + filename, content: encoded, sha: sha })
  });
  if(!res.ok) {
    const err = await res.json();
    throw new Error(err.message || res.statusText);
  }
}

function showMsg(text, isErr=false, loading=false) {
  const el = document.getElementById("msg");
  el.className = "msg " + (isErr ? "err" : "ok");
  el.textContent = text;
  el.style.display = "block";
  if(!loading && !isErr) setTimeout(() => el.style.display="none", 3000);
}

/* =============================================
   GENERADOR AUTOMÁTICO
   ============================================= */
function actualizarFilasTemp() {
  const n = parseInt(document.getElementById("genNumTemp").value) || 1;
  const cont = document.getElementById("genTempRows");
  const vals = [];
  cont.querySelectorAll("input").forEach(i => vals.push(i.value));
  cont.innerHTML = "";
  for (let t = 1; t <= n; t++) {
    const row = document.createElement("div");
    row.className = "gen-temp-row";
    row.innerHTML = `<label>T${t} — Eps</label><input type="number" min="1" max="300" placeholder="Ej: 60" value="${vals[t-1]||''}" style="max-width:100px;"/>`;
    cont.appendChild(row);
  }
}

function generarSerie() {
  const nombre  = document.getElementById("genNombre").value.trim();
  const imdb    = document.getElementById("genImdb").value.trim();
  const genero  = document.getElementById("genGenero").value.trim();
  const portada = document.getElementById("genPortada").value.trim();
  const player  = document.getElementById("genPlayer").value;
  const numTemp = parseInt(document.getElementById("genNumTemp").value) || 1;
  const rows    = document.getElementById("genTempRows").querySelectorAll("input");

  if (!nombre) { showMsg("⚠ Pon el nombre de la serie", true); return; }
  if (!imdb)   { showMsg("⚠ Pon el ID de IMDb (ej: tt6340304)", true); return; }

  const temporadas = [];
  let totalEps = 0;
  for (let t = 0; t < numTemp; t++) {
    const numEps = parseInt(rows[t]?.value) || 0;
    if (!numEps) { showMsg(`⚠ Pon cuántos episodios tiene la Temporada ${t+1}`, true); return; }
    const episodios = [];
    for (let e = 1; e <= numEps; e++) {
      episodios.push({
        nombre: `Episodio ${e}`,
        link: player.replace("{id}",imdb).replace("{t}",t+1).replace("{e}",e)
      });
    }
    temporadas.push({ nombre: `Temporada ${t+1}`, episodios });
    totalEps += numEps;
  }

  if (!contenido.series) contenido.series = [];
  contenido.series.push({ nombre, genero, portada, temporadas });
  renderSeries();

  const prev = document.getElementById("genPreview");
  prev.style.display = "block";
  prev.innerHTML = `✓ <strong>${nombre}</strong> generada — ${numTemp} temporada(s) — ${totalEps} episodios`;

  document.getElementById("genNombre").value = "";
  document.getElementById("genImdb").value = "";
  document.getElementById("genGenero").value = "";
  document.getElementById("genPortada").value = "";
  document.getElementById("genNumTemp").value = "1";
  actualizarFilasTemp();
  showMsg(`✓ "${nombre}" agregada con ${totalEps} episodios. Presiona GUARDAR EN GITHUB.`);
}

window.addEventListener("load", actualizarFilasTemp);
</script>
